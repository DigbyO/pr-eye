<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PR Eye v4.5 — Complete Pro Toolkit</title>

<link href="[https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap)" rel="stylesheet">
<script src="[https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js](https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js)"></script>
<script src="[https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js](https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js)"></script>

<style>
    :root {
        --navy: #09121c; --border: rgba(255, 255, 255, 0.08);
        --gold: #d4c2a1; --muted: #8b9bb4; --text: #f0f4f8;
        --red: #ff4d4d; --blue: #0044ff; --magenta: #ff00ff; --cyan: #00ffff; --green: #4dff4d;
        --canon-orange: #f39c12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background-color: var(--navy); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    
    .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
    .hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .brand { font-family: 'Cormorant Garamond'; font-size: 18px; color: var(--gold); letter-spacing: 2px; font-weight: 500;}
    .project-input { background: rgba(255,255,255,0.05); border: 1px solid #333; color: var(--gold); font-family: 'DM Mono'; font-size: 11px; padding: 6px; border-radius: 4px; width: 100%; text-align: center; outline: none;}

    .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
    .page { display: none; } .page.active { display: block; }

    /* PERSISTENT CAMERA AREA */
    #cam-section { margin-bottom: 15px; }
    .cam-container { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    
    .dial-container { display: flex; align-items: center; background: #080c11; border: 1px solid #333; border-radius: 8px; margin-bottom: 10px; height: 50px; overflow: hidden; position: relative;}
    .dial-label { width: 45px; background: #111; color: var(--muted); font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; height: 100%; border-right: 1px solid #333; z-index: 2;}
    .dial-track { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; align-items: center; position: relative;}
    .dial-item { flex: 0 0 33.33%; text-align: center; scroll-snap-align: center; color: #fff; font-size: 14px; opacity: 0.3; transition: 0.2s;}
    .dial-item.active { opacity: 1; color: var(--canon-orange); font-weight: 700; font-size: 16px; }

    .nav { background: rgba(0,0,0,0.9); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; color: var(--muted); font-size: 9px; text-transform: uppercase; cursor: pointer; }
    .nav-item.active { color: var(--gold); font-weight: bold; }
    
    .btn { padding: 12px; background: transparent; border: 1px solid rgba(212,194,161,0.3); color: var(--gold); border-radius: 8px; cursor: pointer; font-size: 10px; text-transform: uppercase; width: 100%; }
    .btn.solid { background: var(--gold); color: #000; font-weight: 700; border: none; }
    
    .ctrl-panel { border-radius: 12px; padding: 15px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); }
    .signature-pad { background: #fff; border-radius: 8px; width: 100%; border: none; touch-action: none; margin-bottom: 8px;}
</style>
</head>
<body>

<div class="hdr">
    <div class="hdr-top">
        <div class="brand">PR EYE v4.5</div>
        <div id="tel-wb" style="font-size: 10px; color: var(--muted);">WB <span style="color:var(--gold)">5500K</span></div>
    </div>
    <input type="text" id="global-project-title" class="project-input" placeholder="Scene / Project Title...">
</div>

<div class="main-content">
    
    <div id="cam-section">
        <div class="cam-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="ui-layer" class="overlay"></canvas>
        </div>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <button id="capture-btn" class="btn solid">Capture Frame</button>
        </div>
    </div>

    <div id="page-meter" class="page active">
        <div class="ctrl-panel" style="text-align:center;">
            <div id="ev-display" style="font-size: 64px; color: #fff; font-family: 'Cormorant Garamond';">0.0<span style="font-size:18px; color:var(--muted);"> EV</span></div>
            <div id="zone-label" style="font-size: 10px; color: var(--cyan); letter-spacing: 2px;">ZONE V</div>
        </div>
        
        <div class="dial-container"><div class="dial-label">SS</div><div class="dial-track" id="dial-shutter"></div></div>
        <div class="dial-container"><div class="dial-label">F/</div><div class="dial-track" id="dial-aperture"></div></div>
        <div class="dial-container"><div class="dial-label">ISO</div><div class="dial-track" id="dial-iso"></div></div>
    </div>

    <div id="page-color" class="page">
        <div class="ctrl-panel">
            <h4 style="color:var(--gold); margin-bottom:10px;">Palette Generator</h4>
            <div id="palette-display" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 5px; height: 60px;">
                <div style="background:#333; border-radius:4px;"></div>
                <div style="background:#444; border-radius:4px;"></div>
                <div style="background:#555; border-radius:4px;"></div>
                <div style="background:#666; border-radius:4px;"></div>
            </div>
        </div>
    </div>

    <div id="page-release" class="page">
        <div class="ctrl-panel">
            <h4 style="color:var(--gold); margin-bottom:10px;">Model Release</h4>
            <input type="text" id="r-name" style="width:100%; background:transparent; border:none; border-bottom:1px solid #333; color:#fff; padding:10px 0; margin-bottom:10px;" placeholder="Model Full Name">
            <canvas id="sig-model" class="signature-pad" height="100"></canvas>
            <button id="gen-pdf-btn" class="btn solid">Generate PDF</button>
        </div>
    </div>

</div>

<div class="nav">
    <div class="nav-item active" data-target="page-meter">Meter</div>
    <div class="nav-item" data-target="page-color">Color</div>
    <div class="nav-item" data-target="page-release">Legal</div>
</div>

<script>
    const video = document.getElementById('video');
    const uiCtx = document.getElementById('ui-layer').getContext('2d');
    let stream = null;
    let currentTab = 'page-meter';

    const arrShutter = ['1/50', '1/60', '1/125', '1/250', '1/500'];
    const arrAperture = ['f/2.8', 'f/4.0', 'f/5.6', 'f/8.0', 'f/11'];
    const arrIso = ['100', '200', '400', '800', '1600'];

    function buildDial(id, arr) {
        const track = document.getElementById(id);
        track.innerHTML = '<div class="dial-item"></div>';
        arr.forEach(val => {
            track.innerHTML += `<div class="dial-item">${val}</div>`;
        });
        track.innerHTML += '<div class="dial-item"></div>';
        
        track.addEventListener('scroll', () => {
            const items = track.querySelectorAll('.dial-item');
            let closest = null;
            let minD = Infinity;
            items.forEach(item => {
                const d = Math.abs((track.scrollLeft + track.offsetWidth/2) - (item.offsetLeft + item.offsetWidth/2));
                if (d < minD) { minD = d; closest = item; }
                item.classList.remove('active');
            });
            if (closest) closest.classList.add('active');
        });
    }

    async function initCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            document.getElementById('ui-layer').width = video.clientWidth;
            document.getElementById('ui-layer').height = video.clientHeight;
        } catch (e) { console.error("Camera fail", e); }
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            item.classList.add('active');
            currentTab = item.getAttribute('data-target');
            document.getElementById(currentTab).classList.add('active');
            
            // Toggle camera area based on tab
            document.getElementById('cam-section').style.display = (currentTab === 'page-release') ? 'none' : 'block';
        });
    });

    // Signatures
    const canvas = document.getElementById('sig-model');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    canvas.addEventListener('pointerdown', () => drawing = true);
    canvas.addEventListener('pointerup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('pointermove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    });

    buildDial('dial-shutter', arrShutter);
    buildDial('dial-aperture', arrAperture);
    buildDial('dial-iso', arrIso);
    initCamera();
</script>
</body>
</html>
