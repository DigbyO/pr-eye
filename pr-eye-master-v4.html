<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR EYE v9.0 — ULTIMATE TACTICAL</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root { --gold: #d4c2a1; --bg: #050a10; --border: rgba(255, 255, 255, 0.1); --red: #ff3b30; --magenta: #ff2d55; --cyan: #5ac8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* UI OVERLAYS */
        .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 100; }
        .hdr-top { display: flex; justify-content: space-between; align-items: center; }
        .tel-bar { display: flex; gap: 12px; font-size: 10px; color: #8b9bb4; margin-top: 5px; }
        .val { color: var(--gold); }

        #viewport { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; flex-shrink: 0; overflow: hidden; border-bottom: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* POINT MARKERS */
        .marker { position: absolute; width: 30px; height: 30px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
        #marker-a { border-color: var(--cyan); } #marker-b { border-color: var(--magenta); } #marker-c { border-color: var(--gold); }

        .main { flex: 1; overflow-y: auto; padding: 15px 15px 120px; }
        .page { display: none; } .page.active { display: block; }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }

        /* CANON HUD */
        .hud-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #0d141e; border: 2px solid #555; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .hud-cell { padding: 10px; border: 0.5px solid #222; text-align: center; }
        .hud-lbl { font-size: 8px; color: #888; text-transform: uppercase; }
        .hud-v { font-size: 15px; font-weight: bold; color: #fff; }

        .btn { width: 100%; padding: 14px; background: transparent; border: 1px solid #444; color: var(--gold); border-radius: 8px; font-size: 10px; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; }
        .btn.solid { background: var(--gold); color: #000; font-weight: bold; border: none; }
        .btn.danger { background: var(--red); color: #fff; border: none; }
        input[type="range"], select { width: 100%; height: 40px; background: #000; color: #fff; border: 1px solid #333; border-radius: 6px; padding: 0 10px; accent-color: var(--gold); }

        /* COLORS */
        .palette-row { display: flex; height: 60px; border-radius: 8px; overflow: hidden; margin: 10px 0; border: 1px solid #333; }
        .sw { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; }
        .mj-box { font-size: 10px; color: #888; background: #000; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px solid #222; word-break: break-all; }

        /* RAVE & SIREN */
        #rave-flash { display: none; position: fixed; inset: 0; z-index: 1500; pointer-events: none; }
        @keyframes police-rb { 0% { background: #f00; } 50% { background: #00f; } }
        @keyframes strobe-bw { 0% { background: #00f; } 50% { background: #fff; } }
        @keyframes strobe-rw { 0% { background: #f00; } 50% { background: #fff; } }
        .mode-police { animation: police-rb 0.1s infinite; }
        .mode-bw { animation: strobe-bw 0.1s infinite; }
        .mode-rw { animation: strobe-rw 0.1s infinite; }

        /* EXPORT */
        #export-ovl { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .polaroid { background: #fff; padding: 10px 10px 80px 10px; box-shadow: 0 20px 60px #000; width: 100%; max-width: 340px; }
        #pol-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        #pol-meta { color: #111; font-family: 'Permanent Marker', cursive; padding-top: 15px; font-size: 11px; white-space: pre-line; position: relative; }

        .nav { background: #000; border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; font-size: 9px; color: #555; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); border-top: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="hdr">
        <div class="hdr-top">
            <div style="font-family:'Cormorant Garamond'; letter-spacing:2px; color:var(--gold);">PR EYE v9.0</div>
            <div id="tel-ev" style="font-size:16px; font-weight:bold; color:var(--gold);">EV 0.0</div>
        </div>
        <div class="tel-bar">
            <span>GPS: <span class="val" id="tel-gps">--</span></span>
            <span>TILT: <span class="val" id="tel-tilt">0°</span></span>
            <span>WB: <span class="val" id="tel-wb">5500K</span></span>
        </div>
    </div>

    <div id="viewport" onclick="setSamplePoint(event)">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="lvl-canvas" class="overlay"></canvas>
        <div id="marker-a" class="marker">A</div>
        <div id="marker-b" class="marker">B</div>
        <div id="marker-c" class="marker">C</div>
        <div id="rave-flash"></div>
    </div>

    <div class="main">
        <div id="page-meter" class="page active">
            <div class="hud-grid">
                <div class="hud-cell"><span class="hud-lbl">SS</span><br><span class="hud-v" id="h-ss">1/50</span></div>
                <div class="hud-cell"><span class="hud-lbl">F</span><br><span class="hud-v" id="h-f">F4.0</span></div>
                <div class="hud-cell"><span class="hud-lbl">ISO</span><br><span class="hud-v" id="h-iso">400</span></div>
            </div>
            <input type="range" id="sl-ss" min="0" max="51" value="32">
            <input type="range" id="sl-f" min="0" max="22" value="10">
            <input type="range" id="sl-iso" min="0" max="23" value="7">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <button class="btn" onclick="flipCamera()">FLIP CAM</button>
                <button class="btn" onclick="toggleLevel()">LEVEL</button>
            </div>
            <button class="btn solid" style="margin-top:10px; padding:18px;" onclick="doCapture('pol')">CAPTURE POLAROID + DATA</button>
        </div>

        <div id="page-color" class="page">
            <div class="panel">
                <div class="palette-row">
                    <div id="sw-a" class="sw">A</div>
                    <div id="sw-b" class="sw">B</div>
                    <div id="sw-c" class="sw">C</div>
                </div>
                <div class="mj-box" id="mj-pattern">/imagine prompt: pattern...</div>
                <div class="mj-box" id="mj-house">/imagine prompt: architecture...</div>
                <button class="btn solid" style="margin-top:15px;" onclick="doCapture('swatch')">EXPORT SWATCH BOARD</button>
            </div>
        </div>

        <div id="page-tools" class="page">
            <div class="panel" style="border-color:var(--magenta);">
                <h4 style="color:var(--magenta); font-size:10px; margin-bottom:10px;">TACTICAL RAVE & SIREN</h4>
                <select id="rave-mode" style="margin-bottom:10px;">
                    <option value="mode-police">Police Strobe (Red/Blue)</option>
                    <option value="mode-bw">Blue & White Strobe</option>
                    <option value="mode-rw">Red & White Strobe</option>
                    <option value="rainbow">Rainbow Sound-Activated</option>
                </select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn" id="rave-btn" onclick="toggleRave()">START RAVE</button>
                    <button class="btn danger" id="siren-btn" onclick="toggleSiren()">SIREN ON</button>
                </div>
            </div>
        </div>

        <div id="page-legal" class="page">
            <div class="panel">
                <input type="text" id="m-name" placeholder="Model Full Name">
                <canvas id="sig-pad" style="background:#fff; width:100%; height:100px; border:1px solid #000; margin:10px 0; touch-action:none;"></canvas>
                <button class="btn solid" onclick="generatePDF()">GENERATE SIGNED RELEASE</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" data-t="page-meter">Meter</div>
        <div class="nav-item" data-t="page-color">Color</div>
        <div class="nav-item" data-t="page-tools">Tools</div>
        <div class="nav-item" data-t="page-legal">Legal</div>
    </div>

    <div id="export-ovl">
        <div class="polaroid">
            <img id="pol-img">
            <div id="pol-meta"></div>
        </div>
        <button class="btn solid" style="margin-top:20px; width:340px;" id="share-btn">SAVE TO DEVICE</button>
        <button class="btn" style="width:340px;" onclick="document.getElementById('export-ovl').style.display='none'">DISCARD</button>
    </div>

    <script>
        let stream, currentFacing = 'environment', lvlActive = false, raveActive = false, sirenActive = false;
        let lat = 0, lon = 0, evVal = 0, hexList = ["#00FFFF","#FF00FF","#D4C2A1"];
        let samplePoints = [{x:0.25,y:0.25},{x:0.75,y:0.25},{x:0.5,y:0.75}];
        let activePointIdx = 0;
        let audioCtx, osc, sirenInt, analyser, dataArray;

        const video = document.getElementById('video');
        const lcan = document.getElementById('lvl-canvas');
        const lctx = lcan.getContext('2d');
        const sigPad = document.getElementById('sig-pad');
        const sctx = sigPad.getContext('2d');

        const arrSS = ['30"','25"','20"','15"','13"','10"','8"','6"','5"','4"','3.2"','2.5"','2"','1.6"','1.3"','1"','0.8"','0.6"','0.5"','0.4"','0.3"','1/4','1/5','1/6','1/8','1/10','1/13','1/15','1/20','1/25','1/30','1/40','1/50','1/60','1/80','1/100','1/125','1/160','1/200','1/250','1/320','1/400','1/500','1/640','1/800','1/1000','1/1250','1/1600','1/2000','1/2500','1/3200','1/4000'];
        const arrF = [1.2, 1.4, 1.8, 2.0, 2.8, 3.2, 3.5, 4.0, 4.5, 5.0, 5.6, 6.3, 7.1, 8.0, 9.0, 10, 11, 13, 14, 16, 18, 20, 22];
        const arrIso = [50, 100, 125, 160, 200, 250, 320, 400, 500, 640, 800, 1000, 1250, 1600, 2000, 2500, 3200, 4000, 5000, 6400, 8000, 10000, 12800, 25600];

        async function init() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing, width: { ideal: 1280 } } });
                video.srcObject = stream;
            } catch(e) { console.error(e); }
        }

        function setSamplePoint(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            samplePoints[activePointIdx] = {x, y};
            const markers = ['marker-a','marker-b','marker-c'];
            const m = document.getElementById(markers[activePointIdx]);
            m.style.left = (x*100) + '%'; m.style.top = (y*100) + '%';
            activePointIdx = (activePointIdx + 1) % 3;
        }

        function loop() {
            if(video.readyState === 4) {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 100; c.height = 100; ctx.drawImage(video, 0, 0, 100, 100);
                const pix = ctx.getImageData(0,0,100,100).data;

                const getH = (p) => {
                    const idx = (Math.floor(p.y*99)*100 + Math.floor(p.x*99))*4;
                    const r=pix[idx], g=pix[idx+1], b=pix[idx+2];
                    return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1).toUpperCase();
                };

                hexList = samplePoints.map(p => getH(p));
                ['sw-a','sw-b','sw-c'].forEach((id, i) => {
                    document.getElementById(id).style.background = hexList[i];
                    document.getElementById(id).innerText = hexList[i];
                });

                document.getElementById('mj-pattern').innerText = `/imagine prompt: seamless pattern, colors ${hexList.join(', ')} --tile`;
                document.getElementById('mj-house').innerText = `/imagine prompt: {Georgian House, Cottage, Modern Home}, sunset, colors ${hexList[0]}, ${hexList[1]} --v 6.0`;

                // EV
                let lum = 0; for(let i=0; i<pix.length; i+=4) lum += (0.299*pix[i]+0.587*pix[i+1]+0.114*pix[i+2]);
                evVal = Math.log2((lum/2500)/255 * 100/12.5).toFixed(1);
                document.getElementById('tel-ev').innerText = `EV ${evVal}`;

                if(lvlActive) {
                    lcan.width = video.clientWidth; lcan.height = video.clientHeight;
                    lctx.clearRect(0,0,lcan.width, lcan.height);
                    lctx.strokeStyle = '#4cd964'; lctx.lineWidth = 2;
                    lctx.beginPath(); lctx.moveTo(lcan.width*0.2, lcan.height/2); lctx.lineTo(lcan.width*0.8, lcan.height/2); lctx.stroke();
                }

                if(raveActive && document.getElementById('rave-mode').value === 'rainbow') {
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0; for(let i=0; i<10; i++) sum += dataArray[i];
                    if(sum > 1000) document.getElementById('rave-flash').style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
                    else document.getElementById('rave-flash').style.backgroundColor = 'transparent';
                }
            }
            requestAnimationFrame(loop);
        }

        async function toggleRave() {
            raveActive = !raveActive;
            const flash = document.getElementById('rave-flash');
            const mode = document.getElementById('rave-mode').value;
            if(raveActive) {
                if(mode === 'rainbow') {
                    if(!audioCtx) audioCtx = new AudioContext();
                    const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const source = audioCtx.createMediaStreamSource(micStream);
                    analyser = audioCtx.createAnalyser();
                    source.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                } else {
                    flash.className = mode;
                }
                flash.style.display = 'block';
                document.getElementById('rave-btn').innerText = 'STOP';
            } else {
                flash.style.display = 'none'; flash.className = '';
                document.getElementById('rave-btn').innerText = 'START RAVE';
            }
        }

        function toggleSiren() {
            if(sirenActive) { if(osc) osc.stop(); sirenActive = false; clearInterval(sirenInt); }
            else {
                if(!audioCtx) audioCtx = new AudioContext();
                osc = audioCtx.createOscillator(); osc.type = 'square'; osc.connect(audioCtx.destination);
                osc.start(); sirenActive = true; let t = true;
                sirenInt = setInterval(() => { osc.frequency.setValueAtTime(t?435:580, audioCtx.currentTime); t=!t; }, 400);
                document.getElementById('siren-btn').innerText = 'STOP';
            }
        }

        async function doCapture(m) {
            const can = document.createElement('canvas'); can.width = 1200; can.height = 1200; const ctx = can.getContext('2d');
            if(m === 'pol') {
                const s = Math.min(video.videoWidth, video.videoHeight);
                ctx.drawImage(video, (video.videoWidth-s)/2, (video.videoHeight-s)/2, s, s, 0, 0, 1200, 1200);
                hexList.forEach((h, i) => { ctx.fillStyle = h; ctx.fillRect(1000+(i*50), 1050, 40, 40); });
            } else {
                ctx.fillStyle = hexList[0]; ctx.fillRect(0,0,1200,700); ctx.fillStyle = hexList[1]; ctx.fillRect(0,700,1200,350); ctx.fillStyle = hexList[2]; ctx.fillRect(0,1050,1200,150);
            }
            const data = can.toDataURL('image/jpeg', 0.9);
            document.getElementById('pol-img').src = data;
            document.getElementById('pol-meta').innerText = `GPS: ${lat.toFixed(4)}, ${lon.toFixed(4)} | EV: ${evVal}\nCOLORS: ${hexList.join(', ')}\nPR EYE TACTICAL`;
            document.getElementById('export-ovl').style.display = 'flex';
            document.getElementById('share-btn').onclick = async () => {
                const b = await (await fetch(data)).blob();
                const f = new File([b], `PREYE_${Date.now()}.jpg`, {type:'image/jpeg'});
                if(navigator.share) await navigator.share({files:[f]});
            };
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFontSize(18); doc.text('MODEL RELEASE FORM', 105, 20, {align:'center'});
            doc.setFontSize(10); doc.text('I hereby grant to the Photographer irrevocable, perpetual rights to use the content...', 20, 40, {maxWidth: 170});
            doc.text(`Model Name: ${document.getElementById('m-name').value}`, 20, 80);
            doc.addImage(sigPad.toDataURL(), 'PNG', 20, 90, 60, 20);
            doc.save('PR_Eye_Release.pdf');
        }

        // INIT & EVENT BINDING
        let isDrawing = false;
        sigPad.addEventListener('pointerdown', e => { isDrawing = true; sctx.beginPath(); sctx.moveTo(e.offsetX, e.offsetY); });
        sigPad.addEventListener('pointermove', e => { if(isDrawing) { sctx.lineTo(e.offsetX, e.offsetY); sctx.stroke(); } });
        sigPad.addEventListener('pointerup', () => isDrawing = false);

        document.querySelectorAll('.nav-item').forEach(i => i.onclick = () => {
            document.querySelectorAll('.nav-item, .page').forEach(x => x.classList.remove('active'));
            i.classList.add('active'); document.getElementById(i.dataset.t).classList.add('active');
        });

        const updateHUD = () => {
            document.getElementById('h-ss').innerText = arrSS[document.getElementById('sl-ss').value];
            document.getElementById('h-f').innerText = 'F' + arrF[document.getElementById('sl-f').value];
            document.getElementById('h-iso').innerText = arrIso[document.getElementById('sl-iso').value];
        };
        ['sl-ss','sl-f','sl-iso'].forEach(id => document.getElementById(id).oninput = updateHUD);
        
        navigator.geolocation.watchPosition(p => { lat = p.coords.latitude; lon = p.coords.longitude; document.getElementById('tel-gps').innerText = `${lat.toFixed(2)},${lon.toFixed(2)}`; });
        window.addEventListener('deviceorientation', e => { document.getElementById('tel-tilt').innerText = Math.round(e.beta) + '°'; });

        init(); loop(); updateHUD();
    </script>
</body>
</html>
