<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye — Bespoke Photography Toolkit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --navy: #0d1b2a; --navy2: #112233; --navy3: #1a2f45;
            --gold: #f0c040; --gold2: #c89a18;
            --text: #d4e0ec; --muted: #5a7090; --border: #1e3a52;
            --red: #e05050; --green: #40c080;
            --base: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--navy); color: var(--text); font-family: 'DM Mono', monospace; font-size: var(--base); display: flex; flex-direction: column; height: 100dvh; }

        /* HEADER (Restored) */
        .hdr { background: var(--navy2); border-bottom: 2px solid var(--gold); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: relative; }
        .hdr::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(240,192,64,.4), transparent); }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--gold); letter-spacing: .06em; line-height: 1; }
        .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: .2em; text-transform: uppercase; margin-top: 4px; }
        
        .hdr-local-btn { background: transparent; border: 1px solid var(--border); color: var(--gold); font-size: 12px; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace; display: flex; align-items: center; gap: 5px; }

        /* TABS (Restored bottom nav) */
        .tabs { display: flex; background: var(--navy2); border-top: 1px solid var(--border); flex-shrink: 0; margin-top: auto; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); cursor: pointer; border-top: 2px solid transparent; transition: all .2s; }
        .tab.active { color: var(--gold); border-top-color: var(--gold); background: rgba(240,192,64,0.05); }

        /* PAGES */
        .pages { flex: 1; overflow-y: auto; position: relative; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CAMERA & MEDIA */
        .cam-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 15px; }
        .cam-wrap video, .cam-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cam-wrap img { display: none; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 40px; height: 40px; border: 1px solid rgba(240,192,64,0.5); pointer-events: none; }

        /* BUTTONS */
        .btn { display: flex; align-items: center; justify-content: center; padding: 15px; min-height: 55px; border: 1.5px solid var(--gold); background: transparent; color: var(--gold); font-family: 'DM Mono', monospace; font-size: 15px; font-weight: bold; text-transform: uppercase; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 12px; }
        .btn.solid { background: var(--gold); color: var(--navy); }
        .btn-row { display: flex; gap: 10px; }
        
        /* DATA DISPLAYS */
        .reading-box { background: var(--navy2); border: 1px solid var(--border); padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px; }
        .reading-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 5px; }
        .reading-value { font-size: 2em; font-weight: bold; color: var(--gold); }

        /* 4-COLOR PANTONE GRID (Restored) */
        .pan4-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .pan-chip { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .pan-color { height: 60px; width: 100%; }
        .pan-info { background: var(--navy2); padding: 8px; text-align: center; font-size: 11px; }
        .pan-info strong { display: block; color: var(--gold); font-size: 14px; margin-bottom: 2px; }

        /* FORMS */
        input, textarea { width: 100%; padding: 15px; margin-bottom: 12px; background: var(--navy2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-family: inherit; font-size: 16px; }
        .signature-pad { border: 2px dashed var(--muted); background: #fff; touch-action: none; border-radius: 8px; width: 100%; margin-bottom: 10px; }

        /* NATIVE CAMERA BACKUP */
        .native-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 15px; }
        .native-wrapper input[type=file] { position: absolute; top: 0; right: 0; min-width: 100%; min-height: 100%; opacity: 0; outline: none; background: white; cursor: inherit; display: block; }
        
        /* COMPOSITE SHARE */
        #composite-share-container { position: fixed; top: -9999px; left: -9999px; width: 1200px; height: 630px; display: flex; background: var(--navy); z-index: -1; }
        #composite-photo { flex: 1; background-size: cover; background-position: center; }
        #composite-details { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; background: var(--navy2); border-left: 4px solid var(--gold); }
        .c-swatch-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .c-swatch { flex: 1; height: 100px; border-radius: 8px; }
        .c-title { font-family: 'Cormorant Garamond'; font-size: 50px; color: var(--gold); margin-bottom: 10px;}
    </style>
</head>
<body>

    <div class="hdr">
        <div>
            <div class="brand-name">PR EYE</div>
            <div class="brand-sub">Bespoke Photography Toolkit</div>
        </div>
        <div class="hdr-right">
            <button id="cam-switch-btn" class="hdr-local-btn">🔄 Flip Cam</button>
        </div>
    </div>

    <div class="pages">
        
        <div id="page-meter" class="page active">
            <div class="cam-wrap">
                <video id="video" autoplay playsinline webkit-playsinline></video>
                <img id="captured-img" alt="Captured Frame">
                <canvas id="canvas" style="display:none;"></canvas>
                <div class="crosshair"></div>
            </div>

            <div class="btn-row">
                <button id="analyze-btn" class="btn solid" style="flex:2;">Analyze Light</button>
            </div>
            
            <div class="native-wrapper">
                 <button class="btn">📷 Manual Photo Fallback</button>
                 <input type="file" id="native-camera" accept="image/*" capture="environment">
            </div>

            <div class="btn-row">
                <div class="reading-box" style="flex:1;">
                    <span class="reading-label">Kelvin Temp</span>
                    <span id="kelvin-val" class="reading-value">--- K</span>
                </div>
                <div class="reading-box" style="flex:1;">
                    <span class="reading-label">Exposure Value</span>
                    <span id="ev-val" class="reading-value">--- EV</span>
                </div>
            </div>
            <div class="reading-box">
                <span class="reading-label">Godox Recommendation</span>
                <div id="godox-rec" style="color: var(--gold); font-size: 1.2em;">Awaiting Analysis...</div>
            </div>
        </div>

        <div id="page-color" class="page">
            <button id="extract-palette-btn" class="btn solid">Extract 4-Color Palette</button>
            
            <div id="palette-grid" class="pan4-grid" style="display:none;">
                <div class="pan-chip"><div class="pan-color" id="pan-c1"></div><div class="pan-info"><strong id="pan-n1">--</strong><span id="pan-h1">--</span></div></div>
                <div class="pan-chip"><div class="pan-color" id="pan-c2"></div><div class="pan-info"><strong id="pan-n2">--</strong><span id="pan-h2">--</span></div></div>
                <div class="pan-chip"><div class="pan-color" id="pan-c3"></div><div class="pan-info"><strong id="pan-n3">--</strong><span id="pan-h3">--</span></div></div>
                <div class="pan-chip"><div class="pan-color" id="pan-c4"></div><div class="pan-info"><strong id="pan-n4">--</strong><span id="pan-h4">--</span></div></div>
            </div>

            <button id="share-composite-btn" class="btn" style="display:none;">Share Match Composite</button>
        </div>

        <div id="page-release" class="page">
            <h2 style="color:var(--gold); margin-bottom: 15px;">Model Release Form</h2>
            <input type="text" id="r-shoot" placeholder="Shoot Reference">
            <input type="date" id="r-date">
            <input type="text" id="r-name" placeholder="Model Full Name">
            <input type="email" id="r-email" placeholder="Model Email">
            
            <p style="font-size: 12px; color: var(--muted); margin-bottom: 10px;">Model Signature:</p>
            <canvas id="sig-model" class="signature-pad" height="150"></canvas>
            <button class="btn sm" id="clear-sig-model" style="min-height: 40px;">Clear Model Sig</button>

            <p style="font-size: 12px; color: var(--muted); margin-top: 20px; margin-bottom: 10px;">Witness Details & Signature:</p>
            <input type="text" id="r-witness" placeholder="Witness Full Name">
            <canvas id="sig-witness" class="signature-pad" height="150"></canvas>
            <button class="btn sm" id="clear-sig-witness" style="min-height: 40px;">Clear Witness Sig</button>

            <button id="btn-pdf" class="btn solid" style="margin-top: 20px;">1. Download PDF</button>
            <button id="btn-email" class="btn">2. Open Email Draft</button>
        </div>

    </div>

    <div class="tabs">
        <div class="tab active" data-target="page-meter"><span style="font-size: 20px; display:block; margin-bottom: 4px;">📷</span> Meter</div>
        <div class="tab" data-target="page-color"><span style="font-size: 20px; display:block; margin-bottom: 4px;">🎨</span> Pantone</div>
        <div class="tab" data-target="page-release"><span style="font-size: 20px; display:block; margin-bottom: 4px;">📝</span> Release</div>
    </div>

    <div id="composite-share-container">
        <div id="composite-photo"></div>
        <div id="composite-details">
            <div class="c-title">PR EYE: Palette Extraction</div>
            <div class="c-swatch-row">
                <div class="c-swatch" id="cs1"></div><div class="c-swatch" id="cs2"></div>
            </div>
            <div class="c-swatch-row">
                <div class="c-swatch" id="cs3"></div><div class="c-swatch" id="cs4"></div>
            </div>
            <div style="font-size: 24px; color: var(--muted);">Generated by PR Eye Pro</div>
        </div>
    </div>

<script>
    // --- State & Elements ---
    const video = document.getElementById('video');
    const imgDisplay = document.getElementById('captured-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let stream = null;
    let currentFacingMode = 'environment';
    let lastImageURI = null;
    let extractedPalette = []; // Stores the 4 colors

    // --- Tab Navigation ---
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.target).classList.add('active');
        });
    });

    // --- Camera System (With Switcher) ---
    async function startCamera() {
        if (stream) stream.getTracks().forEach(track => track.stop());
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: currentFacingMode, width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
            video.style.display = 'block';
            imgDisplay.style.display = 'none';
        } catch (err) {
            console.warn("Camera fallback needed.");
        }
    }

    document.getElementById('cam-switch-btn').addEventListener('click', () => {
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
        startCamera();
    });

    document.getElementById('native-camera').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            if (stream) stream.getTracks().forEach(track => track.stop());
            video.style.display = 'none';
            imgDisplay.style.display = 'block';
            const reader = new FileReader();
            reader.onload = (event) => { imgDisplay.src = event.target.result; };
            reader.readAsDataURL(file);
        }
    });

    // --- Light Meter Analysis ---
    document.getElementById('analyze-btn').addEventListener('click', () => {
        const source = video.style.display !== 'none' ? video : imgDisplay;
        if (!source.srcObject && !source.src) return alert("No image source.");
        
        canvas.width = source.videoWidth || source.naturalWidth;
        canvas.height = source.videoHeight || source.naturalHeight;
        ctx.drawImage(source, 0, 0, canvas.width, canvas.height);
        lastImageURI = canvas.toDataURL('image/jpeg', 0.8);

        // Simple Center Analysis for Meter
        const frameData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let r=0, b=0, l=0, count=0;
        for(let i=0; i<frameData.length; i+=40) { // check every 10th pixel for speed
            r += frameData[i]; b += frameData[i+2];
            l += (0.299*frameData[i] + 0.587*frameData[i+1] + 0.114*frameData[i+2]);
            count++;
        }
        const kelvin = 5500 * ((b/count) / (r/count));
        const ev = Math.log2(((l/count) / 255) * 100 / 12.5);

        document.getElementById('kelvin-val').innerText = `${Math.round(kelvin)} K`;
        document.getElementById('ev-val').innerText = ev.toFixed(1);
        
        let rec = "Neutral / Daylight";
        if (kelvin < 3500) rec = "Warm: Add CTO Gel";
        if (kelvin > 6500) rec = "Cool: Add CTB Gel";
        document.getElementById('godox-rec').innerText = rec;
        
        alert("Reading captured! Check Pantone tab to extract palette.");
    });

    // --- 4-Color Pantone Logic (Restored) ---
    const pantoneDb = [
        { n: "PMS 123 C", hex: "#FFC72C" }, { n: "PMS 186 C", hex: "#C8102E" },
        { n: "PMS 286 C", hex: "#0032A0" }, { n: "Cool Gray 9", hex: "#75787B" },
        { n: "PMS 354 C", hex: "#00B140" }, { n: "PMS 258 C", hex: "#8246AF" }
    ];

    function getHex(r,g,b) { return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1).toUpperCase(); }
    function hexToRgb(hex) { const m=hex.match(/\w\w/g); return [parseInt(m[0],16),parseInt(m[1],16),parseInt(m[2],16)]; }
    
    function findClosestPantone(hex) {
        const target = hexToRgb(hex);
        let closest = pantoneDb[0], minD = Infinity;
        pantoneDb.forEach(p => {
            const rgb = hexToRgb(p.hex);
            const d = Math.pow(target[0]-rgb[0],2) + Math.pow(target[1]-rgb[1],2) + Math.pow(target[2]-rgb[2],2);
            if(d < minD) { minD = d; closest = p; }
        });
        return closest;
    }

    document.getElementById('extract-palette-btn').addEventListener('click', () => {
        if (!lastImageURI) return alert("Please capture an image in the Meter tab first.");
        
        // Quick & dirty 4-quadrant extraction to simulate clustering
        const w = canvas.width, h = canvas.height;
        const qData = [
            ctx.getImageData(0,0,w/2,h/2).data, ctx.getImageData(w/2,0,w/2,h/2).data,
            ctx.getImageData(0,h/2,w/2,h/2).data, ctx.getImageData(w/2,h/2,w/2,h/2).data
        ];
        
        extractedPalette = qData.map(data => {
            let r=0,g=0,b=0;
            for(let i=0; i<data.length; i+=40) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
            const len = data.length/40;
            return getHex(Math.round(r/len), Math.round(g/len), Math.round(b/len));
        });

        extractedPalette.forEach((hex, i) => {
            const pan = findClosestPantone(hex);
            document.getElementById(`pan-c${i+1}`).style.backgroundColor = hex;
            document.getElementById(`pan-n${i+1}`).innerText = pan.n;
            document.getElementById(`pan-h${i+1}`).innerText = hex;
            document.getElementById(`cs${i+1}`).style.backgroundColor = hex; // For share composite
        });

        document.getElementById('palette-grid').style.display = 'grid';
        document.getElementById('share-composite-btn').style.display = 'block';
    });

    // --- Composite Share (v5 functionality) ---
    document.getElementById('share-composite-btn').addEventListener('click', async () => {
        if (!navigator.share) return alert("Sharing not supported here.");
        const btn = document.getElementById('share-composite-btn');
        btn.innerText = "Generating...";
        
        document.getElementById('composite-photo').style.backgroundImage = `url(${lastImageURI})`;
        const container = document.getElementById('composite-share-container');
        
        const cCanvas = await html2canvas(container, { scale: 1 });
        cCanvas.toBlob(async (blob) => {
            const file = new File([blob], "pr-eye-palette.png", { type: "image/png" });
            try { await navigator.share({ files: [file], title: 'PR Eye Palette' }); } catch(e){}
            btn.innerText = "Share Match Composite";
        });
    });

    // --- PDF Model Release (v5 functionality) ---
    function setupPad(id, btnId) {
        const can = document.getElementById(id), c = can.getContext('2d');
        can.width = can.offsetWidth; can.height = 150;
        let drawing = false;
        const pos = e => { const r = can.getBoundingClientRect(), t = e.touches ? e.touches[0] : e; return {x: t.clientX - r.left, y: t.clientY - r.top}; };
        ['mousedown','touchstart'].forEach(e => can.addEventListener(e, ev => { drawing=true; c.beginPath(); const p=pos(ev); c.moveTo(p.x,p.y); ev.preventDefault(); }));
        ['mousemove','touchmove'].forEach(e => can.addEventListener(e, ev => { if(!drawing)return; const p=pos(ev); c.lineTo(p.x,p.y); c.stroke(); ev.preventDefault(); }));
        ['mouseup','touchend'].forEach(e => can.addEventListener(e, () => drawing=false));
        document.getElementById(btnId).addEventListener('click', () => c.clearRect(0,0,can.width,can.height));
    }
    setupPad('sig-model', 'clear-sig-model');
    setupPad('sig-witness', 'clear-sig-witness');

    document.getElementById('btn-pdf').addEventListener('click', () => {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFontSize(22); doc.text("Model Release Form", 20, 20);
        doc.setFontSize(12);
        doc.text(`Shoot: ${document.getElementById('r-shoot').value}`, 20, 40);
        doc.text(`Date: ${document.getElementById('r-date').value}`, 20, 50);
        doc.text(`Model Name: ${document.getElementById('r-name').value}`, 20, 60);
        doc.text(`Model Email: ${document.getElementById('r-email').value}`, 20, 70);
        doc.text(`Witness Name: ${document.getElementById('r-witness').value}`, 20, 80);
        
        doc.text("Model Signature:", 20, 100);
        doc.addImage(document.getElementById('sig-model').toDataURL(), 'PNG', 20, 105, 80, 40);
        doc.text("Witness Signature:", 20, 160);
        doc.addImage(document.getElementById('sig-witness').toDataURL(), 'PNG', 20, 165, 80, 40);
        
        doc.save(`Release_${document.getElementById('r-name').value || 'Draft'}.pdf`);
    });

    document.getElementById('btn-email').addEventListener('click', () => {
        const email = document.getElementById('r-email').value;
        window.location.href = `mailto:${email}?subject=Model Release&body=Please find the attached PDF release.`;
    });

    // Boot
    document.getElementById('r-date').value = new Date().toISOString().split('T')[0];
    startCamera();
</script>
</body>
</html>
