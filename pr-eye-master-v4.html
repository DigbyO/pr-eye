<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye v4.6 — Master Recovery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root {
            --navy: #09121c; --border: rgba(255, 255, 255, 0.08);
            --gold: #d4c2a1; --muted: #8b9bb4; --text: #f0f4f8;
            --red: #ff4d4d; --cyan: #00ffff; --canon-orange: #f39c12;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--navy); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .brand { font-family: 'Cormorant Garamond'; font-size: 18px; color: var(--gold); letter-spacing: 2px; text-align: center; }

        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        .page { display: none; } .page.active { display: block; }

        #persistent-cam-area { margin-bottom: 15px; display: flex; flex-direction: column; }
        .viewfinder-wrap { display: flex; gap: 10px; height: 180px; margin-bottom: 10px; }
        .cam-container { position: relative; flex: 1; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        .pro-meter-display { text-align: center; margin-bottom: 15px; }
        #ev-big-val { font-family: 'Cormorant Garamond'; font-size: 72px; color: var(--gold); line-height: 1; }

        .btn { padding: 12px; background: transparent; border: 1px solid rgba(212,194,161,0.3); color: var(--gold); border-radius: 8px; cursor: pointer; flex: 1; font-size: 10px; text-transform: uppercase; }
        .btn.solid { background: var(--gold); color: #000; font-weight: bold; border: none; }
        
        .nav { background: rgba(9, 18, 28, 0.95); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; color: var(--muted); font-size: 9px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        #sos-flash-overlay { display: none; position: fixed; inset: 0; z-index: 9998; pointer-events: none; }
        .mode-dynamic { animation: var(--sos-anim, strobeWhite) var(--sos-speed, 0.5s) infinite; }
        @keyframes strobeWhite { 0%, 49% { background: #fff; } 50%, 100% { background: #000; } }
    </style>
</head>
<body>

    <div class="hdr" id="main-hdr">
        <div class="brand">PR EYE v4.6 MASTER</div>
    </div>

    <div class="main-content">
        <div id="persistent-cam-area">
            <div class="viewfinder-wrap">
                <div class="cam-container" id="cam-wrapper">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="ui-layer" class="overlay"></canvas>
                </div>
            </div>
            <button id="capture-btn" class="btn solid">CAPTURE FRAME</button>
        </div>

        <div id="page-meter" class="page active">
            <div class="pro-meter-display">
                <div id="ev-big-val">0.0</div>
                <div style="color: var(--muted); font-size: 11px;">EXPOSURE VALUE</div>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="fc-toggle-btn" class="btn">F-COL: OFF</button>
                <button id="torch-btn" class="btn">TORCH</button>
            </div>
        </div>

        <div id="page-color" class="page">
            <h4 style="color:var(--gold)">Color Palette</h4>
            <div id="mj-prompt-output" style="font-size:10px; background:#000; padding:10px; border-radius:5px; margin-top:10px; min-height:50px;">Waiting for data...</div>
        </div>

        <div id="page-scout" class="page">
            <h4 style="color:var(--gold)">Location</h4>
            <button class="btn" id="btn-fetch-loc" style="width:100%">Sync GPS</button>
        </div>
    </div>

    <div id="sos-flash-overlay"></div>

    <div class="nav">
        <div class="nav-item active" data-target="page-meter">Meter</div>
        <div class="nav-item" data-target="page-color">Color</div>
        <div class="nav-item" data-target="page-scout">Scout</div>
    </div>

    <canvas id="proc-canvas" width="300" height="400" style="display:none"></canvas>

<script>
    const video = document.getElementById('video');
    const procCanvas = document.getElementById('proc-canvas');
    const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });
    let stream = null;

    async function startCamera() {
        try {
            if(stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;
            video.play();
        } catch (e) {
            console.error("Camera fail:", e);
        }
    }

    // Tab Switching Logic
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            nav.classList.add('active');
            const target = nav.getAttribute('data-target');
            document.getElementById(target).classList.add('active');
            
            // Re-trigger camera on first interaction if needed
            if(!stream) startCamera();
        });
    });

    // Exposure Loop
    function updateMeter() {
        if (video.readyState === 4) {
            procCtx.drawImage(video, 0, 0, 300, 400);
            const data = procCtx.getImageData(140, 190, 20, 20).data;
            let total = 0;
            for(let i=0; i<data.length; i+=4) {
                total += (data[i] + data[i+1] + data[i+2]) / 3;
            }
            const avg = total / (data.length / 4);
            const ev = Math.log2((avg / 255) * 100 / 12.5);
            document.getElementById('ev-big-val').innerText = ev.toFixed(1);
        }
        requestAnimationFrame(updateMeter);
    }

    // Auto-start
    window.addEventListener('load', () => {
        startCamera();
        updateMeter();
    });

    // Handle visibility (prevents freeze when switching apps)
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) startCamera();
    });
</script>
</body>
</html>
