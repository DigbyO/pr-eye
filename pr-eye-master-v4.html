<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye v2.0 — Pro Toolkit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --navy: #09121c; --navy-glass: rgba(20, 36, 56, 0.4); 
            --border: rgba(255, 255, 255, 0.08);
            --gold: #d4c2a1; --gold-dim: rgba(212, 194, 161, 0.15);
            --text: #f0f4f8; --muted: #8b9bb4;
            --red: #ff4d4d; --blue: #4d4dff; --green: #4dff4d;
            --whatsapp: #25d366;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #09121c; color: #f0f4f8; font-family: 'DM Mono', monospace; font-size: 14px; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        h1, h2, h3, h4 { font-family: 'Cormorant Gramand', serif; color: var(--gold); font-weight: 400; letter-spacing: 0.5px; margin-bottom: 8px;}
        
        .glass-panel { background: rgba(20, 36, 56, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
        .hdr { background: linear-gradient(180deg, rgba(9,18,28,1) 0%, rgba(9,18,28,0) 100%); padding: 15px 15px 25px 15px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .hdr-top { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Cormorant Garamond'; font-size: 22px; color: var(--gold); letter-spacing: 2px; display: flex; align-items: center; font-weight: 500;}
        
        .telemetry-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-radius: 50px; margin-top: 10px; }
        .tel-item { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; letter-spacing: 1px;}
        .ev-good { color: var(--green); }

        .main-content { flex: 1; overflow-y: auto; position: relative; padding: 0 15px 90px 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .cam-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .btn { padding: 12px; background: transparent; border: 1px solid rgba(212,194,161,0.3); color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex: 1; transition: 0.2s;}
        .btn.solid { background: var(--gold); color: #09121c; font-weight: 600;}
        .btn.whatsapp { background: var(--whatsapp); color: #fff; border: none; font-weight: 600;}
        .btn.danger { background: var(--red); color: #fff; border: none;}
        
        .ctrl-panel { border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .label-txt { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 2px; opacity: 0.8;}
        input, select, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--gold); padding: 8px 0; font-family: inherit; font-size: 14px; margin-bottom: 12px; outline: none;}

        .toggle-switch { display: flex; border: 1px solid var(--border); border-radius: 50px; overflow: hidden; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 4px;}
        .toggle-opt { flex: 1; text-align: center; padding: 10px; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 500; border-radius: 40px;}
        .toggle-opt.active { background: var(--gold); color: #09121c; }

        .signature-pad { background: #fff; border-radius: 8px; width: 100%; border: none; touch-action: none; margin-bottom: 5px;}

        .nav { background: rgba(9, 18, 28, 0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; color: var(--muted); font-size: 9px; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item svg { width: 18px; height: 18px; margin-bottom: 4px; stroke: currentColor; stroke-width: 1.5; fill: none; }

        #sos-flash-overlay { display: none; position: fixed; inset: 0; z-index: 9998; pointer-events: none; }
        #sos-flash-overlay.strobe-active { display: block; animation: strobeRedBlue 0.4s infinite; }
        @keyframes strobeRedBlue { 0% { background: rgba(255,0,0,0.8); } 50% { background: rgba(0,0,255,0.8); } }

        #result-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #result-img { max-width: 100%; max-height: 70vh; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="hdr" id="main-hdr">
        <div class="hdr-top">
            <div class="brand">PR EYE v2.0</div>
            <div style="display:flex; gap:5px;">
                <button id="toggle-sound" class="btn active-toggle" style="width:40px; padding:0;">🔊</button>
                <button id="cam-flip-btn" class="btn" style="width:40px; padding:0;">🔄</button>
            </div>
        </div>
        <div class="telemetry-bar glass-panel">
            <div class="tel-item">EV <span id="tel-ev" class="ev-good">0.0</span></div>
            <div class="tel-item" style="color:var(--gold)">WB <span id="tel-wb">5500 K</span></div>
            <div class="tel-item" style="color:var(--muted)">GPS <span id="tel-gps">OK</span></div>
        </div>
    </div>

    <div class="main-content">
        <div id="persistent-cam-area">
            <div class="cam-container" id="cam-wrapper">
                <video id="video" autoplay playsinline webkit-playsinline></video>
                <canvas id="scout-layer" class="overlay"></canvas>
                <canvas id="ui-layer" class="overlay"></canvas>
            </div>
            <div class="action-row" style="display:flex; gap:10px;">
                <button id="capture-btn" class="btn solid">CAPTURE</button>
            </div>
        </div>

        <div id="page-meter" class="page active">
            <div class="ctrl-panel glass-panel">
                <div class="row" style="display:flex; gap:10px;">
                    <div style="flex:1;"><span class="label-txt">ISO</span><select id="set-iso"><option>100</option><option selected>400</option><option>800</option><option>1600</option></select></div>
                    <div style="flex:1;"><span class="label-txt">f/</span><select id="set-aperture"><option>2.8</option><option selected>5.6</option><option>8.0</option><option>11</option></select></div>
                </div>
            </div>
        </div>

        <div id="page-color" class="page">
            <div class="ctrl-panel glass-panel">
                <h4>Primary Swatches</h4>
                <div id="color-results" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div style="height:60px; background:#222; border-radius:8px;" id="swatch-1"></div>
                    <div style="height:60px; background:#444; border-radius:8px;" id="swatch-2"></div>
                </div>
            </div>
        </div>

        <div id="page-scout" class="page">
            <div class="ctrl-panel glass-panel">
                <h4>Ephemeris</h4>
                <div style="display:flex; justify-content:space-between; margin:10px 0;">
                    <span class="label-txt">Heading</span><span id="scout-heading">--°</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin:10px 0;">
                    <span class="label-txt">Sunrise</span><span id="scout-sunrise">--:--</span>
                </div>
            </div>
        </div>

        <div id="page-release" class="page">
            <div class="ctrl-panel glass-panel">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><span class="label-txt">Date</span><input type="date" id="r-date"></div>
                    <div style="flex:1;"><span class="label-txt">Loc</span><input type="text" id="r-loc" placeholder="London"></div>
                </div>
                <h4>Model Details</h4>
                <input type="text" id="r-name" placeholder="Full Name">
                <input type="text" id="r-address" placeholder="Residential Address">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="r-dob" placeholder="DOB">
                    <input type="tel" id="r-phone" placeholder="Phone">
                </div>
                <input type="email" id="r-email" placeholder="Email">
                <input type="text" id="r-comp" placeholder="Compensation (e.g. £100 / TFP)">

                <div class="toggle-switch">
                    <div class="toggle-opt active" id="tog-adult">Adult</div>
                    <div class="toggle-opt" id="tog-minor">Minor</div>
                </div>

                <div id="guardian-section" style="display:none; border-top:1px solid var(--border); padding-top:15px; margin-top:15px;">
                    <h4>Guardian Consent</h4>
                    <input type="text" id="r-g-name" placeholder="Guardian Name">
                    <span class="label-txt">Guardian Signature</span>
                    <canvas id="sig-guardian" class="signature-pad" height="100"></canvas>
                </div>

                <h4>Witness Details</h4>
                <input type="text" id="r-w-name" placeholder="Witness Name">
                <input type="text" id="r-w-address" placeholder="Witness Address">
                <span class="label-txt">Witness Signature</span>
                <canvas id="sig-witness" class="signature-pad" height="100"></canvas>

                <h4>Finalize</h4>
                <span class="label-txt">Model Signature</span>
                <canvas id="sig-model" class="signature-pad" height="100"></canvas>
                <span class="label-txt">Photographer Signature</span>
                <canvas id="sig-photog" class="signature-pad" height="100"></canvas>
                
                <div style="display:flex; gap:10px;">
                    <button id="gen-pdf-btn" class="btn solid">Generate PDF</button>
                    <button id="btn-whatsapp" class="btn whatsapp">WhatsApp Share</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" data-target="page-meter" data-cam="true"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20" stroke="currentColor"/></svg>Meter</div>
        <div class="nav-item" data-target="page-color" data-cam="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" stroke="currentColor"/></svg>Color</div>
        <div class="nav-item" data-target="page-scout" data-cam="true"><svg viewBox="0 0 24 24"><path d="M12 2L15 9H9L12 2Z" stroke="currentColor"/></svg>Scout</div>
        <div class="nav-item" data-target="page-release" data-cam="false"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor"/></svg>Legal</div>
    </div>

    <div id="result-overlay">
        <img id="result-img">
        <div style="display:flex; gap:10px; width:100%; margin-top:15px;">
            <button class="btn solid" id="btn-share-result">Share</button>
            <button class="btn" onclick="document.getElementById('result-overlay').style.display='none'">Close</button>
        </div>
    </div>

    <canvas id="composite-canvas" width="1000" height="1500" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const scoutCtx = document.getElementById('scout-layer').getContext('2d');
    const uiCtx = document.getElementById('ui-layer').getContext('2d');
    let currentLat = 51.5074, currentLon = -0.1278, currentHeading = 0;
    let stream, currentTab = 'page-meter';

    // PHOTOGRAPHER HARDCODED DETAILS
    const PHOTOG_INFO = "Digby Oldridge, PR Eye Ltd | Downs Cottage, Fernham Rd, Longcot, SN7 7TG | Tel: 07879 403 618 | info@preye.co.uk";

    async function startCamera() {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            const r = video.getBoundingClientRect();
            [scoutCtx.canvas, uiCtx.canvas].forEach(c => { c.width = r.width; c.height = r.height; });
            requestAnimationFrame(liveLoop);
        };
    }

    function liveLoop() {
        if(video.readyState === 4) {
            const sw = scoutCtx.canvas.width, sh = scoutCtx.canvas.height;
            scoutCtx.clearRect(0,0,sw,sh);
            
            // Scout Compass + Sun Logic
            scoutCtx.save();
            scoutCtx.translate(sw/2, sh/2);
            scoutCtx.rotate(-currentHeading * Math.PI/180);
            scoutCtx.strokeStyle = 'rgba(212,194,161,0.5)';
            scoutCtx.beginPath(); scoutCtx.arc(0,0,100,0,Math.PI*2); scoutCtx.stroke();
            
            // Sun indicator
            scoutCtx.fillStyle = '#ffb347';
            scoutCtx.beginPath(); scoutCtx.arc(0, -100, 8, 0, Math.PI*2); scoutCtx.fill();
            scoutCtx.font = 'bold 12px DM Mono';
            scoutCtx.fillText('SUN', 15, -95);
            scoutCtx.restore();
        }
        requestAnimationFrame(liveLoop);
    }

    // CAPTURE SYSTEM (With GPS on ALL exports)
    document.getElementById('capture-btn').addEventListener('click', () => {
        const can = document.getElementById('composite-canvas');
        const ctx = can.getContext('2d');
        const _imgH = 1200; // Moved outside block to fix crash scope

        ctx.fillStyle = '#f8f8f8'; ctx.fillRect(0,0,1000,1500);
        ctx.drawImage(video, 50, 50, 900, _imgH);
        
        // GPS Stamp
        ctx.fillStyle = '#1a1a1a';
        ctx.font = '24px "Permanent Marker"';
        ctx.fillText(`GPS: ${currentLat.toFixed(5)}, ${currentLon.toFixed(5)}`, 70, 1300);
        ctx.font = '20px "DM Mono"';
        ctx.fillText(`Mode: ${currentTab.replace('page-','').toUpperCase()}`, 70, 1340);
        
        document.getElementById('result-img').src = can.toDataURL('image/jpeg');
        document.getElementById('result-overlay').style.display = 'flex';
    });

    // LEGAL LOGIC
    document.getElementById('tog-minor').onclick = () => {
        document.getElementById('guardian-section').style.display = 'block';
        document.getElementById('tog-minor').classList.add('active');
        document.getElementById('tog-adult').classList.remove('active');
    };
    document.getElementById('tog-adult').onclick = () => {
        document.getElementById('guardian-section').style.display = 'none';
        document.getElementById('tog-adult').classList.add('active');
        document.getElementById('tog-minor').classList.remove('active');
    };

    // PDF REBUILD
    document.getElementById('gen-pdf-btn').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const modelName = document.getElementById('r-name').value || "Model";

        doc.setFontSize(18); doc.text("MODEL RELEASE FORM", 105, 20, {align:'center'});
        doc.setFontSize(8); doc.text(PHOTOG_INFO, 105, 28, {align:'center'});

        doc.setFontSize(10);
        doc.text(`Date: ${document.getElementById('r-date').value} | Location: ${document.getElementById('r-loc').value}`, 20, 40);
        doc.text(`Model: ${modelName} | DOB: ${document.getElementById('r-dob').value}`, 20, 48);
        doc.text(`Address: ${document.getElementById('r-address').value}`, 20, 56);
        doc.text(`Compensation: ${document.getElementById('r-comp').value}`, 20, 64);

        const legalText = `GRANT OF RIGHTS: I hereby grant to the Photographer, their clients, assigns, and successors the irrevocable, perpetual, worldwide right to use Content taken of me in any media for any lawful purpose including commercial use and AI applications. PERMISSIONS: I agree Content may be digitally altered and Photographer owns all copyright. DATA PROTECTION: Information processed in accordance with UK GDPR.`;
        doc.setFontSize(9);
        doc.text(doc.splitTextToSize(legalText, 170), 20, 75);

        // Signatures
        doc.text("Model Signature:", 20, 110);
        doc.addImage(document.getElementById('sig-model').toDataURL(), 'PNG', 20, 115, 50, 20);
        
        doc.text("Photographer Signature:", 120, 110);
        doc.addImage(document.getElementById('sig-photog').toDataURL(), 'PNG', 120, 115, 50, 20);

        doc.save(`ModelRelease_${modelName}_${Date.now()}.pdf`);
    };

    // WHATSAPP SHARE
    document.getElementById('btn-whatsapp').onclick = () => {
        const msg = `PR EYE v2.0 Shoot Summary\nDate: ${document.getElementById('r-date').value}\nLoc: ${document.getElementById('r-loc').value}\nModel: ${document.getElementById('r-name').value}\nPhotog: Digby Oldridge (PR Eye Ltd)`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    };

    // NAV & SIG PADS
    document.querySelectorAll('.nav-item').forEach(n => n.onclick = () => {
        document.querySelectorAll('.page, #persistent-cam-area').forEach(p => p.style.display = 'none');
        document.getElementById(n.dataset.target).style.display = 'block';
        document.getElementById('persistent-cam-area').style.display = n.dataset.cam === "true" ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        n.classList.add('active');
        currentTab = n.dataset.target;
    });

    const setupPad = (id) => {
        const can = document.getElementById(id); const ctx = can.getContext('2d');
        can.width = can.offsetWidth;
        let draw = false;
        can.onpointerdown = (e) => { draw = true; ctx.moveTo(e.offsetX, e.offsetY); };
        can.onpointermove = (e) => { if(draw) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
        can.onpointerup = () => draw = false;
    };
    ['sig-model', 'sig-photog', 'sig-witness', 'sig-guardian'].forEach(setupPad);

    window.ondeviceorientation = (e) => currentHeading = e.alpha || 0;
    startCamera();
</script>
</body>
</html>
