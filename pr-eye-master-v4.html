<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye v26 — Pro Toolkit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --navy: #09121c; --navy-glass: rgba(20, 36, 56, 0.4); 
            --border: rgba(255, 255, 255, 0.08);
            --gold: #d4c2a1; --gold-dim: rgba(212, 194, 161, 0.15);
            --text: #f0f4f8; --muted: #8b9bb4;
            --red: #ff4d4d; --blue: #4d4dff; --green: #4dff4d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #09121c; color: #f0f4f8; font-family: 'DM Mono', monospace; font-size: 14px; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-weight: 400; letter-spacing: 0.5px; margin-bottom: 8px;}
        
        .glass-panel { background: rgba(20, 36, 56, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
        .hdr { background: linear-gradient(180deg, rgba(9,18,28,1) 0%, rgba(9,18,28,0) 100%); padding: 15px 15px 25px 15px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .hdr-top { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Cormorant Garamond'; font-size: 22px; color: var(--gold); letter-spacing: 2px; display: flex; align-items: center; font-weight: 500;}
        
        .telemetry-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-radius: 50px; margin-top: 10px; }
        .tel-item { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; letter-spacing: 1px;}
        .ev-good { color: var(--green); } .ev-over { color: var(--red); } .ev-under { color: var(--blue); }

        .main-content { flex: 1; overflow-y: auto; position: relative; padding: 0 15px 90px 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .cam-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        #ui-layer { pointer-events: auto; z-index: 5;} 
        #histogram-canvas { position: absolute; bottom: 10px; right: 10px; z-index: 8; background: rgba(0,0,0,0.6); border: 1px solid var(--border); border-radius: 8px; display: none; width: 100px; height: 66px;}
        
        .action-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn { padding: 12px; background: transparent; border: 1px solid rgba(212,194,161,0.3); color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 400; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex: 1; transition: all 0.2s ease;}
        .btn:active { transform: scale(0.96); }
        .btn.solid { background: var(--gold); color: #09121c; font-weight: 500;}
        .btn.danger { background: var(--red); color: #fff; font-weight: 700; border: none;}
        .btn.icon-only { flex: 0 0 auto; width: 46px; font-size: 18px; padding: 0;}
        .btn.active-toggle { background: var(--gold-dim); border-color: var(--gold); }
        .btn.sm { padding: 8px 12px; font-size: 11px; }
        
        .ctrl-panel { border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .row { display: flex; gap: 15px; align-items: center; margin-bottom: 12px; }
        .col { flex: 1; }
        .label-txt { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 2px; opacity: 0.8;}

        .toggle-switch { display: flex; border: 1px solid var(--border); border-radius: 50px; overflow: hidden; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 4px;}
        .toggle-opt { flex: 1; text-align: center; padding: 10px; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 500; border-radius: 40px; transition: 0.3s;}
        .toggle-opt.active { background: var(--gold); color: #09121c; }
        
        select, input, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--gold); padding: 8px 0; border-radius: 0; outline: none; font-family: inherit; font-size: 14px; margin-bottom: 12px; transition: 0.3s ease;}
        
        .expo-meter-readout { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-top: 5px; margin-bottom: 10px;}
        .expo-scale { flex: 1; height: 3px; background: rgba(255,255,255,0.1); margin: 0 15px; position: relative; border-radius: 2px;}
        .expo-marker { position: absolute; top: 50%; left: 50%; width: 2px; height: 16px; background: var(--gold); transform: translate(-50%, -50%); transition: left 0.1s linear; }

        .pan-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .pan-item { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; height: 80px; }
        .pan-swatch { width: 40%; }
        .pan-data { width: 60%; padding: 10px; display: flex; flex-direction: column; justify-content: center; }
        .pan-code { font-family: 'Cormorant Garamond'; font-size: 15px; color: var(--gold); font-weight: 500; line-height: 1.2; }
        .pan-hex { font-size: 10px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px;}
        
        .data-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px;}
        .data-val { color: var(--gold); font-weight: 500; text-align: right; }

        .release-section { border-left: 2px solid var(--gold); padding-left: 15px; margin-bottom: 25px; }
        .signature-pad { background: #fff; border-radius: 8px; width: 100%; border: none; touch-action: none; margin-bottom: 8px;}
        
        .nav { background: rgba(9, 18, 28, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 0; color: var(--muted); font-size: 9px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px;}
        .nav-item.active { color: var(--gold); background: radial-gradient(circle at top, rgba(212, 194, 161, 0.15) 0%, transparent 70%); }
        .nav-item svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.5; fill: none; }

        @keyframes strobeRedBlue { 0% {background-color: red !important;} 50% {background-color: blue !important;} 100% {background-color: red !important;} }
        .strobe-active { animation: strobeRedBlue 0.15s infinite !important; }

        #result-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #result-img { max-width: 100%; max-height: 70vh; border-radius: 4px; }
        #yt-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; flex-direction: column; align-items: center; justify-content: center; }
        
        #composite-canvas, #proc-canvas, #fc-internal-canvas { display: none; position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body>

    <div class="hdr" id="main-hdr">
        <div class="hdr-top">
            <div class="brand">PR EYE v26</div>
            <div style="display:flex; gap:5px;">
                <button id="toggle-sound" class="btn icon-only active-toggle" style="height:32px; width:32px; font-size:14px;">🔊</button>
                <button id="toggle-timer" class="btn icon-only" style="height:32px; width:32px; font-size:14px;">⏱️</button>
                <button id="cam-flip-btn" class="btn icon-only" style="height:32px; width:32px; border-color:transparent;">🔄</button>
            </div>
        </div>
        <div class="telemetry-bar glass-panel">
            <div class="tel-item" id="tel-ev">EV <span class="ev-good">0.0</span></div>
            <div class="tel-item" style="color:var(--gold)">WB <span id="tel-wb">-- K</span></div>
            <div class="tel-item" style="color:var(--muted)">GPS <span id="tel-gps">--</span></div>
        </div>
    </div>

    <div class="main-content">
        <div id="persistent-cam-area">
            <div class="cam-container" id="cam-wrapper">
                <video id="video" autoplay playsinline webkit-playsinline></video>
                <canvas id="fc-layer" class="overlay"></canvas>
                <canvas id="grid-layer" class="overlay"></canvas>
                <canvas id="level-layer" class="overlay"></canvas>
                <canvas id="scout-layer" class="overlay"></canvas>
                <canvas id="ui-layer" class="overlay"></canvas>
                <canvas id="histogram-canvas" width="150" height="100"></canvas>
            </div>
            
            <div class="action-row">
                <button id="grid-toggle-btn" class="btn icon-only">G</button>
                <button id="fc-toggle-btn" class="btn icon-only">FC</button>
                <button id="curve-toggle-btn" class="btn icon-only">C</button>
                <button id="level-toggle-btn" class="btn icon-only">L</button>
                <button id="capture-btn" class="btn solid">CAPTURE</button>
            </div>
        </div>

        <div id="page-meter" class="page active">
            <div class="ctrl-panel glass-panel">
                <div class="toggle-switch">
                    <div class="toggle-opt active" id="meter-live">LIVE</div>
                    <div class="toggle-opt" id="meter-flash">FLASH</div>
                </div>
                <div class="row">
                    <div class="col"><span class="label-txt">ISO</span><select id="set-iso"><option value="100">100</option><option value="400" selected>400</option><option value="1600">1600</option></select></div>
                    <div class="col"><span class="label-txt">f/</span><select id="set-aperture"><option value="2.8">2.8</option><option value="5.6" selected>5.6</option><option value="11">11</option></select></div>
                    <div class="col"><span class="label-txt">1/s</span><select id="set-shutter"><option value="60" selected>60</option><option value="125">125</option><option value="500">500</option></select></div>
                </div>
                <div class="expo-meter-readout">
                    <div class="expo-scale"><div class="expo-marker" id="expo-marker"></div></div>
                </div>
                <button id="reset-flash-btn" class="btn sm" style="width:100%; display:none;">Reset Flash</button>
            </div>
        </div>

        <div id="page-color" class="page">
            <div class="ctrl-panel glass-panel">
                <div class="pan-grid" id="live-pan-results">
                    <div class="pan-item"><div class="pan-swatch" id="ps1" style="background:#222"></div><div class="pan-data"><div class="pan-code" id="pn1">---</div><div class="pan-hex" id="ph1">---</div></div></div>
                    <div class="pan-item"><div class="pan-swatch" id="ps2" style="background:#222"></div><div class="pan-data"><div class="pan-code" id="pn2">---</div><div class="pan-hex" id="ph2">---</div></div></div>
                    <div class="pan-item"><div class="pan-swatch" id="ps3" style="background:#222"></div><div class="pan-data"><div class="pan-code" id="pn3">---</div><div class="pan-hex" id="ph3">---</div></div></div>
                    <div class="pan-item"><div class="pan-swatch" id="ps4" style="background:#222"></div><div class="pan-data"><div class="pan-code" id="pn4">---</div><div class="pan-hex" id="ph4">---</div></div></div>
                </div>
                <div style="display: flex; height: 20px; border-radius: 4px; overflow: hidden; margin: 15px 0;">
                    <div id="rule-60" style="width: 60%; background: #222;"></div>
                    <div id="rule-30" style="width: 30%; background: #444;"></div>
                    <div id="rule-10" style="width: 10%; background: #666;"></div>
                </div>
                <div class="toggle-switch">
                    <div class="toggle-opt active" id="pan-auto">AUTO</div>
                    <div class="toggle-opt" id="pan-manual">MANUAL</div>
                </div>
            </div>
        </div>

        <div id="page-scout" class="page">
            <div class="ctrl-panel glass-panel">
                <div id="scout-map-container" style="width: 100%; height: 180px; background: #000; border-radius: 8px; margin-bottom: 15px; display:flex; align-items:center; justify-content:center;">
                    <span style="color:var(--muted);">AWAITING GPS...</span>
                </div>
                <div class="data-row"><span class="label-txt">Heading</span><span class="data-val" id="scout-heading">--°</span></div>
                <div class="data-row"><span class="label-txt">Golden Hour</span><span class="data-val" id="loc-golden" style="color:var(--gold);">--:--</span></div>
                <button class="btn sm" id="btn-fetch-loc-scout" style="width: 100%;">Refresh GPS Data</button>
            </div>
        </div>

        <div id="page-tools" class="page">
             <div class="ctrl-panel glass-panel">
                <h4>Emergency & Services</h4>
                <div class="pan-grid" style="margin-top:0;">
                    <button class="btn sm" onclick="openSOS('hospital+OR+A%26E')" style="color:var(--red);">🏥 A&E</button>
                    <button class="btn sm" onclick="openSOS('taxi')">🚕 Taxi</button>
                    <button class="btn sm" onclick="openSOS('restaurant')">🍽️ Eat</button>
                    <button class="btn sm" onclick="openSOS('petrol')">⛽ Fuel</button>
                </div>
            </div>
             <div class="ctrl-panel glass-panel">
                <h4>Live Conditions</h4>
                <div class="data-row"><span class="label-txt">Weather</span><span class="data-val" id="tool-weather">--</span></div>
                <div class="data-row"><span class="label-txt">Temp</span><span class="data-val" id="tool-temp">-- °C</span></div>
                <div class="data-row"><span class="label-txt">Heading</span><span class="data-val" id="tool-heading">--°</span></div>
                <button class="btn sm" id="btn-fetch-loc-tools" style="width:100%; margin-top:10px;">Refresh GPS Data</button>
            </div>
            <div class="ctrl-panel glass-panel">
                <textarea id="shoot-notes" rows="4" placeholder="Shoot Notes..."></textarea>
                <button class="btn" id="btn-email-notes" style="width: 100%;">Email Notes</button>
            </div>
        </div>
        
        <div id="page-rave" class="page">
             <div class="ctrl-panel glass-panel" style="text-align: center;">
                <button class="btn solid" id="btn-start-rave" style="width: 100%; background: #ff00ff; color:#fff;">Start Rave Mode</button>
                <button class="btn sm" id="btn-no-rave" style="width: 100%; margin-top:10px;">No, I don't want to rave</button>
                <button class="btn danger" id="btn-sos-siren" style="width: 100%; margin-top: 20px; padding: 20px;">EMERGENCY SOS</button>
            </div>
        </div>

        <div id="page-release" class="page">
            <div class="release-section">
                <input type="date" id="r-date">
                <input type="text" id="r-loc" placeholder="Shoot Location">
                <input type="text" id="r-photog-name" placeholder="Photographer Name">
                <input type="text" id="r-name" placeholder="Model Name">
                <input type="text" id="r-dob" placeholder="DOB">
                <input type="tel" id="r-phone" placeholder="Phone">
                <input type="email" id="r-email" placeholder="Email">
                <div class="toggle-switch"><div class="toggle-opt active" id="tog-adult">Adult</div><div class="toggle-opt" id="tog-minor">Minor</div></div>
            </div>
            <div id="guardian-section" class="release-section" style="display:none;">
                <input type="text" id="r-g-name" placeholder="Guardian Name">
                <canvas id="sig-guardian" class="signature-pad" height="100"></canvas>
            </div>
            <div class="release-section">
                <span class="label-txt">Model Sig</span><canvas id="sig-model" class="signature-pad" height="100"></canvas>
                <span class="label-txt">Photog Sig</span><canvas id="sig-photog" class="signature-pad" height="100"></canvas>
            </div>
            <button id="gen-pdf-btn" class="btn solid" style="width:100%;">Generate PDF</button>
        </div>
    </div>

    <div id="result-overlay">
        <img id="result-img">
        <div style="display:flex; gap:10px; margin-top:10px; width:300px;">
            <button class="btn solid" id="btn-share-result">SAVE</button>
            <button class="btn" id="btn-close-result">CLOSE</button>
        </div>
    </div>

    <div id="yt-overlay">
        <iframe id="yt-iframe" width="100%" height="100%" frameborder="0" allow="autoplay"></iframe>
        <button class="btn danger" onclick="document.getElementById('yt-overlay').style.display='none'; document.getElementById('yt-iframe').src='';" style="position:absolute; bottom:20px;">CLOSE</button>
    </div>

    <div class="nav">
        <div class="nav-item active" data-target="page-meter" data-cam="true">Meter</div>
        <div class="nav-item" data-target="page-color" data-cam="true">Color</div>
        <div class="nav-item" data-target="page-scout" data-cam="true">Scout</div>
        <div class="nav-item" data-target="page-tools" data-cam="true">Tools</div>
        <div class="nav-item" data-target="page-rave" data-cam="false">Rave</div>
        <div class="nav-item" data-target="page-release" data-cam="false" id="nav-release">Legal</div>
    </div>

    <canvas id="proc-canvas" width="150" height="200"></canvas>
    <canvas id="fc-internal-canvas" width="150" height="200"></canvas>
    <canvas id="composite-canvas" width="1000" height="1450"></canvas>

<script>
    const video = document.getElementById('video');
    const gridCtx = document.getElementById('grid-layer').getContext('2d');
    const uiCtx = document.getElementById('ui-layer').getContext('2d');
    const fcCtx = document.getElementById('fc-layer').getContext('2d');
    const scoutCtx = document.getElementById('scout-layer').getContext('2d');
    const procCtx = document.getElementById('proc-canvas').getContext('2d', { willReadFrequently: true });
    const histCtx = document.getElementById('histogram-canvas').getContext('2d');
    const fcInternalCtx = document.getElementById('fc-internal-canvas').getContext('2d', { willReadFrequently: true });

    let stream = null, currentFacingMode = 'environment', currentTab = 'page-meter';
    let measuredEV = 0, flashPeakEV = -99, liveTempK = 0, currentHeading = 0;
    let currentLat = null, currentLon = null, sunriseTime = null, sunsetTime = null, goldenHourTime = null;
    let lastPanExtraction = [], fcState = 0, currentGridIdx = 0, isTimerOn = false, isSoundOn = true;
    const gridOptions = ['off', 'thirds', 'phi', 'spiral'];

    // ═══════════════════════════════════════════
    // CORE INITIALIZATION
    // ═══════════════════════════════════════════

    function loadSettings() {
        // FIX 12: Shoot notes save/load
        document.getElementById('shoot-notes').value = localStorage.getItem('preye_notes') || "";
        document.getElementById('shoot-notes').addEventListener('input', (e) => localStorage.setItem('preye_notes', e.target.value));

        // FIX 13: Photog name save/load
        document.getElementById('r-photog-name').value = localStorage.getItem('preye_photog_name') || "";
        document.getElementById('r-photog-name').addEventListener('input', (e) => localStorage.setItem('preye_photog_name', e.target.value));

        // FIX 15: Default Date
        document.getElementById('r-date').value = new Date().toISOString().split('T')[0];
    }
    loadSettings();

    // FIX 5: Email Notes
    document.getElementById('btn-email-notes').addEventListener('click', () => {
        const body = encodeURIComponent(document.getElementById('shoot-notes').value);
        window.location.href = `mailto:?subject=PR Eye Shoot Notes&body=${body}`;
    });

    async function startCamera() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        try { 
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: currentFacingMode }, width: { ideal: 1280 } } }); 
            video.srcObject = stream;
            video.onloadedmetadata = () => { resize(); requestAnimationFrame(liveLoop); };
        } catch(e) { alert("Camera Error"); }
    }
    function resize() {
        const r = video.getBoundingClientRect();
        ['grid-layer','ui-layer','fc-layer','level-layer','scout-layer'].forEach(id => {
            const c = document.getElementById(id); if(c) { c.width = r.width; c.height = r.height; }
        });
        drawGrid();
    }

    // ═══════════════════════════════════════════
    // EXPOSURE METER
    // ═══════════════════════════════════════════

    function updateExpoBar() {
        // FIX 10: Falsy check for EV 0.0
        if(measuredEV === null || measuredEV === undefined) return;
        
        let val = flashModeActive ? flashPeakEV : measuredEV;
        if(val === -99) val = measuredEV;

        const N = parseFloat(document.getElementById('set-aperture').value);
        const ISO = parseInt(document.getElementById('set-iso').value);
        const t = 1 / parseFloat(document.getElementById('set-shutter').value);
        const diff = val - (Math.log2((N*N)/t) - Math.log2(ISO/100));
        
        const pct = Math.max(5, Math.min(95, 50 + (diff * 15)));
        document.getElementById('expo-marker').style.left = pct + '%';

        // FIX 11: Correct negative peak display
        const evDisp = document.querySelector('#tel-ev span');
        if(flashModeActive) {
            evDisp.innerText = `PEAK ${flashPeakEV >= 0 ? '+' : ''}${flashPeakEV.toFixed(1)}`;
        } else {
            evDisp.innerText = (measuredEV >= 0 ? '+' : '') + measuredEV.toFixed(1);
        }
    }

    // ═══════════════════════════════════════════
    // GPS & SCOUTING
    // ═══════════════════════════════════════════

    const fetchLocData = () => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            currentLat = pos.coords.latitude; currentLon = pos.coords.longitude;
            document.getElementById('tel-gps').innerText = "OK";
            document.getElementById('scout-map-container').innerHTML = `<iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${currentLat},${currentLon}&z=15&output=embed"></iframe>`;
            
            try {
                const sRes = await fetch(`https://api.sunrise-sunset.org/json?lat=${currentLat}&lng=${currentLon}&formatted=0`);
                const sData = await sRes.json();
                sunriseTime = new Date(sData.results.sunrise);
                sunsetTime = new Date(sData.results.sunset);
                // FIX 16: Manual Golden Hour Calculation
                goldenHourTime = new Date(sunsetTime.getTime() - 45 * 60 * 1000);
                document.getElementById('loc-golden').innerText = goldenHourTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            } catch(e) {}
        });
    };
    document.getElementById('btn-fetch-loc-scout').addEventListener('click', fetchLocData);
    document.getElementById('btn-fetch-loc-tools').addEventListener('click', fetchLocData);

    // FIX 6: Robust openSOS
    window.openSOS = (q) => {
        if(!currentLat) return alert("Fetch GPS first");
        window.open(`https://www.google.com/maps/search/${q}/@${currentLat},${currentLon},14z`);
    };

    // ═══════════════════════════════════════════
    // RAVE MODE
    // ═══════════════════════════════════════════

    let raveActive = false, raveAudioCtx, raveAnalyser, raveRollingAvg = 0;
    // FIX 7: Fixed Beat Detection
    document.getElementById('btn-start-rave').addEventListener('click', async () => {
        if(raveActive) { raveActive = false; document.body.style.background = '#09121c'; return; }
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        raveAudioCtx = new AudioContext(); await raveAudioCtx.resume();
        raveAnalyser = raveAudioCtx.createAnalyser();
        raveAudioCtx.createMediaStreamSource(stream).connect(raveAnalyser);
        raveActive = true;
        const data = new Uint8Array(raveAnalyser.frequencyBinCount);
        const tick = () => {
            if(!raveActive) return;
            raveAnalyser.getByteFrequencyData(data);
            let bassSum = 0; for(let i=0; i<10; i++) bassSum += data[i];
            let bassEnergy = bassSum / 10;
            raveRollingAvg = (raveRollingAvg * 0.95) + (bassEnergy * 0.05);
            if(bassEnergy > raveRollingAvg * 1.5 && bassEnergy > 50) {
                document.body.style.setProperty('background-color', `hsl(${Math.random()*360},100%,50%)`, 'important');
            } else {
                document.body.style.setProperty('background-color', '#09121c', 'important');
            }
            requestAnimationFrame(tick);
        };
        tick();
    });

    // ═══════════════════════════════════════════
    // PANTONE COLOR
    // ═══════════════════════════════════════════

    // FIX 8: Single-pass color extraction for capture
    function extractColors() {
        const w = procCtx.canvas.width, h = procCtx.canvas.height;
        const data = procCtx.getImageData(0,0,w,h).data;
        // Simple 4-point sample for speed
        const pts = [[30,30],[120,30],[30,170],[120,170]];
        lastPanExtraction = pts.map(p => {
            const i = (p[1]*w + p[0])*4;
            const r = data[i], g = data[i+1], b = data[i+2];
            return { hex: `rgb(${r},${g},${b})`, name: `PMS ${r}-${g}-${b}` }; // Mock pantone name
        });
    }

    // ═══════════════════════════════════════════
    // PDF GENERATION
    // ═══════════════════════════════════════════

    // FIX 4: Complete PDF generation
    document.getElementById('gen-pdf-btn').addEventListener('click', async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold"); doc.text("MODEL RELEASE FORM", 105, 20, null, null, "center");
        doc.setFont("helvetica", "normal"); doc.setFontSize(10);
        
        const data = [
            ["Date", document.getElementById('r-date').value],
            ["Location", document.getElementById('r-loc').value],
            ["Photographer", document.getElementById('r-photog-name').value],
            ["Model", document.getElementById('r-name').value],
            ["DOB", document.getElementById('r-dob').value],
            ["Phone", document.getElementById('r-phone').value]
        ];
        let y = 40;
        data.forEach(row => { doc.text(`${row[0]}: ${row[1]}`, 20, y); y += 10; });

        // Render Canvas Signatures
        const renderSig = async (id, title, posY) => {
            const can = document.getElementById(id);
            if(can && can.offsetParent !== null) {
                const img = can.toDataURL("image/png");
                doc.text(title, 20, posY);
                doc.addImage(img, 'PNG', 20, posY + 5, 80, 30);
                return posY + 45;
            }
            return posY;
        };

        y = await renderSig("sig-model", "Model Signature:", y);
        y = await renderSig("sig-photog", "Photographer Signature:", y);
        if(document.getElementById('guardian-section').style.display !== 'none') {
            y = await renderSig("sig-guardian", "Guardian Signature:", y);
        }

        doc.save(`ModelRelease_${Date.now()}.pdf`);
    });

    // ═══════════════════════════════════════════
    // CAPTURE ENGINE
    // ═══════════════════════════════════════════

    document.getElementById('capture-btn').addEventListener('click', async () => {
        const can = document.getElementById('composite-canvas');
        const ctx = can.getContext('2d');
        ctx.fillStyle = "#fff"; ctx.fillRect(0,0,1000,1450);
        
        // Photo
        ctx.drawImage(video, 50, 50, 900, 1200);

        // FIX 9: Scout Overlay in export
        if(currentTab === 'page-scout') {
            ctx.drawImage(document.getElementById('scout-layer'), 50, 50, 900, 1200);
            ctx.fillStyle = "#000"; ctx.font = "20px DM Mono";
            ctx.fillText(`GPS: ${currentLat}, ${currentLon} (Map data not captured)`, 70, 1420);
        }

        // FIX 8: Pantone in export
        if(currentTab === 'page-color') {
            extractColors();
            ctx.font = "28px 'Permanent Marker'";
            lastPanExtraction.forEach((p, i) => {
                ctx.fillStyle = p.hex;
                ctx.fillRect(70, 1270 + (i*40), 50, 35); // Prominent 50x35 swatch
                ctx.fillStyle = "#1a1a1a";
                ctx.fillText(p.name, 140, 1300 + (i*40));
            });
        } else {
            ctx.fillStyle = "#1a1a1a"; ctx.font = "40px 'Permanent Marker'";
            ctx.fillText(`EV ${measuredEV.toFixed(1)} | ISO ${document.getElementById('set-iso').value}`, 70, 1330);
        }

        document.getElementById('result-img').src = can.toDataURL("image/jpeg");
        document.getElementById('result-overlay').style.display = 'flex';
    });

    // ═══════════════════════════════════════════
    // UI HANDLERS
    // ═══════════════════════════════════════════

    // FIX 3: Removed sig-witness from loop
    let padsInit = false;
    document.getElementById('nav-release').addEventListener('click', () => {
        if(padsInit) return;
        ['sig-model', 'sig-guardian', 'sig-photog'].forEach(id => {
            const c = document.getElementById(id); const ctx = c.getContext('2d');
            let draw = false;
            c.addEventListener('pointerdown', e => { draw = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
            c.addEventListener('pointermove', e => { if(draw) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
            window.addEventListener('pointerup', () => draw = false);
        });
        padsInit = true;
    });

    window.openSOS = (q) => {
        if(!currentLat) return alert("Fetch GPS first");
        window.open(`https://www.google.com/maps/search/${q}/@${currentLat},${currentLon},14z`);
    };

    document.getElementById('btn-no-rave').addEventListener('click', () => {
        document.getElementById('yt-overlay').style.display = 'flex';
        document.getElementById('yt-iframe').src = "https://www.youtube.com/embed/cmoFNya6P4Q?autoplay=1";
    });

    function drawGrid() {
        const w = gridCtx.canvas.width, h = gridCtx.canvas.height;
        gridCtx.clearRect(0,0,w,h);
        if(gridOptions[currentGridIdx] === 'off') return;
        gridCtx.strokeStyle = 'rgba(212,194,161,0.5)';
        gridCtx.beginPath();
        gridCtx.moveTo(w/3, 0); gridCtx.lineTo(w/3, h);
        gridCtx.stroke();
    }

    function liveLoop() {
        if(video.readyState === 4) {
            procCtx.drawImage(video, 0, 0, 150, 200);
            const data = procCtx.getImageData(0,0,150,200).data;
            let lum = 0; for(let i=0; i<data.length; i+=4) lum += (data[i]+data[i+1]+data[i+2])/3;
            measuredEV = Math.log2((lum / (data.length/4) / 255) * 100 / 12.5);
            updateExpoBar();
            
            // Draw Scout Compass
            const sw = scoutCtx.canvas.width, sh = scoutCtx.canvas.height;
            scoutCtx.clearRect(0,0,sw,sh);
            scoutCtx.save();
            scoutCtx.translate(sw/2, sh/2); scoutCtx.rotate(-currentHeading * Math.PI/180);
            scoutCtx.fillStyle = 'var(--gold)'; scoutCtx.fillText("N", 0, -40);
            scoutCtx.restore();
        }
        requestAnimationFrame(liveLoop);
    }

    window.addEventListener('deviceorientation', (e) => {
        currentHeading = e.alpha || 0;
        // FIX 1: Update tool-heading
        document.getElementById('scout-heading').innerText = Math.round(currentHeading) + '°';
        document.getElementById('tool-heading').innerText = Math.round(currentHeading) + '°';
    });

    document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        n.classList.add('active'); document.getElementById(n.dataset.target).classList.add('active');
        currentTab = n.dataset.target;
    }));

    document.getElementById('btn-close-result').onclick = () => document.getElementById('result-overlay').style.display = 'none';

    startCamera();
</script>
</body>
</html>
