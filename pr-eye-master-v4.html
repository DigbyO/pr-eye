<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye v26.1 — Pro Toolkit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --navy: #09121c; --navy-glass: rgba(20, 36, 56, 0.4); 
            --border: rgba(255, 255, 255, 0.08);
            --gold: #d4c2a1; --gold-dim: rgba(212, 194, 161, 0.15);
            --text: #f0f4f8; --muted: #8b9bb4;
            --red: #ff4d4d; --blue: #4d4dff; --green: #4dff4d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: #09121c; color: #f0f4f8; font-family: 'DM Mono', monospace; font-size: 14px; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-weight: 400; letter-spacing: 0.5px; margin-bottom: 8px;}
        
        .glass-panel { background: rgba(20, 36, 56, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); }
        .hdr { background: linear-gradient(180deg, rgba(9,18,28,1) 0%, rgba(9,18,28,0) 100%); padding: 15px 15px 25px 15px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .hdr-top { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Cormorant Garamond'; font-size: 22px; color: var(--gold); letter-spacing: 2px; display: flex; align-items: center; font-weight: 500;}
        
        .telemetry-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-radius: 50px; margin-top: 10px; }
        .tel-item { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; letter-spacing: 1px;}
        .ev-good { color: var(--green); }

        .main-content { flex: 1; overflow-y: auto; position: relative; padding: 0 15px 90px 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        .cam-container { position: relative; width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 15px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .btn { padding: 12px; background: transparent; border: 1px solid rgba(212,194,161,0.3); color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex: 1; }
        .btn.solid { background: var(--gold); color: #09121c; font-weight: 500;}
        .btn.danger { background: var(--red); color: #fff; border: none;}
        
        .ctrl-panel { border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .label-txt { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px;}
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--gold); padding: 8px 0; outline: none; margin-bottom: 12px;}

        .pan-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .pan-item { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; height: 70px; }
        .pan-swatch { width: 35%; }
        .pan-data { width: 65%; padding: 8px; display: flex; flex-direction: column; justify-content: center; }
        .pan-code { font-size: 12px; color: var(--gold); }
        .pan-hex { font-size: 9px; color: var(--muted); }

        .signature-pad { background: #fff; border-radius: 8px; width: 100%; border: none; touch-action: none; margin-bottom: 8px;}

        .nav { background: rgba(9, 18, 28, 0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: var(--muted); font-size: 10px; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        #sos-flash-overlay { display: none; position: fixed; inset: 0; z-index: 9998; pointer-events: none; }
        #sos-flash-overlay.strobe-active { display: block; animation: strobe 0.4s infinite; }
        @keyframes strobe { 0% { background: rgba(255,0,0,0.8); } 50% { background: rgba(0,0,255,0.8); } }
    </style>
</head>
<body>

    <div id="sos-flash-overlay"></div>

    <div class="hdr">
        <div class="hdr-top">
            <div class="brand">PR EYE v26</div>
            <div style="display:flex; gap:5px;">
                <button id="toggle-sound" class="btn icon-only">🔊</button>
            </div>
        </div>
        <div class="telemetry-bar glass-panel">
            <div class="tel-item">EV <span id="val-ev" class="ev-good">0.0</span></div>
            <div class="tel-item" style="color:var(--gold)">WB <span id="val-wb">5500 K</span></div>
            <div class="tel-item" style="color:var(--muted)">GPS <span id="val-gps">OK</span></div>
        </div>
    </div>

    <div class="main-content">
        <div id="persistent-cam-area">
            <div class="cam-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="scout-layer" class="overlay"></canvas>
                <canvas id="ui-layer" class="overlay"></canvas>
            </div>
            <button id="capture-btn" class="btn solid">CAPTURE</button>
        </div>

        <div id="page-color" class="page">
            <div class="ctrl-panel glass-panel">
                <h4>Color Palette Match</h4>
                <div class="pan-grid">
                    <div class="pan-item"><div class="pan-swatch" id="ps1"></div><div class="pan-data"><div class="pan-code" id="pn1">---</div><div class="pan-hex" id="ph1">---</div></div></div>
                    <div class="pan-item"><div class="pan-swatch" id="ps2"></div><div class="pan-data"><div class="pan-code" id="pn2">---</div><div class="pan-hex" id="ph2">---</div></div></div>
                </div>
            </div>
        </div>

        <div id="page-scout" class="page">
            <div class="ctrl-panel glass-panel">
                <h4>Ephemeris Data</h4>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span class="label-txt">Heading</span><span id="scout-heading">--°</span>
                </div>
                <button class="btn sm" onclick="alert('GPS Refreshing...')">Sync Location</button>
            </div>
        </div>

        <div id="page-rave" class="page">
             <div class="ctrl-panel glass-panel" style="text-align: center;">
                <button class="btn solid" id="btn-start-rave" style="background:#ff00ff; color:#fff; margin-bottom:10px; width:100%;">Start Rave Mode</button>
                <button class="btn danger" id="btn-sos-siren" style="width:100%;">EMERGENCY SOS</button>
            </div>
        </div>

        <div id="page-release" class="page">
            <div class="ctrl-panel glass-panel">
                <input type="text" id="r-name" placeholder="Model Name">
                <input type="text" id="r-loc" placeholder="Location">
                <span class="label-txt">Model Signature</span><canvas id="sig-model" class="signature-pad" height="80"></canvas>
                <span class="label-txt">Photog Signature</span><canvas id="sig-photog" class="signature-pad" height="80"></canvas>
                <button id="gen-pdf-btn" class="btn solid" style="width:100%;">Generate PDF</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" data-target="persistent-cam-area">Meter</div>
        <div class="nav-item" data-target="page-color">Color</div>
        <div class="nav-item" data-target="page-scout">Scout</div>
        <div class="nav-item" data-target="page-rave">Rave</div>
        <div class="nav-item" data-target="page-release" id="nav-release">Legal</div>
    </div>

    <canvas id="proc-canvas" width="150" height="200" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const scoutCtx = document.getElementById('scout-layer').getContext('2d');
    const uiCtx = document.getElementById('ui-layer').getContext('2d');
    const procCtx = document.getElementById('proc-canvas').getContext('2d');
    
    let stream, currentHeading = 0, currentTab = 'persistent-cam-area';
    let pantoneDb = [{n:"Cool Gray 11 C",rgb:[99,102,106]}, {n:"Warm Red C",rgb:[249,66,58]}, {n:"PMS 286 C",rgb:[0,51,160]}, {n:"PMS 123 C",rgb:[255,199,44]}];

    async function startCamera() {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            const r = video.getBoundingClientRect();
            [scoutCtx.canvas, uiCtx.canvas].forEach(c => { c.width = r.width; c.height = r.height; });
            requestAnimationFrame(liveLoop);
        };
    }

    function liveLoop() {
        if(video.readyState === 4) {
            procCtx.drawImage(video, 0, 0, 150, 200);
            
            // Exposure
            const data = procCtx.getImageData(0,0,150,200).data;
            let lum = 0; for(let i=0; i<data.length; i+=4) lum += (0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]);
            document.getElementById('val-ev').innerText = (Math.log2(lum/30000)).toFixed(1);

            // Scout Compass Fix
            const sw = scoutCtx.canvas.width, sh = scoutCtx.canvas.height;
            scoutCtx.clearRect(0,0,sw,sh);
            scoutCtx.save();
            scoutCtx.translate(sw/2, sh/2);
            scoutCtx.rotate(-currentHeading * Math.PI / 180);
            scoutCtx.strokeStyle = 'rgba(212,194,161,0.5)';
            scoutCtx.beginPath(); scoutCtx.arc(0,0,100,0,Math.PI*2); scoutCtx.stroke();
            
            // Sun Logic (Static example for UI stability)
            scoutCtx.fillStyle = '#ffb347';
            scoutCtx.font = 'bold 10px DM Mono';
            scoutCtx.textAlign = 'center';
            scoutCtx.fillText('SUN', 0, -85);
            scoutCtx.beginPath(); scoutCtx.arc(0, -100, 6, 0, Math.PI*2); scoutCtx.fill();
            scoutCtx.restore();

            // Color Logic
            if(currentTab === 'page-color') {
                [1, 2].forEach(i => {
                    const p = procCtx.getImageData(i*40, 100, 1, 1).data;
                    const hex = "#" + ((1<<24)+(p[0]<<16)+(p[1]<<8)+p[2]).toString(16).slice(1).toUpperCase();
                    document.getElementById(`ps${i}`).style.background = hex;
                    document.getElementById(`ph${i}`).innerText = hex;
                    document.getElementById(`pn${i}`).innerText = pantoneDb[i % 4].n;
                });
            }
        }
        requestAnimationFrame(liveLoop);
    }

    // PDF 
    document.getElementById('gen-pdf-btn').addEventListener('click', () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("PR EYE LTD - MODEL RELEASE", 20, 20);
        doc.text(`Model: ${document.getElementById('r-name').value}`, 20, 40);
        doc.addImage(document.getElementById('sig-model').toDataURL(), 'PNG', 20, 50, 50, 20);
        doc.save("Release.pdf");
    });

    // NAV
    document.querySelectorAll('.nav-item').forEach(n => n.addEventListener('click', () => {
        document.querySelectorAll('.page, #persistent-cam-area').forEach(p => p.style.display = 'none');
        document.getElementById(n.dataset.target).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        n.classList.add('active');
        currentTab = n.dataset.target;
    }));

    // SIG PADS
    let padsInit = false;
    document.getElementById('nav-release').addEventListener('click', () => {
        if(!padsInit) {
            ['sig-model', 'sig-photog'].forEach(id => {
                const can = document.getElementById(id); const c = can.getContext('2d');
                can.width = can.parentElement.clientWidth;
                let draw = false;
                can.addEventListener('pointerdown', e => { draw = true; c.moveTo(e.offsetX, e.offsetY); });
                can.addEventListener('pointermove', e => { if(draw) { c.lineTo(e.offsetX, e.offsetY); c.stroke(); } });
                can.addEventListener('pointerup', () => draw = false);
            });
            padsInit = true;
        }
    });

    // SOS
    document.getElementById('btn-sos-siren').addEventListener('click', () => {
        document.getElementById('sos-flash-overlay').classList.toggle('strobe-active');
    });

    window.addEventListener('deviceorientation', e => currentHeading = e.alpha || 0);
    startCamera();
</script>
</body>
</html>
