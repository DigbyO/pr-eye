<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR EYE v6.2 — TACTICAL</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4c2a1; --bg: #050a10; --red: #ff3b30; --magenta: #ff2d55; --cyan: #5ac8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .tel-item { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* CAMERA VIEWPORT */
        #viewport { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; overflow: hidden; border-bottom: 1px solid #333; flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        /* TAB NAVIGATION */
        .nav { display: flex; background: #000; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 16px 0; text-align: center; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--gold); border-top: 2px solid var(--gold); background: rgba(212,194,161,0.05); }

        /* CONTENT */
        .content { flex: 1; overflow-y: auto; padding: 15px 15px 100px; }
        .page { display: none; } .page.active { display: block; }
        .ctrl-group { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; margin-bottom: 12px; }
        
        /* COLOR SWATCHES */
        .palette-row { display: flex; height: 70px; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid #333; }
        .swatch { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; text-shadow: 0 1px 2px #000; }
        
        /* CANON HUD */
        .hud-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #0d141e; border: 1px solid #333; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
        .hud-cell { padding: 12px; border: 0.5px solid #222; text-align: center; }
        .hud-label { font-size: 8px; color: #666; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .hud-val { font-size: 15px; font-weight: bold; color: #fff; }

        /* BUTTONS */
        .btn { width: 100%; padding: 14px; background: transparent; border: 1px solid #444; color: var(--gold); border-radius: 8px; font-size: 10px; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; }
        .btn.solid { background: var(--gold); color: #000; font-weight: bold; border: none; }
        .btn.danger { background: var(--red); color: #fff; border: none; }

        /* RAVE */
        #rave-overlay { display: none; position: fixed; inset: 0; z-index: 999; pointer-events: none; }
        .mode-police { animation: strobe-p 0.15s infinite; }
        @keyframes strobe-p { 0% { background: #f00; } 50% { background: #00f; } }

        /* EXPORT */
        #export-ovl { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .polaroid { background: #fff; padding: 10px 10px 60px 10px; box-shadow: 0 20px 60px #000; width: 100%; max-width: 340px; }
        #pol-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        #pol-cap { color: #111; font-family: 'Permanent Marker', cursive; padding-top: 15px; font-size: 13px; white-space: pre-line; }
    </style>
</head>
<body>

    <div class="hdr">
        <span class="tel-item">PR EYE v6.2</span>
        <span class="tel-item" id="tel-ev">EV --.-</span>
        <span class="tel-item" id="tel-wb">5500K</span>
    </div>

    <div id="viewport">
        <video id="video" autoplay playsinline></video>
        <canvas id="lvl-canvas" class="overlay"></canvas>
        <div id="rave-overlay"></div>
    </div>

    <div class="content">
        <div id="page-meter" class="page active">
            <div class="hud-grid">
                <div class="hud-cell"><span class="hud-label">SS</span><span class="hud-val" id="hud-ss">1/50</span></div>
                <div class="hud-cell"><span class="hud-label">F</span><span class="hud-val" id="hud-f">F4.0</span></div>
                <div class="hud-cell"><span class="hud-label">ISO</span><span class="hud-val" id="hud-iso">400</span></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn" onclick="flipCamera()">FLIP CAMERA</button>
                <button class="btn" onclick="toggleLevel()">TOGGLE LEVEL</button>
            </div>
            <button class="btn solid" style="margin-top:10px; padding:18px;" onclick="capture('pol')">CAPTURE POLAROID</button>
        </div>

        <div id="page-color" class="page">
            <div class="ctrl-group">
                <h4 style="color:var(--gold); font-size:10px; margin-bottom:10px;">60-30-10 DOMINANT PALETTE</h4>
                <div class="palette-row">
                    <div id="sw-60" class="swatch" style="flex:6;">60%</div>
                    <div id="sw-30" class="swatch" style="flex:3;">30%</div>
                    <div id="sw-10" class="swatch" style="flex:1;">10%</div>
                </div>
                <div id="mj-prompt" style="font-size:10px; color:#888; font-style:italic;">Extracting colors...</div>
                <button class="btn solid" style="margin-top:15px;" onclick="capture('swatch')">EXPORT SWATCHES</button>
            </div>
        </div>

        <div id="page-rave" class="page">
            <div class="ctrl-group">
                <button class="btn solid" id="rave-btn" style="height:80px; font-size:16px;" onclick="toggleRave()">START TACTICAL RAVE</button>
                <button class="btn danger" id="siren-btn" style="height:60px;" onclick="toggleSiren()">EMERGENCY SIREN</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" data-t="page-meter">Meter</div>
        <div class="nav-item" data-t="page-color">Color</div>
        <div class="nav-item" data-t="page-rave">Rave</div>
    </div>

    <div id="export-ovl">
        <div class="polaroid">
            <img id="pol-img">
            <div id="pol-cap"></div>
        </div>
        <button class="btn solid" style="margin-top:20px; width:340px;" id="share-btn">SAVE / SHARE</button>
        <button class="btn" style="width:340px;" onclick="document.getElementById('export-ovl').style.display='none'">CLOSE</button>
    </div>

    <script>
        let stream, currentFacing = 'environment', lvlActive = false, raveActive = false, sirenActive = false;
        let evVal = 0, lastHex = ["#111","#222","#333"];
        let audioCtx, osc, sirenInt;

        const video = document.getElementById('video');
        const lcan = document.getElementById('lvl-canvas');
        const lctx = lcan.getContext('2d');

        // Robust Camera Init
        async function start() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacing, width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                resize();
            } catch(e) { console.error("Camera Init Failed", e); }
        }

        function resize() { lcan.width = video.clientWidth; lcan.height = video.clientHeight; }
        function flipCamera() { currentFacing = (currentFacing === 'user') ? 'environment' : 'user'; start(); }
        function toggleLevel() { lvlActive = !lvlActive; if(!lvlActive) lctx.clearRect(0,0,2000,2000); }

        function loop() {
            if(video.readyState === 4) {
                // Color Extraction Logic
                const can = document.createElement('canvas'); const ctx = can.getContext('2d');
                can.width = 50; can.height = 50;
                ctx.drawImage(video, 0, 0, 50, 50);
                const pix = ctx.getImageData(0,0,50,50).data;

                // Simple Dominant Sampling
                const getHex = (offset) => {
                    const r = pix[offset], g = pix[offset+1], b = pix[offset+2];
                    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
                };

                lastHex = [getHex(2500), getHex(1000), getHex(4000)];
                document.getElementById('sw-60').style.background = lastHex[0];
                document.getElementById('sw-30').style.background = lastHex[1];
                document.getElementById('sw-10').style.background = lastHex[2];
                document.getElementById('sw-60').innerText = lastHex[0].toUpperCase();
                
                document.getElementById('mj-prompt').innerText = `/imagine prompt: pattern, ${lastHex.join(', ')} --tile`;

                // EV Calculation
                let lum = 0; for(let i=0; i<pix.length; i+=4) lum += (pix[i]+pix[i+1]+pix[i+2])/3;
                evVal = Math.log2((lum/2500)/255 * 100/12.5).toFixed(1);
                document.getElementById('tel-ev').innerText = `EV ${evVal}`;

                if(lvlActive) drawLvl();
            }
            requestAnimationFrame(loop);
        }

        function drawLvl() {
            lctx.clearRect(0,0,lcan.width, lcan.height);
            lctx.strokeStyle = '#4cd964'; lctx.lineWidth = 2;
            lctx.beginPath(); lctx.moveTo(lcan.width*0.2, lcan.height/2); lctx.lineTo(lcan.width*0.8, lcan.height/2); lctx.stroke();
        }

        async function capture(mode) {
            const canvas = document.createElement('canvas'); canvas.width = 1200; canvas.height = 1200;
            const ctx = canvas.getContext('2d');
            if(mode === 'pol') {
                const s = Math.min(video.videoWidth, video.videoHeight);
                ctx.drawImage(video, (video.videoWidth-s)/2, (video.videoHeight-s)/2, s, s, 0, 0, 1200, 1200);
            } else {
                ctx.fillStyle = lastHex[0]; ctx.fillRect(0,0,1200,700);
                ctx.fillStyle = lastHex[1]; ctx.fillRect(0,700,1200,350);
                ctx.fillStyle = lastHex[2]; ctx.fillRect(0,1050,1200,150);
            }
            const data = canvas.toDataURL('image/jpeg', 0.95);
            document.getElementById('pol-img').src = data;
            document.getElementById('pol-cap').innerText = `EV: ${evVal} | PALETTE: ${lastHex.join(', ')}\nDATE: ${new Date().toLocaleString()}\nPR EYE TACTICAL`;
            document.getElementById('export-ovl').style.display = 'flex';
            
            document.getElementById('share-btn').onclick = async () => {
                const b = await (await fetch(data)).blob();
                const f = new File([b], `PREYE_${Date.now()}.jpg`, {type:'image/jpeg'});
                if(navigator.share) await navigator.share({files:[f]});
            };
        }

        function toggleRave() {
            raveActive = !raveActive;
            const ovl = document.getElementById('rave-overlay');
            ovl.style.display = raveActive ? 'block' : 'none';
            ovl.className = 'mode-police';
            document.getElementById('rave-btn').innerText = raveActive ? 'STOP RAVE' : 'START TACTICAL RAVE';
        }

        function toggleSiren() {
            if(sirenActive) { if(osc) osc.stop(); clearInterval(sirenInt); sirenActive = false; }
            else {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                osc = audioCtx.createOscillator(); osc.type = 'square'; osc.connect(audioCtx.destination); osc.start();
                sirenActive = true; let t = true;
                sirenInt = setInterval(() => { osc.frequency.setValueAtTime(t?435:580, audioCtx.currentTime); t=!t; }, 350);
            }
        }

        document.querySelectorAll('.nav-item').forEach(n => {
            n.onclick = () => {
                document.querySelectorAll('.nav-item, .page').forEach(x => x.classList.remove('active'));
                n.classList.add('active'); document.getElementById(n.dataset.t).classList.add('active');
            }
        });

        start(); loop();
    </script>
</body>
</html>
