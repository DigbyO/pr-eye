<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR EYE v11.0 — FIELD MASTER</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root { --gold: #d4c2a1; --bg: #050a10; --red: #ff3b30; --magenta: #ff2d55; --cyan: #5ac8fa; --green: #4cd964; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER & HUD */
        .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; z-index: 100; }
        .hdr-top { display: flex; justify-content: space-between; align-items: center; }
        .tel-bar { display: flex; gap: 12px; font-size: 10px; color: #8b9bb4; margin-top: 5px; }

        /* VIEWPORT & AR OVERLAYS */
        #viewport { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; overflow: hidden; border-bottom: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* FALSE COLOR SHADER */
        .false-color { filter: saturate(5) hue-rotate(90deg) contrast(1.5) brightness(1.2) invert(0.1); }
        
        /* SAMPLING MARKERS */
        .marker { position: absolute; width: 26px; height: 26px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; pointer-events: none; }
        #m-0 { border-color: var(--cyan); } #m-1 { border-color: var(--magenta); } #m-2 { border-color: var(--gold); }

        .main { flex: 1; overflow-y: auto; padding: 15px 15px 120px; }
        .page { display: none; } .page.active { display: block; }
        .panel { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; margin-bottom: 12px; }

        /* CANON HUD */
        .hud-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: #0d141e; border: 2px solid #555; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
        .hud-cell { padding: 8px; border: 0.5px solid #222; text-align: center; }
        .hud-v { font-size: 15px; font-weight: bold; color: #fff; }

        /* BUTTONS */
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #444; color: var(--gold); border-radius: 8px; font-size: 10px; text-transform: uppercase; cursor: pointer; margin-bottom: 8px; }
        .btn.solid { background: var(--gold); color: #000; font-weight: bold; border: none; }
        .btn.active { border-color: var(--green); color: var(--green); }

        /* RAVE */
        #rave-flash { display: none; position: fixed; inset: 0; z-index: 999; pointer-events: none; }
        .strobe { animation: strb 0.1s infinite; }
        @keyframes strb { 0% { background: #f00; } 50% { background: #00f; } }

        /* NAV */
        .nav { background: #000; border-top: 1px solid rgba(255,255,255,0.1); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; font-size: 9px; color: #555; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); border-top: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="hdr">
        <div class="hdr-top">
            <div style="font-family:'Cormorant Garamond'; letter-spacing:2px; color:var(--gold);">PR EYE v11.0</div>
            <div id="tel-ev" style="font-size:16px; font-weight:bold; color:var(--gold);">EV 0.0</div>
        </div>
        <div class="tel-bar">
            <span>GPS <span class="val" id="tel-gps">--</span></span>
            <span>ALT <span class="val" id="tel-alt">0°</span></span>
            <span>HDG <span class="val" id="tel-hdg">0°</span></span>
        </div>
    </div>

    <div id="viewport" onclick="setSample(event)">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="ar-canvas" class="overlay"></canvas>
        <canvas id="lvl-canvas" class="overlay"></canvas>
        <div id="m-0" class="marker">A</div>
        <div id="m-1" class="marker">B</div>
        <div id="m-2" class="marker">C</div>
        <div id="rave-flash"></div>
    </div>

    <div class="main">
        <div id="p-meter" class="page active">
            <div class="hud-grid">
                <div class="hud-cell"><span class="hud-v" id="h-ss">1/50</span></div>
                <div class="hud-cell"><span class="hud-v" id="h-f">F4.0</span></div>
                <div class="hud-cell"><span class="hud-v" id="h-iso">400</span></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn" id="btn-fc" onclick="toggleFC()">FALSE COLOR</button>
                <button class="btn" id="btn-sun" onclick="sunTrack = !sunTrack">SUN TRACKER</button>
                <button class="btn" onclick="flipCam()">FLIP CAM</button>
                <button class="btn" onclick="lvlActive = !lvlActive">LEVEL HUD</button>
            </div>
            <button class="btn solid" style="margin-top:10px; padding:18px;" onclick="capture('pol')">CAPTURE POLAROID</button>
        </div>

        <div id="p-color" class="page">
            <div class="panel">
                <div style="display:flex; height:50px; border-radius:8px; overflow:hidden; margin-bottom:10px;">
                    <div id="sw-0" style="flex:6; background:#333"></div>
                    <div id="sw-1" style="flex:3; background:#666"></div>
                    <div id="sw-2" style="flex:1; background:#999"></div>
                </div>
                <div id="mj-p" style="font-size:10px; color:#888; background:#000; padding:10px; border-radius:6px; margin-bottom:10px;">/imagine prompt: pattern...</div>
                <button class="btn solid" onclick="capture('swatch')">EXPORT SWATCH BOARD</button>
            </div>
        </div>

        <div id="p-tools" class="page">
            <div class="panel">
                <button class="btn" id="rave-btn" onclick="toggleRave()">TACTICAL RAVE</button>
                <button class="btn danger" id="siren-btn" onclick="toggleSiren()">EMERGENCY SIREN</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" data-t="p-meter">Meter</div>
        <div class="nav-item" data-t="p-color">Color</div>
        <div class="nav-item" data-t="p-tools">Tools</div>
    </div>

    <script>
        let stream, currentFacing = 'environment', lvlActive = false, fcActive = false, sunTrack = false;
        let lat = 0, lon = 0, hdg = 0, pitch = 0, roll = 0, hexList = ["#333","#666","#999"];
        let samplePts = [{x:0.5, y:0.5}, {x:0.3, y:0.3}, {x:0.7, y:0.7}];
        let activeIdx = 0, audioCtx, osc, sirenInt;

        const video = document.getElementById('video');
        const acan = document.getElementById('ar-canvas');
        const actx = acan.getContext('2d');
        const lcan = document.getElementById('lvl-canvas');
        const lctx = lcan.getContext('2d');

        async function init() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing, width: 1280 } });
            video.srcObject = stream;
        }

        function setSample(e) {
            const r = e.currentTarget.getBoundingClientRect();
            samplePts[activeIdx] = { x: (e.clientX - r.left) / r.width, y: (e.clientY - r.top) / r.height };
            const m = document.getElementById(`m-${activeIdx}`);
            m.style.left = (samplePts[activeIdx].x * 100) + '%';
            m.style.top = (samplePts[activeIdx].y * 100) + '%';
            activeIdx = (activeIdx + 1) % 3;
        }

        function toggleFC() { fcActive = !fcActive; video.className = fcActive ? 'false-color' : ''; document.getElementById('btn-fc').classList.toggle('active', fcActive); }

        function loop() {
            if(video.readyState === 4) {
                acan.width = lcan.width = video.clientWidth; acan.height = lcan.height = video.clientHeight;
                
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 100; c.height = 100; ctx.drawImage(video, 0, 0, 100, 100);
                const pix = ctx.getImageData(0,0,100,100).data;

                hexList = samplePts.map(p => {
                    const idx = (Math.floor(p.y*99)*100 + Math.floor(p.x*99))*4;
                    return "#" + ((1<<24)+(pix[idx]<<16)+(pix[idx+1]<<8)+pix[idx+2]).toString(16).slice(1).toUpperCase();
                });

                hexList.forEach((h, i) => document.getElementById(`sw-${i}`).style.background = h);
                document.getElementById('mj-p').innerText = `/imagine prompt: pattern, colors ${hexList.join(', ')} --tile`;

                // EV calculation
                let lum = 0; for(let i=0; i<pix.length; i+=4) lum += (0.299*pix[i]+0.587*pix[i+1]+0.114*pix[i+2]);
                const ev = Math.log2((lum/100)/255 * 100/12.5).toFixed(1);
                document.getElementById('tel-ev').innerText = `EV ${ev}`;

                if(lvlActive) drawLvl();
                if(sunTrack) drawSun();
            }
            requestAnimationFrame(loop);
        }

        function drawLvl() {
            lctx.clearRect(0,0,lcan.width, lcan.height);
            lctx.strokeStyle = Math.abs(roll) < 2 ? 'var(--green)' : 'var(--gold)';
            lctx.lineWidth = 3; lctx.save();
            lctx.translate(lcan.width/2, lcan.height/2);
            lctx.rotate(roll * Math.PI / 180);
            lctx.beginPath(); lctx.moveTo(-100, 0); lctx.lineTo(100, 0); lctx.stroke();
            lctx.restore();
        }

        function drawSun() {
            actx.clearRect(0,0,acan.width, acan.height);
            if(!lat || !lon) return;
            const sun = SunCalc.getPosition(new Date(), lat, lon);
            const sAz = (sun.azimuth * 180 / Math.PI + 180) % 360;
            const sAlt = sun.altitude * 180 / Math.PI;

            // Simple AR Projection
            let dAz = sAz - hdg; if(dAz > 180) dAz -= 360; if(dAz < -180) dAz += 360;
            let dAlt = sAlt - (90 - pitch);
            
            const x = (acan.width/2) + (dAz * (acan.width / 60));
            const y = (acan.height/2) - (dAlt * (acan.height / 45));

            actx.fillStyle = '#ffb347'; actx.beginPath(); actx.arc(x, y, 20, 0, Math.PI*2); actx.fill();
            actx.fillStyle = '#fff'; actx.font = '10px DM Mono'; actx.fillText(`SUN: ${sAlt.toFixed(1)}°`, x + 25, y);
        }

        function toggleSiren() {
            if(sirenActive) { if(osc) osc.stop(); sirenActive = false; clearInterval(sirenInt); }
            else {
                audioCtx = new AudioContext(); osc = audioCtx.createOscillator(); osc.type = 'square'; osc.connect(audioCtx.destination);
                osc.start(); sirenActive = true; let t = true;
                sirenInt = setInterval(() => { osc.frequency.setValueAtTime(t?435:580, audioCtx.currentTime); t=!t; }, 400);
            }
        }

        window.addEventListener('deviceorientation', e => {
            hdg = e.webkitCompassHeading || Math.abs(e.alpha - 360) || 0;
            pitch = e.beta || 0; roll = e.gamma || 0;
            document.getElementById('tel-hdg').innerText = Math.round(hdg) + '°';
            document.getElementById('tel-alt').innerText = Math.round(pitch) + '°';
        });

        navigator.geolocation.watchPosition(p => {
            lat = p.coords.latitude; lon = p.coords.longitude;
            document.getElementById('tel-gps').innerText = `${lat.toFixed(2)},${lon.toFixed(2)}`;
        });

        document.querySelectorAll('.nav-item').forEach(i => i.onclick = () => {
            document.querySelectorAll('.nav-item, .page').forEach(x => x.classList.remove('active'));
            i.classList.add('active'); document.getElementById(i.dataset.t).classList.add('active');
        });

        init(); loop();
    </script>
</body>
</html>
