<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye v4.6.2 — Pro Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root {
            --navy: #09121c; --border: rgba(255, 255, 255, 0.08);
            --gold: #d4c2a1; --muted: #8b9bb4; --text: #f0f4f8;
            --red: #ff4d4d; --cyan: #00ffff; --canon-orange: #f39c12;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--navy); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;}
        .brand { font-family: 'Cormorant Garamond'; font-size: 18px; color: var(--gold); letter-spacing: 2px; }

        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        .page { display: none; } .page.active { display: block; }

        #persistent-cam-area { margin-bottom: 15px; display: flex; flex-direction: column; }
        .viewfinder-wrap { display: flex; gap: 10px; height: 180px; margin-bottom: 10px; }
        .cam-container { position: relative; flex: 1; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        .pro-meter-display { text-align: center; margin-bottom: 15px; }
        #ev-big-val { font-family: 'Cormorant Garamond'; font-size: 72px; color: var(--gold); line-height: 1; }

        .btn { padding: 12px; background: transparent; border: 1px solid rgba(212,194,161,0.3); color: var(--gold); border-radius: 8px; cursor: pointer; flex: 1; font-size: 10px; text-transform: uppercase; text-align: center;}
        .btn.solid { background: var(--gold); color: #000; font-weight: bold; border: none; }
        .btn.sm { padding: 8px; font-size: 9px; }
        
        .nav { background: rgba(9, 18, 28, 0.95); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; color: var(--muted); font-size: 9px; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        .pan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .pan-item { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; display: flex; height: 45px; overflow: hidden; }
        .pan-swatch { width: 35%; }
        .pan-data { padding: 5px; font-size: 9px; display: flex; flex-direction: column; justify-content: center; }

        #result-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #result-img { max-width: 100%; max-height: 70vh; border: 1px solid var(--gold); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="hdr">
        <div class="brand">PR EYE v4.6.2</div>
        <div id="tel-wb" style="font-size: 10px; color: var(--muted);">WB 5500K</div>
    </div>

    <div class="main-content">
        <div id="persistent-cam-area">
            <div class="viewfinder-wrap">
                <div class="cam-container" id="cam-wrapper">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="ui-layer" class="overlay"></canvas>
                </div>
            </div>
            <button id="capture-btn" class="btn solid">CAPTURE FRAME</button>
        </div>

        <div id="page-meter" class="page active">
            <div class="pro-meter-display">
                <div id="ev-big-val">0.0</div>
                <div id="ev-zone-label" style="color: var(--muted); font-size: 11px; letter-spacing: 2px;">ZONE V</div>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="torch-btn" class="btn">TORCH</button>
                <button id="fc-toggle-btn" class="btn">F-COL: OFF</button>
            </div>
        </div>

        <div id="page-color" class="page">
            <h4 style="color:var(--gold); margin-bottom:10px;">GENERATIVE INTERIORS</h4>
            <div class="toggle-switch" style="display:flex; gap:5px; margin-bottom:10px;">
                <button class="btn sm prompt-style-btn active" data-style="Modern Home">Modern</button>
                <button class="btn sm prompt-style-btn" data-style="Georgian House">Georgian</button>
                <button class="btn sm prompt-style-btn" data-style="English Cottage">Cottage</button>
            </div>
            <textarea id="mj-prompt-output" style="width:100%; height:100px; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:#fff; font-family:inherit; padding:10px; font-size:11px; margin-bottom:10px;" readonly></textarea>
            <button class="btn sm" id="btn-copy-mj" style="width:100%">Copy Prompt</button>

            <div class="pan-grid" id="swatch-container">
                <div class="pan-item"><div class="pan-swatch" id="cs1"></div><div class="pan-data"><div id="ch1">#---</div></div></div>
                <div class="pan-item"><div class="pan-swatch" id="cs2"></div><div class="pan-data"><div id="ch2">#---</div></div></div>
            </div>
        </div>
    </div>

    <div id="result-overlay">
        <img id="result-img" src="">
        <button class="btn solid" id="btn-close-result" style="width:200px">CLOSE</button>
    </div>

    <div class="nav">
        <div class="nav-item active" data-target="page-meter">Meter</div>
        <div class="nav-item" data-target="page-color">Color</div>
        <div class="nav-item" data-target="page-scout">Scout</div>
    </div>

    <canvas id="proc-canvas" width="300" height="400" style="display:none"></canvas>
    <canvas id="composite-canvas" width="1000" height="1500" style="display:none"></canvas>

<script>
    const video = document.getElementById('video');
    const procCtx = document.getElementById('proc-canvas').getContext('2d', { willReadFrequently: true });
    const compCanvas = document.getElementById('composite-canvas');
    const compCtx = compCanvas.getContext('2d');
    
    let stream = null;
    let currentEV = 0;
    let extractedHex = ["#333333", "#666666"];
    let currentInteriorStyle = "Modern Home";

    async function startCamera() {
        try {
            if(stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            video.srcObject = stream;
        } catch (e) { alert("Camera Error: " + e); }
    }

    // Capture Logic
    document.getElementById('capture-btn').addEventListener('click', () => {
        if(video.readyState !== 4) return;
        compCtx.fillStyle = '#09121c';
        compCtx.fillRect(0,0,1000,1500);
        compCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 50, 50, 900, 1200);
        
        // Footer bar
        compCtx.fillStyle = 'rgba(0,0,0,0.8)';
        compCtx.fillRect(50, 1100, 900, 150);
        
        // Swatches on capture
        compCtx.fillStyle = extractedHex[0]; compCtx.fillRect(60, 1115, 60, 60);
        compCtx.fillStyle = extractedHex[1]; compCtx.fillRect(130, 1115, 60, 60);
        
        compCtx.fillStyle = '#d4c2a1';
        compCtx.font = 'bold 30px Arial';
        compCtx.fillText("EV " + currentEV.toFixed(1) + " | " + currentInteriorStyle, 210, 1155);

        const dataUrl = compCanvas.toDataURL('image/jpeg', 0.9);
        document.getElementById('result-img').src = dataUrl;
        document.getElementById('result-overlay').style.display = 'flex';
    });

    document.getElementById('btn-close-result').onclick = () => document.getElementById('result-overlay').style.display = 'none';

    // Style Switcher
    document.querySelectorAll('.prompt-style-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.prompt-style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentInteriorStyle = btn.dataset.style;
        };
    });

    // Navigation
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.addEventListener('click', () => {
            document.querySelectorAll('.nav-item, .page').forEach(el => el.classList.remove('active'));
            nav.classList.add('active');
            document.getElementById(nav.dataset.target).classList.add('active');
        });
    });

    const rgbToHex = (r,g,b) => "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1).toUpperCase();

    function liveLoop() {
        if (video.readyState === 4) {
            procCtx.drawImage(video, 0, 0, 300, 400);
            
            // Exposure
            const midData = procCtx.getImageData(140, 190, 20, 20).data;
            let lum = 0;
            for(let i=0; i<midData.length; i+=4) lum += (0.299*midData[i] + 0.587*midData[i+1] + 0.114*midData[i+2]);
            const avg = lum / (midData.length / 4);
            currentEV = Math.log2((Math.max(1, avg) / 255) * 100 / 14.0);
            document.getElementById('ev-big-val').innerText = currentEV.toFixed(1);
            
            // Zones
            const zones = ['ZONE 0','ZONE I','ZONE II','ZONE III','ZONE IV','ZONE V','ZONE VI','ZONE VII','ZONE VIII','ZONE IX','ZONE X'];
            document.getElementById('ev-zone-label').innerText = zones[Math.max(0, Math.min(10, Math.round(currentEV + 5)))];

            // Color Sampling (Points 1 and 2)
            const p1 = procCtx.getImageData(75, 100, 1, 1).data;
            const p2 = procCtx.getImageData(225, 300, 1, 1).data;
            extractedHex[0] = rgbToHex(p1[0], p1[1], p1[2]);
            extractedHex[1] = rgbToHex(p2[0], p2[1], p2[2]);
            
            document.getElementById('cs1').style.backgroundColor = extractedHex[0];
            document.getElementById('ch1').innerText = extractedHex[0];
            document.getElementById('cs2').style.backgroundColor = extractedHex[1];
            document.getElementById('ch2').innerText = extractedHex[1];

            // Build Prompt
            const prompt = `/imagine prompt: interior photography of a ${currentInteriorStyle}, color palette of ${extractedHex[0]} and ${extractedHex[1]}, cinematic lighting, shot on 35mm, --ar 3:4 --v 6.1`;
            document.getElementById('mj-prompt-output').value = prompt;
        }
        requestAnimationFrame(liveLoop);
    }

    startCamera();
    liveLoop();
</script>
</body>
</html>
