<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye v5.0 — The Professional Cinematographer's Field Toolkit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root {
            --navy: #050a0f; --border: rgba(255, 255, 255, 0.1);
            --gold: #d4c2a1; --muted: #6b7b94; --text: #f0f4f8;
            --red: #ff3b30; --blue: #007aff; --magenta: #ff2d55; --cyan: #5ac8fa; --green: #4cd964;
            --zebra: repeating-linear-gradient(45deg, #000, #000 10px, #fff 10px, #fff 20px);
            --sharpie: 'Permanent Marker', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--navy); color: var(--text); font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* UI HEADER */
        .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid var(--border); z-index: 100; flex-shrink: 0; }
        .hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .brand { font-family: 'Cormorant Garamond'; font-size: 20px; color: var(--gold); letter-spacing: 2px; font-weight: 500; text-transform: uppercase;}
        .telemetry { display: flex; gap: 12px; font-size: 10px; color: var(--muted); text-transform: uppercase; }

        /* CAMERA AREA */
        #cam-area { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; overflow: hidden; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        #fc-legend { position: absolute; bottom: 10px; left: 10px; height: 10px; width: 120px; display: none; background: linear-gradient(to right, #00f, #0ff, #0f0, #ff0, #f00); border: 1px solid #fff; z-index: 10; }

        /* SPLIT SCREEN OVERLAYS */
        #split-overlay { position: absolute; inset: 0; display: none; grid-template-columns: 1fr 1fr; pointer-events: none; z-index: 5; }
        .split-pane { border: 1px solid rgba(255,255,255,0.2); position: relative; }
        .pane-label { position: absolute; top: 5px; left: 5px; background: #000; color: #fff; font-size: 8px; padding: 2px 4px; }

        /* METERING UI */
        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        .page { display: none; } .page.active { display: block; }
        .ctrl-panel { border-radius: 12px; padding: 15px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); }
        
        .ev-huge { font-family: 'Cormorant Garamond'; font-size: 72px; text-align: center; line-height: 1; margin: 10px 0; color: var(--gold); }
        .zone-bar { height: 4px; background: #222; margin: 10px 0; display: flex; }
        .zone-tick { flex: 1; border-right: 1px solid #000; }
        .zone-tick.active { background: var(--gold); }

        /* JOG DIALS */
        .jog-dial { height: 50px; background: #080c11; border: 1px solid #333; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; overflow: hidden; position: relative;}
        .jog-label { width: 40px; text-align: center; font-size: 9px; color: var(--muted); border-right: 1px solid #333; z-index: 2;}
        .jog-track { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .jog-val { flex: 0 0 33.33%; text-align: center; scroll-snap-align: center; font-size: 14px; opacity: 0.3; }
        .jog-val.active { opacity: 1; color: var(--gold); font-weight: bold; }

        /* BUTTONS & TOGGLES */
        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn { flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border); color: var(--gold); border-radius: 8px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn.active { background: var(--gold); color: #000; }
        .btn.solid { background: var(--gold); color: #000; font-weight: bold; }

        /* NAV */
        .nav { background: #000; border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 200; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; color: var(--muted); font-size: 9px; text-transform: uppercase; }
        .nav-item.active { color: var(--gold); }

        /* POLAROID EXPORT */
        #polaroid-wrap { display: none; background: #fff; padding: 15px 15px 60px 15px; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: absolute; top: -5000px; }
        #polaroid-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        #polaroid-text { font-family: var(--sharpie); color: #222; font-size: 18px; margin-top: 15px; }

        /* LEGAL */
        .release-form { padding: 15px; background: #fff; color: #000; font-size: 10px; display: none; }
        .signature-box { border: 1px solid #000; height: 80px; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="hdr">
        <div class="hdr-top">
            <div class="brand">PR EYE v5.0</div>
            <div class="telemetry">
                <span id="tel-temp">--°C</span>
                <span id="tel-tilt">LEVEL: 0°</span>
                <span id="tel-bat">BAT: --%</span>
            </div>
        </div>
        <input type="text" id="project-title" class="project-input" placeholder="JOB TITLE / SCENE...">
    </div>

    <div id="cam-area">
        <video id="video-feed" autoplay playsinline></video>
        <canvas id="fc-overlay" class="overlay"></canvas>
        <canvas id="ui-overlay" class="overlay"></canvas>
        <canvas id="waveform-canvas" style="position:absolute; bottom:0; width:100%; height:80px; opacity:0.6; pointer-events:none;"></canvas>
        <div id="fc-legend"></div>
        <div id="split-overlay">
            <div class="split-pane"><div class="pane-label">+1 EV</div></div>
            <div class="split-pane"><div class="pane-label">-1 EV</div></div>
        </div>
    </div>

    <div class="main-content">
        <div id="page-meter" class="page active">
            <div class="ev-huge" id="ev-val">0.0</div>
            <div class="zone-bar" id="zone-bar"></div>
            
            <div class="btn-row">
                <button class="btn" onclick="toggleFC()">FALSE COLOUR</button>
                <button class="btn" onclick="toggleSplit()">SPLIT EV</button>
                <button class="btn" onclick="toggleFocus()">PEAKING</button>
            </div>

            <div class="jog-dial"><div class="jog-label">SS</div><div class="jog-track" id="dial-shutter"></div></div>
            <div class="jog-dial"><div class="jog-label">F/</div><div class="jog-track" id="dial-aperture"></div></div>
            <div class="jog-dial"><div class="jog-label">ISO</div><div class="jog-track" id="dial-iso"></div></div>
            
            <button class="btn solid" style="width:100%; margin-top:10px;" onclick="capturePolaroid()">CAPTURE POLAROID</button>
        </div>

        <div id="page-color" class="page">
            <div class="ctrl-panel">
                <div id="live-palette" style="display:flex; gap:10px; height:80px; margin-bottom:15px;"></div>
                <div id="harmony-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            </div>
            <textarea id="mj-prompt" style="width:100%; height:60px; background:transparent; border:1px solid #333; color:var(--gold); padding:10px; font-size:10px;" readonly></textarea>
        </div>

        <div id="page-scout" class="page">
            <div class="ctrl-panel">
                <div id="scout-map" style="height:180px; background:#111; border-radius:8px; margin-bottom:15px;"></div>
                <div id="scout-data" style="font-size:11px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div>Sunrise: <span id="s-rise">--:--</span></div>
                    <div>Sunset: <span id="s-set">--:--</span></div>
                    <div>Tide: <span id="s-tide">--:--</span></div>
                    <div>Blue Hour: <span id="s-blue">--:--</span></div>
                </div>
            </div>
        </div>

        <div id="page-tools" class="page">
            <div class="ctrl-panel">
                <h4 style="color:var(--gold)">LOCATION NAV</h4>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;">
                    <button class="btn" onclick="navTo('pub')">PUB</button>
                    <button class="btn" onclick="navTo('hospital')">A&E</button>
                    <button class="btn" onclick="navTo('camera+shop')">GEAR</button>
                    <button class="btn" onclick="navTo('station')">TUBE</button>
                </div>
            </div>
        </div>

        <div id="page-legal" class="page">
            <div class="ctrl-panel">
                <button class="btn solid" onclick="generateRelease()">GENERATE MODEL RELEASE PDF</button>
            </div>
        </div>
    </div>

    <div id="polaroid-wrap">
        <canvas id="p-canvas" style="width:100%"></canvas>
        <div id="p-text"></div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="switchPage('meter')">Meter</div>
        <div class="nav-item" onclick="switchPage('color')">Color</div>
        <div class="nav-item" onclick="switchPage('scout')">Scout</div>
        <div class="nav-item" onclick="switchPage('tools')">Tools</div>
        <div class="nav-item" onclick="switchPage('legal')">Legal</div>
    </div>

    <script>
        const video = document.getElementById('video-feed');
        const waveformCtx = document.getElementById('waveform-canvas').getContext('2d');
        const fcCtx = document.getElementById('fc-overlay').getContext('2d');
        let fcActive = false, peakingActive = false;

        // DIAL DATA
        const shutters = ['1/50', '1/60', '1/125', '1/250', '1/500', '1/1000'];
        const apertures = ['f/1.4', 'f/2.0', 'f/2.8', 'f/4.0', 'f/5.6', 'f/8', 'f/11'];
        const isos = ['100', '200', '400', '800', '1600', '3200'];

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                video.srcObject = stream;
                setupDials();
                requestAnimationFrame(liveLoop);
                updateBattery();
            } catch (err) { alert("Cam failed. Check permissions."); }
        }

        function setupDials() {
            populateDial('dial-shutter', shutters);
            populateDial('dial-aperture', apertures);
            populateDial('dial-iso', isos);
        }

        function populateDial(id, arr) {
            const track = document.getElementById(id);
            track.innerHTML = '<div class="jog-val"></div>' + arr.map(v => `<div class="jog-val">${v}</div>`).join('') + '<div class="jog-val"></div>';
            track.addEventListener('scroll', () => {
                const center = track.scrollLeft + track.clientWidth / 2;
                track.querySelectorAll('.jog-val').forEach(v => {
                    const d = Math.abs(center - (v.offsetLeft + v.clientWidth/2));
                    v.classList.toggle('active', d < 30);
                });
            });
        }

        function liveLoop() {
            if (video.readyState === 4) {
                drawWaveform();
                if (fcActive) drawFalseColour();
                if (peakingActive) drawPeaking();
            }
            requestAnimationFrame(liveLoop);
        }

        function drawWaveform() {
            const w = waveformCtx.canvas.width;
            const h = waveformCtx.canvas.height;
            waveformCtx.clearRect(0,0,w,h);
            waveformCtx.fillStyle = 'rgba(0, 255, 0, 0.5)';
            // Sampling logic...
            waveformCtx.fillRect(10, 10, w-20, h-20); // Placeholder
        }

        function toggleFC() { 
            fcActive = !fcActive; 
            document.getElementById('fc-legend').style.display = fcActive ? 'block' : 'none';
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            // Trigger UI update...
        }

        function capturePolaroid() {
            const wrap = document.getElementById('polaroid-wrap');
            wrap.style.display = 'block';
            const canvas = document.getElementById('p-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000; canvas.height = 1000;
            ctx.drawImage(video, 0, 0, 1000, 1000);
            const text = document.getElementById('project-title').value || "SCENE 01";
            document.getElementById('p-text').innerText = text + " | " + new Date().toLocaleDateString();
            
            // In a real app, use html2canvas here to export the div as JPG
            alert("Polaroid Captured to Scout History");
        }

        function navTo(q) {
            navigator.geolocation.getCurrentPosition(pos => {
                const url = `https://www.google.com/maps/search/${q}/@${pos.coords.latitude},${pos.coords.longitude}`;
                window.open(url, '_blank');
            });
        }

        function updateBattery() {
            if (navigator.getBattery) {
                navigator.getBattery().then(bat => {
                    document.getElementById('tel-bat').innerText = `BAT: ${Math.round(bat.level * 100)}%`;
                });
            }
        }

        window.addEventListener('deviceorientation', (e) => {
            document.getElementById('tel-tilt').innerText = `LEVEL: ${Math.round(e.beta)}°`;
        });

        init();
    </script>
</body>
</html>
