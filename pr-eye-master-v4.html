<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR EYE v4.1 (v19.0.0)</title>
    <style>
        :root {
            --bg-dark: #0A111F;
            --panel-bg: #151E2D;
            --gold: #D4C4A1;
            --text-main: #FFFFFF;
            --text-dim: #8E9AAF;
            --accent-red: #E63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header Section --- */
        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; }
        .meta-info { display: flex; gap: 15px; font-size: 0.8rem; color: var(--text-main); }
        .meta-info span { font-weight: 500; }

        /* --- Primary EV Display --- */
        .ev-hero {
            text-align: center;
            padding: 10px 0;
        }
        .ev-value { font-size: 6rem; font-weight: 700; line-height: 1; position: relative; display: inline-block; }
        .ev-unit { font-size: 1.5rem; position: absolute; top: 15px; right: -35px; }
        .ev-label { color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; margin-top: 5px; }

        /* --- Media Row (Camera & Histogram) --- */
        .media-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            padding: 10px 15px;
            height: 180px;
        }

        .preview-container {
            background: #000;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        #camera-view { width: 100%; height: 100%; object-fit: cover; }
        .preview-label {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px; font-size: 0.6rem; border-radius: 4px;
        }

        .histogram-container {
            background: var(--panel-bg);
            border-radius: 8px;
            position: relative;
        }
        #histogram-canvas { width: 100%; height: 100%; }

        /* --- Function Buttons --- */
        .btn-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 10px 15px;
        }
        .ui-btn {
            background: var(--panel-bg);
            border: 1px solid #2A3649;
            color: var(--text-main);
            padding: 10px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* --- Parameter Grid --- */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            text-align: center;
            border-top: 1px solid #2A3649;
            border-bottom: 1px solid #2A3649;
            margin: 10px 0;
            padding: 15px 0;
        }
        .grid-item .label { color: var(--gold); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 5px; }
        .grid-item .value { font-size: 1.4rem; font-weight: 500; }

        /* --- Meter Scale --- */
        .meter-container {
            padding: 10px 20px;
            position: relative;
        }
        .scale {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-main);
            position: relative;
            padding-bottom: 10px;
        }
        .scale-line {
            height: 1px; background: #444; position: absolute; bottom: 0; width: 100%;
        }
        .indicator {
            position: absolute; bottom: -5px; left: 50%;
            width: 2px; height: 15px; background: var(--accent-red);
            transition: left 0.2s ease;
        }

        /* --- Sliders --- */
        .controls { padding: 5px 20px; }
        .control-group { display: flex; align-items: center; margin-bottom: 15px; }
        .control-label { width: 40px; font-size: 0.7rem; color: var(--text-dim); }
        input[type=range] {
            flex-grow: 1;
            appearance: none; background: #2A3649; height: 2px; outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 18px; height: 18px;
            background: var(--gold); border-radius: 50%; cursor: pointer;
        }

        /* --- Bottom Bar --- */
        .capture-area { padding: 10px 15px; }
        .capture-btn {
            width: 100%; background: var(--gold); color: #000;
            border: none; padding: 18px; font-weight: bold;
            font-size: 1.1rem; border-radius: 8px; text-transform: uppercase;
        }

        nav {
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #2A3649;
            font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
        }
        nav span.active { color: #FFF; border-bottom: 2px solid #FFF; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div class="brand">PR EYE <span style="font-weight: 300;">v4.1</span></div>
    <div class="meta-info">
        <div>WB <span id="wb-val">2258K</span></div>
        <div>LUX <span id="lux-val">9</span></div>
    </div>
</header>

<div class="ev-hero">
    <div class="ev-value"><span id="ev-display">1.9</span><span class="ev-unit">EV</span></div>
    <div class="ev-label">VOL KEYS: EV BIAS +/-</div>
</div>

<div class="media-row">
    <div class="preview-container">
        <div class="preview-label">REFLECTED</div>
        <video id="camera-view" autoplay playsinline></video>
    </div>
    <div class="histogram-container">
        <canvas id="histogram-canvas"></canvas>
    </div>
</div>

<div class="btn-row">
    <button class="ui-btn">Split Screen</button>
    <button class="ui-btn">False Col</button>
    <button class="ui-btn">Grid</button>
</div>

<div class="data-grid">
    <div class="grid-item">
        <div class="label">Shutter</div>
        <div class="value" id="ss-val">1/60</div>
    </div>
    <div class="grid-item">
        <div class="label">F-Stop</div>
        <div class="value" id="f-val">F5.6</div>
    </div>
    <div class="grid-item">
        <div class="label">ISO</div>
        <div class="value" id="iso-val">400</div>
    </div>
</div>

<div class="meter-container">
    <div class="scale">
        <span>-3</span><span>-2</span><span>-1</span><span>0</span><span>+1</span><span>+2</span><span>+3</span>
        <div class="scale-line"></div>
        <div class="indicator" id="meter-indicator"></div>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <div class="control-label">SS</div>
        <input type="range" id="ss-slider" min="0" max="10" value="5">
    </div>
    <div class="control-group">
        <div class="control-label">F/</div>
        <input type="range" id="f-slider" min="0" max="10" value="4">
    </div>
    <div class="control-group">
        <div class="control-label">ISO</div>
        <input type="range" id="iso-slider" min="100" max="3200" step="100" value="400">
    </div>
</div>

<div class="capture-area">
    <button class="capture-btn">Capture Frame</button>
</div>

<nav>
    <span class="active">Meter</span>
    <span>Color</span>
    <span style="opacity: 0.3;">■</span>
</nav>

<script>
    // --- Camera Initialization ---
    async function initCamera() {
        const video = document.getElementById('camera-view');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            console.error("Camera Error: ", err);
            alert("Camera access denied or unavailable. Please check permissions.");
        }
    }

    // --- Logic & UI Updates ---
    const ssSlider = document.getElementById('ss-slider');
    const fSlider = document.getElementById('f-slider');
    const isoSlider = document.getElementById('iso-slider');
    
    const ssText = document.getElementById('ss-val');
    const fText = document.getElementById('f-val');
    const isoText = document.getElementById('iso-val');
    const evDisplay = document.getElementById('ev-display');
    const indicator = document.getElementById('meter-indicator');

    function updateLogic() {
        // Mock calculations to demonstrate live UI response
        const ssArray = ["1/15", "1/30", "1/60", "1/125", "1/250", "1/500", "1/1000"];
        const fArray = ["F2.8", "F4.0", "F5.6", "F8.0", "F11", "F16"];
        
        const ssVal = ssArray[Math.floor(ssSlider.value % ssArray.length)];
        const fVal = fArray[Math.floor(fSlider.value % fArray.length)];
        
        ssText.innerText = ssVal;
        fText.innerText = fVal;
        isoText.innerText = isoSlider.value;

        // Dynamic EV Calculation (Simplified for UI display)
        let simulatedEV = (parseFloat(ssSlider.value) + parseFloat(fSlider.value)) / 4;
        evDisplay.innerText = simulatedEV.toFixed(1);

        // Move Meter Indicator (-3 to +3 mapping)
        let percent = ((simulatedEV + 3) / 6) * 100;
        indicator.style.left = `${Math.max(0, Math.min(100, percent))}%`;
    }

    // --- Listeners ---
    [ssSlider, fSlider, isoSlider].forEach(s => s.addEventListener('input', updateLogic));

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
        initCamera();
        updateLogic();
    });
</script>

</body>
</html>
