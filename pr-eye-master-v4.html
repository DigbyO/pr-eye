<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PR EYE v4.1 (v19.4.0)</title>
    <style>
        :root {
            --bg-dark: #0A111F;
            --panel-bg: #151E2D;
            --gold: #D4C4A1;
            --text-main: #FFFFFF;
            --text-dim: #8E9AAF;
            --accent-red: #E63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { padding: 20px 20px 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .brand { font-weight: 700; letter-spacing: 3px; font-size: 1.1rem; text-transform: uppercase; }
        .meta-info { display: flex; gap: 12px; font-size: 0.75rem; font-weight: 500; }

        .ev-hero { text-align: center; padding: 10px 0; }
        .ev-value { font-size: 6.5rem; font-weight: 700; line-height: 0.9; position: relative; display: inline-block; letter-spacing: -2px; }
        .ev-unit { font-size: 1.4rem; position: absolute; top: 10px; right: -45px; color: var(--text-dim); }
        .ev-label { color: var(--text-dim); font-size: 0.6rem; letter-spacing: 2px; margin-top: 10px; font-weight: 600; }

        .media-row { display: grid; grid-template-columns: 2.3fr 1fr; gap: 10px; padding: 10px 15px; height: 170px; }
        .preview-container { background: #000; border-radius: 6px; position: relative; overflow: hidden; border: 1px solid #1F2937; }
        #camera-view { display: none !important; }
        #preview-canvas { width: 100%; height: 100%; object-fit: cover; }
        .preview-label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 3px 8px; font-size: 0.55rem; border-radius: 4px; font-weight: bold; z-index: 10; }
        
        .histogram-container { background: #050A14; border-radius: 6px; border: 1px solid #1F2937; overflow: hidden; position: relative;}
        #hist-canvas { width: 100%; height: 100%; display: block; }

        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px 15px; }
        .ui-btn { background: var(--panel-bg); border: 1px solid #2A3649; color: var(--text-main); padding: 12px; font-size: 0.65rem; font-weight: 700; border-radius: 6px; text-transform: uppercase; }
        .ui-btn.active { border-color: var(--gold); color: var(--gold); background: #1a2638; }

        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; border-top: 1px solid #1F2937; border-bottom: 1px solid #1F2937; margin: 10px 0; padding: 15px 0; }
        .grid-item .label { color: var(--gold); font-size: 0.6rem; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
        .grid-item .value { font-size: 1.4rem; font-weight: 500; font-variant-numeric: tabular-nums; }

        .meter-container { padding: 10px 25px 20px; position: relative; }
        .scale { display: flex; justify-content: space-between; font-size: 0.8rem; color: #FFF; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .scale span:nth-child(even) { color: #444; font-size: 1.2rem; line-height: 0.5; }
        .indicator { position: absolute; bottom: -5px; left: 50%; width: 2px; height: 18px; background: var(--accent-red); transition: left 0.1s ease-out; }

        .controls { padding: 5px 25px; flex-grow: 1; }
        .control-group { display: flex; align-items: center; margin-bottom: 12px; }
        .control-label { width: 50px; font-size: 0.7rem; color: var(--text-dim); font-weight: 800; }
        input[type=range] { flex-grow: 1; appearance: none; background: #1F2937; height: 2px; border-radius: 2px; outline: none;}
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 24px; height: 24px; background: var(--gold); border-radius: 50%; border: 4px solid var(--bg-dark); }

        .capture-area { padding: 15px; }
        .capture-btn { width: 100%; background: var(--gold); color: #1A1A1A; border: none; padding: 18px; font-weight: 900; font-size: 1.1rem; border-radius: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        nav { display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid #1F2937; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        nav span.active { color: #FFF; border-bottom: 2px solid #FFF; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div class="brand">PR EYE <span style="font-weight: 300;">v4.1</span></div>
    <div class="meta-info">
        <div>WB <span style="color:#5CB8B2">2258K</span></div>
        <div>LUX <span style="color:#5CB8B2">9</span></div>
    </div>
</header>

<div class="ev-hero">
    <div class="ev-value"><span id="ev-display">1.9</span><span class="ev-unit">EV</span></div>
    <div class="ev-label">VOL KEYS: EV BIAS +/-</div>
</div>

<div class="media-row">
    <div class="preview-container">
        <div class="preview-label" id="mode-label">REFLECTED</div>
        <video id="camera-view" autoplay playsinline muted></video>
        <canvas id="preview-canvas"></canvas>
    </div>
    <div class="histogram-container">
        <canvas id="hist-canvas"></canvas>
    </div>
</div>

<div class="btn-row">
    <button class="ui-btn" id="btn-split">Split Screen</button>
    <button class="ui-btn">False Col</button>
    <button class="ui-btn">Grid</button>
</div>

<div class="data-grid">
    <div class="grid-item"><div class="label">Shutter</div><div class="value" id="ss-val">1/60</div></div>
    <div class="grid-item"><div class="label">F-Stop</div><div class="value" id="f-val">F5.6</div></div>
    <div class="grid-item"><div class="label">ISO</div><div class="value" id="iso-val">400</div></div>
</div>

<div class="meter-container">
    <div class="scale">
        <span>-3</span><span>..</span><span>-2</span><span>..</span><span>-1</span><span>..</span><span>0</span><span>..</span><span>1</span><span>..</span><span>2</span><span>..</span><span>3</span>
        <div class="indicator" id="meter-indicator"></div>
    </div>
</div>

<div class="controls">
    <div class="control-group"><div class="control-label">SS</div><input type="range" id="ss-slider" min="0" max="24" value="9"></div>
    <div class="control-group"><div class="control-label">F/</div><input type="range" id="f-slider" min="0" max="27" value="13"></div>
    <div class="control-group"><div class="control-label">ISO</div><input type="range" id="iso-slider" min="0" max="18" value="6"></div>
</div>

<div class="capture-area">
    <button class="capture-btn" id="btn-capture">Capture Frame</button>
</div>

<nav><span class="active">Meter</span><span>Color</span><span>■</span></nav>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
    // Arrays for 1/3 Stop increments
    const shutterSpeeds = ["1/8", "1/10", "1/13", "1/15", "1/20", "1/25", "1/30", "1/40", "1/50", "1/60", "1/80", "1/100", "1/125", "1/160", "1/200", "1/250", "1/320", "1/400", "1/500", "1/640", "1/800", "1/1000", "1/1250", "1/1600", "1/2000"];
    const shutterValues = [1/8, 1/10, 1/13, 1/15, 1/20, 1/25, 1/30, 1/40, 1/50, 1/60, 1/80, 1/100, 1/125, 1/160, 1/200, 1/250, 1/320, 1/400, 1/500, 1/640, 1/800, 1/1000, 1/1250, 1/1600, 1/2000];
    const apertureSpeeds = ["F1.0", "F1.1", "F1.2", "F1.4", "F1.6", "F1.8", "F2.0", "F2.2", "F2.5", "F2.8", "F3.2", "F3.5", "F4.0", "F4.5", "F5.0", "F5.6", "F6.3", "F7.1", "F8.0", "F9.0", "F10", "F11", "F13", "F14", "F16", "F18", "F20", "F22"];
    const apertureValues = [1.0, 1.1, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2, 2.5, 2.8, 3.2, 3.5, 4.0, 4.5, 5.0, 5.6, 6.3, 7.1, 8.0, 9.0, 10, 11, 13, 14, 16, 18, 20, 22];
    const isoSpeeds = ["100", "125", "160", "200", "250", "320", "400", "500", "640", "800", "1000", "1250", "1600", "2000", "2500", "3200", "4000", "5000", "6400"];
    const isoValues = [100, 125, 160, 200, 250, 320, 400, 500, 640, 800, 1000, 1250, 1600, 2000, 2500, 3200, 4000, 5000, 6400];

    const video = document.getElementById('camera-view');
    const pCanvas = document.getElementById('preview-canvas');
    const pCtx = pCanvas.getContext('2d');
    const hCanvas = document.getElementById('hist-canvas');
    const hCtx = hCanvas.getContext('2d');
    const procCanvas = document.getElementById('proc-canvas');
    const procCtx = procCanvas.getContext('2d', {willReadFrequently: true});

    let isSplit = false;

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                pCanvas.width = video.videoWidth; pCanvas.height = video.videoHeight;
                requestAnimationFrame(loop);
            };
        } catch (e) { console.error("Camera Init Failed"); }
    }

    function calculateEV() {
        const t = shutterValues[document.getElementById('ss-slider').value];
        const N = apertureValues[document.getElementById('f-slider').value];
        const S = isoValues[document.getElementById('iso-slider').value];
        
        // EV @ ISO 100 = log2(N^2 / t)
        let ev100 = Math.log2((N * N) / t);
        // Adjust for current ISO
        return ev100 - Math.log2(S / 100);
    }

    function loop() {
        if (!video.srcObject) return;
        
        pCtx.drawImage(video, 0, 0);
        
        if (isSplit) {
            // Draw -1EV (Left)
            pCtx.save(); pCtx.beginPath(); pCtx.rect(0, 0, pCanvas.width/2, pCanvas.height); pCtx.clip();
            pCtx.drawImage(video, 0, 0);
            pCtx.fillStyle = 'rgba(0,0,0,0.5)'; pCtx.fillRect(0,0,pCanvas.width/2, pCanvas.height);
            pCtx.restore();
            // Draw +1EV (Right)
            pCtx.save(); pCtx.beginPath(); pCtx.rect(pCanvas.width/2, 0, pCanvas.width/2, pCanvas.height); pCtx.clip();
            pCtx.drawImage(video, 0, 0);
            pCtx.globalCompositeOperation = 'screen';
            pCtx.fillStyle = 'rgba(255,255,255,0.2)'; pCtx.fillRect(pCanvas.width/2,0,pCanvas.width/2, pCanvas.height);
            pCtx.restore();
        }

        drawHistogram();
        updateUI();
        requestAnimationFrame(loop);
    }

    function drawHistogram() {
        const w = 120; const h = 90;
        procCanvas.width = w; procCanvas.height = h;
        procCtx.drawImage(video, 0, 0, w, h);
        const data = procCtx.getImageData(0, 0, w, h).data;
        const hist = new Uint32Array(256);
        
        for (let i = 0; i < data.length; i += 4) {
            let lum = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
            hist[Math.floor(lum)]++;
        }

        hCanvas.width = hCanvas.clientWidth * 2; hCanvas.height = hCanvas.clientHeight * 2;
        let max = Math.max(...hist) || 1;
        hCtx.clearRect(0,0,hCanvas.width, hCanvas.height);
        hCtx.fillStyle = '#8E9AAF';
        const barW = hCanvas.width / 256;
        for(let i=0; i<256; i++) {
            let bh = (hist[i]/max) * hCanvas.height * 0.9;
            hCtx.fillRect(i*barW, hCanvas.height - bh, barW - 0.5, bh);
        }
    }

    function updateUI() {
        const ev = calculateEV();
        document.getElementById('ev-display').innerText = ev.toFixed(1);
        document.getElementById('ss-val').innerText = shutterSpeeds[document.getElementById('ss-slider').value];
        document.getElementById('f-val').innerText = apertureSpeeds[document.getElementById('f-slider').value];
        document.getElementById('iso-val').innerText = isoSpeeds[document.getElementById('iso-slider').value];
        
        let percent = ((ev + 3) / 10) * 100; // Simplified scale mapping
        document.getElementById('meter-indicator').style.left = `${Math.max(5, Math.min(95, percent))}%`;
    }

    document.getElementById('btn-capture').onclick = () => {
        const exportCanvas = document.createElement('canvas');
        exportCanvas.width = pCanvas.width; exportCanvas.height = pCanvas.height + 150;
        const ctx = exportCanvas.getContext('2d');
        ctx.drawImage(pCanvas, 0, 0);
        ctx.fillStyle = "#0A111F"; ctx.fillRect(0, pCanvas.height, exportCanvas.width, 150);
        ctx.fillStyle = "#D4C4A1"; ctx.font = "bold 40px Courier";
        const txt = `PREYE v4.1 | EV ${calculateEV().toFixed(1)} | SS ${shutterSpeeds[document.getElementById('ss-slider').value]} | ${apertureSpeeds[document.getElementById('f-slider').value]} | ISO ${isoSpeeds[document.getElementById('iso-slider').value]}`;
        ctx.fillText(txt, 30, pCanvas.height + 90);
        const link = document.createElement('a');
        link.download = `PREYE_${isSplit ? 'SPLIT' : 'REF'}_${Date.now()}.png`;
        link.href = exportCanvas.toDataURL(); link.click();
    };

    document.getElementById('btn-split').onclick = function() {
        isSplit = !isSplit; this.classList.toggle('active');
        document.getElementById('mode-label').innerText = isSplit ? "SPLIT PREVIEW" : "REFLECTED";
    };

    window.onload = startCamera;
</script>
</body>
</html>
