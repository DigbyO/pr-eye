<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR EYE v4.1 (v19.1.0)</title>
    <style>
        :root {
            --bg-dark: #0A111F;
            --panel-bg: #151E2D;
            --gold: #D4C4A1;
            --text-main: #FFFFFF;
            --text-dim: #8E9AAF;
            --accent-red: #E63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: bold; letter-spacing: 2px; font-size: 1.2rem; }
        .meta-info { display: flex; gap: 15px; font-size: 0.8rem; }

        .ev-hero { text-align: center; padding: 5px 0; }
        .ev-value { font-size: 5.5rem; font-weight: 700; line-height: 1; position: relative; display: inline-block; }
        .ev-unit { font-size: 1.2rem; position: absolute; top: 12px; right: -30px; }
        .ev-label { color: var(--text-dim); font-size: 0.65rem; letter-spacing: 1px; margin-top: 2px; }

        /* Media Row with Histogram */
        .media-row { display: grid; grid-template-columns: 2.2fr 1fr; gap: 10px; padding: 10px 15px; height: 160px; }
        .preview-container { background: #000; border-radius: 4px; position: relative; overflow: hidden; border: 1px solid #2A3649; }
        #camera-view { width: 100%; height: 100%; object-fit: cover; }
        .preview-label { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 6px; font-size: 0.55rem; border-radius: 2px; z-index: 2; }
        
        .histogram-container { background: #050A14; border-radius: 4px; border: 1px solid #2A3649; position: relative; }
        #hist-canvas { width: 100%; height: 100%; display: block; }

        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 5px 15px; }
        .ui-btn { background: var(--panel-bg); border: 1px solid #2A3649; color: var(--text-main); padding: 8px; font-size: 0.65rem; font-weight: bold; border-radius: 4px; text-transform: uppercase; }

        .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; border-top: 1px solid #2A3649; border-bottom: 1px solid #2A3649; margin: 8px 0; padding: 12px 0; }
        .grid-item .label { color: var(--gold); font-size: 0.6rem; text-transform: uppercase; margin-bottom: 4px; }
        .grid-item .value { font-size: 1.3rem; font-weight: 500; }

        /* Meter with Detail Levels */
        .meter-container { padding: 5px 20px 15px; position: relative; }
        .scale { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-main); position: relative; padding-bottom: 8px; border-bottom: 1px solid #333; }
        .indicator { position: absolute; bottom: -4px; left: 50%; width: 2px; height: 12px; background: var(--accent-red); transition: left 0.1s ease-out; }

        .controls { padding: 5px 20px; }
        .control-group { display: flex; align-items: center; margin-bottom: 10px; }
        .control-label { width: 40px; font-size: 0.65rem; color: var(--text-dim); font-weight: bold; }
        input[type=range] { flex-grow: 1; appearance: none; background: #2A3649; height: 1px; outline: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--gold); border-radius: 50%; border: 3px solid var(--bg-dark); }

        .capture-area { padding: 10px 15px; }
        .capture-btn { width: 100%; background: var(--gold); color: #000; border: none; padding: 16px; font-weight: 800; font-size: 1rem; border-radius: 6px; text-transform: uppercase; }
        
        nav { display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2A3649; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; }
        nav span.active { color: #FFF; border-bottom: 2px solid #FFF; padding-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div class="brand">PR EYE <span style="font-weight: 300;">v4.1</span></div>
    <div class="meta-info">
        <div>WB <span id="wb-val">2258K</span></div>
        <div>LUX <span id="lux-val">9</span></div>
    </div>
</header>

<div class="ev-hero">
    <div class="ev-value"><span id="ev-display">1.9</span><span class="ev-unit">EV</span></div>
    <div class="ev-label">VOL KEYS: EV BIAS +/-</div>
</div>

<div class="media-row">
    <div class="preview-container">
        <div class="preview-label">REFLECTED</div>
        <video id="camera-view" autoplay playsinline muted></video>
    </div>
    <div class="histogram-container">
        <canvas id="hist-canvas"></canvas>
    </div>
</div>

<div class="btn-row">
    <button class="ui-btn">Split Screen</button>
    <button class="ui-btn">False Col</button>
    <button class="ui-btn">Grid</button>
</div>

<div class="data-grid">
    <div class="grid-item"><div class="label">Shutter</div><div class="value" id="ss-val">1/60</div></div>
    <div class="grid-item"><div class="label">F-Stop</div><div class="value" id="f-val">F5.6</div></div>
    <div class="grid-item"><div class="label">ISO</div><div class="value" id="iso-val">400</div></div>
</div>

<div class="meter-container">
    <div class="scale">
        <span>-3</span><span>..</span><span>-2</span><span>..</span><span>-1</span><span>..</span><span>0</span><span>..</span><span>1</span><span>..</span><span>2</span><span>..</span><span>3</span>
        <div class="indicator" id="meter-indicator"></div>
    </div>
</div>

<div class="controls">
    <div class="control-group"><div class="control-label">SS</div><input type="range" id="ss-slider" min="0" max="7" value="2"></div>
    <div class="control-group"><div class="control-label">F/</div><input type="range" id="f-slider" min="0" max="8" value="4"></div>
    <div class="control-group"><div class="control-label">ISO</div><input type="range" id="iso-slider" min="100" max="6400" step="100" value="400"></div>
</div>

<div class="capture-area">
    <button class="capture-btn">Capture Frame</button>
</div>

<nav>
    <span class="active">Meter</span>
    <span>Color</span>
    <span style="opacity: 0.3;">■</span>
</nav>

<canvas id="proc-canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('camera-view');
    const evDisplay = document.getElementById('ev-display');
    const indicator = document.getElementById('meter-indicator');
    const histCanvas = document.getElementById('hist-canvas');
    const histCtx = histCanvas.getContext('2d');
    const procCanvas = document.getElementById('proc-canvas');
    const procCtx = procCanvas.getContext('2d', { willReadFrequently: true });

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' }, audio: false 
            });
            video.srcObject = stream;
            requestAnimationFrame(drawHistogram);
        } catch (e) {
            console.error("Camera fail", e);
        }
    }

    function drawHistogram() {
        if (video.paused || video.ended) return;

        // 1. Process Frame
        const w = 100; const h = 60;
        procCanvas.width = w; procCanvas.height = h;
        procCtx.drawImage(video, 0, 0, w, h);
        const data = procCtx.getImageData(0, 0, w, h).data;

        // 2. Count Buckets
        const rArr = new Array(256).fill(0);
        const gArr = new Array(256).fill(0);
        const bArr = new Array(256).fill(0);

        for (let i = 0; i < data.length; i += 4) {
            rArr[data[i]]++; gArr[data[i+1]]++; bArr[data[i+2]]++;
        }

        // 3. Draw Curves
        histCanvas.width = histCanvas.clientWidth;
        histCanvas.height = histCanvas.clientHeight;
        histCtx.clearRect(0, 0, histCanvas.width, histCanvas.height);
        histCtx.globalCompositeOperation = 'screen';
        
        drawCurve(rArr, '#ff4d4d');
        drawCurve(gArr, '#4dff4d');
        drawCurve(bArr, '#4d4dff');

        requestAnimationFrame(drawHistogram);
    }

    function drawCurve(arr, color) {
        const max = Math.max(...arr);
        histCtx.beginPath();
        histCtx.strokeStyle = color;
        histCtx.lineWidth = 1.5;
        const step = histCanvas.width / 256;
        for(let i=0; i<256; i++) {
            const x = i * step;
            const y = histCanvas.height - (arr[i] / max * histCanvas.height);
            if(i === 0) histCtx.moveTo(x, y); else histCtx.lineTo(x, y);
        }
        histCtx.stroke();
    }

    function updateUI() {
        const ss = ["1/15", "1/30", "1/60", "1/125", "1/250", "1/500", "1/1000", "1/2000"];
        const f = ["F1.4", "F2.0", "F2.8", "F4.0", "F5.6", "F8.0", "F11", "F16", "F22"];
        
        document.getElementById('ss-val').innerText = ss[document.getElementById('ss-slider').value];
        document.getElementById('f-val').innerText = f[document.getElementById('f-slider').value];
        document.getElementById('iso-val').innerText = document.getElementById('iso-slider').value;

        let ev = (parseInt(document.getElementById('ss-slider').value) + parseInt(document.getElementById('f-slider').value)) / 2;
        evDisplay.innerText = ev.toFixed(1);
        indicator.style.left = `${((ev + 1) / 8) * 100}%`;
    }

    document.querySelectorAll('input').forEach(i => i.addEventListener('input', updateUI));
    window.onload = startCamera;
</script>
</body>
</html>
