<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR Eye v4.1 — Pro Toolkit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <style>
        :root {
            --navy: #09121c; --border: rgba(255, 255, 255, 0.08);
            --gold: #d4c2a1; --muted: #8b9bb4; --text: #f0f4f8;
            --red: #ff4d4d; --green: #4dff4d; --blue: #4d4dff; --magenta: #ff00ff; --cyan: #00ffff;
            --canon-bg: #0d141e; --canon-line: #2a3a4a; --canon-orange: #f39c12;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--navy); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; transition: background-color 0.1s ease; }
        h4 { font-family: 'Cormorant Garamond', serif; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 0; border-bottom: 1px solid var(--border); padding-bottom: 4px;}
        
        .hdr { padding: 12px 15px; background: #000; border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; display:flex; justify-content: space-between; align-items: center;}
        .brand { font-family: 'Cormorant Garamond'; font-size: 18px; color: var(--gold); letter-spacing: 2px; font-weight: 500;}
        .telemetry-bar { display: flex; align-items: center; gap: 15px; }
        .tel-item { font-size: 10px; font-weight: 500; letter-spacing: 1px; color: var(--muted);}

        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        .page { display: none; } .page.active { display: block; }

        /* THE NEW PRO METER UI */
        .pro-meter-display { text-align: center; margin-bottom: 15px; position: relative;}
        .ev-huge { font-size: 84px; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -3px; text-shadow: 0 0 20px rgba(255,255,255,0.1);}
        .ev-huge span { font-size: 30px; color: var(--muted); letter-spacing: 0; vertical-align: top;}
        .ev-bias-badge { position: absolute; top: 10px; right: 10px; background: var(--canon-orange); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold;}

        /* MINIMAL TARGETING VIEWFINDER */
        .viewfinder-wrap { display: flex; gap: 10px; margin-bottom: 15px; height: 160px; }
        .cam-container { position: relative; flex: 1; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #444; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);}
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
        #ui-layer { pointer-events: auto; z-index: 5;} #grid-layer { z-index: 2; } #fc-layer { z-index: 1; opacity: 0.85; display: none;} 
        
        /* SPLIT SCREEN BRACKET */
        #bracket-container { display: none; gap: 5px; height: 160px; margin-bottom: 15px; }
        .bracket-panel { flex: 1; position: relative; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        .bracket-panel canvas { width: 100%; height: 100%; object-fit: cover; }
        .bracket-lbl { position: absolute; bottom: 5px; left: 5px; font-size: 9px; background: rgba(0,0,0,0.7); padding: 2px 4px; border-radius: 2px; font-weight: bold; color: #fff;}

        /* RGB CURVES */
        .rgb-box { width: 100px; height: 100%; background: #050a0f; border-radius: 8px; border: 1px solid #444; position: relative; }
        #histogram-canvas { width: 100%; height: 100%; position: absolute; inset: 0;}

        .action-row { display: flex; gap: 6px; margin-bottom: 6px; }
        .btn { padding: 12px; background: transparent; border: 1px solid rgba(212,194,161,0.3); color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex: 1; transition: all 0.2s ease; font-size: 10px;}
        .btn:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .btn.solid { background: var(--gold); color: #09121c; font-weight: 700; border: none;}
        .btn.active-toggle { background: var(--gold); color: #09121c; }
        .btn.danger { background: var(--red); color: #fff; border: none; font-weight: 800;}
        .btn.sm { font-size: 10px; padding: 10px; }
        
        .ctrl-panel { border-radius: 12px; padding: 15px; margin-bottom: 12px; background: rgba(20, 36, 56, 0.4); border: 1px solid var(--border); }
        .label-txt { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 2px;}
        
        /* CANON HUD */
        .canon-hud { background: var(--canon-bg); border: 1px solid #444; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .canon-row { display: flex; border-bottom: 1px solid var(--canon-line); }
        .canon-row:last-child { border-bottom: none; }
        .canon-cell { flex: 1; padding: 12px 5px; text-align: center; border-right: 1px solid var(--canon-line); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .canon-cell:last-child { border-right: none; }
        .c-val { font-size: 22px; font-weight: 500; color: #fff; letter-spacing: -0.5px;}
        .c-lbl { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 1px;}
        
        .meter-scale-container { padding: 12px; background: #080d12; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid var(--canon-line);}
        .meter-numbers { display: flex; justify-content: space-between; width: 95%; color: #fff; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .meter-bar-wrap { position: relative; width: 95%; height: 10px; border-bottom: 2px solid #666; display: flex; justify-content: space-between;}
        .tick { width: 2px; height: 5px; background: #666; align-self: flex-end; }
        .tick.major { height: 10px; background: #fff; }
        .meter-needle { position: absolute; top: -2px; left: 50%; width: 3px; height: 18px; background: var(--canon-orange); transform: translateX(-50%); transition: left 0.1s linear; z-index: 2;}

        .slider-row { display: flex; align-items: center; margin-bottom: 15px; gap: 12px;}
        .slider-lbl { width: 35px; font-size: 11px; color: var(--muted); text-align: right; font-weight: 500;}
        input[type=range] { -webkit-appearance: none; flex: 1; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: var(--gold); cursor: pointer; margin-top: -9px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.2); border-radius: 2px; }

        .nav { background: rgba(9, 18, 28, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 12px 0; color: var(--muted); font-size: 9px; text-transform: uppercase; cursor: pointer; letter-spacing: 1px;}
        .nav-item.active { color: var(--gold); }

        #result-overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #result-img { max-width: 100%; max-height: 70vh; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 20px;}
        
        canvas#proc-canvas, canvas#fc-internal-canvas, canvas#composite-canvas { display: none; position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body>

    <div class="hdr">
        <div class="brand">PR EYE v4.1</div>
        <div class="telemetry-bar">
            <div class="tel-item" id="tel-wb">WB <span style="color:var(--gold)">5500K</span></div>
            <div class="tel-item">LUX <span id="tel-lux" style="color:var(--cyan)">--</span></div>
        </div>
    </div>

    <div class="main-content">
        
        <div id="page-meter" class="page active">
            
            <div class="pro-meter-display">
                <div class="ev-huge" id="display-ev">0.0<span>EV</span></div>
                <div class="ev-bias-badge" id="display-bias" style="display:none;"></div>
                <p style="color: var(--muted); font-size: 10px; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;">Vol Keys: EV Bias +/-</p>
            </div>

            <div class="viewfinder-wrap" id="main-viewfinder">
                <div class="cam-container">
                    <button id="cam-flip-btn" style="position: absolute; top: 5px; left: 5px; z-index: 10; background: rgba(0,0,0,0.6); border: 1px solid #444; border-radius: 4px; color: #fff; padding: 4px 8px; font-size: 10px; cursor: pointer;">REFLECTED</button>
                    <video id="video" autoplay playsinline></video>
                    <canvas id="fc-layer" class="overlay"></canvas>
                    <canvas id="grid-layer" class="overlay"></canvas>
                    <canvas id="ui-layer" class="overlay"></canvas>
                </div>
                <div class="rgb-box">
                    <canvas id="histogram-canvas"></canvas>
                </div>
            </div>
            
            <div id="bracket-container">
                <div class="bracket-panel"><canvas id="b-minus"></canvas><div class="bracket-lbl">-1 EV</div></div>
                <div class="bracket-panel"><canvas id="b-zero"></canvas><div class="bracket-lbl">0 EV</div></div>
                <div class="bracket-panel"><canvas id="b-plus"></canvas><div class="bracket-lbl" style="color:var(--red);">+1 EV</div></div>
            </div>

            <div class="action-row">
                <button id="bracket-toggle-btn" class="btn">SPLIT SCREEN</button>
                <button id="fc-toggle-btn" class="btn">FALSE COL</button>
                <button id="grid-toggle-btn" class="btn">GRID</button>
            </div>

            <div class="canon-hud">
                <div class="canon-row">
                    <div class="canon-cell"><span class="c-lbl" style="color: var(--canon-orange);">SHUTTER</span><span class="c-val" id="hud-shutter">1/60</span></div>
                    <div class="canon-cell"><span class="c-lbl">F-STOP</span><span class="c-val" id="hud-aperture">F5.6</span></div>
                    <div class="canon-cell"><span class="c-box">ISO</span><span class="c-val" id="hud-iso">400</span></div>
                </div>
                <div class="meter-scale-container">
                    <div class="meter-numbers"><span>-3</span><span>..</span><span>-2</span><span>..</span><span>-1</span><span>..</span><span>0</span><span>..</span><span>1</span><span>..</span><span>2</span><span>..</span><span>+3</span></div>
                    <div class="meter-bar-wrap" id="hud-scale-wrap">
                        <div class="tick major"></div><div class="tick"></div><div class="tick"></div>
                        <div class="tick major"></div><div class="tick"></div><div class="tick"></div>
                        <div class="tick major"></div><div class="tick"></div><div class="tick"></div>
                        <div class="tick major" style="height:12px;"></div><div class="tick"></div><div class="tick"></div>
                        <div class="tick major"></div><div class="tick"></div><div class="tick"></div>
                        <div class="tick major"></div><div class="tick"></div><div class="tick"></div>
                        <div class="tick major"></div>
                        <div class="meter-needle" id="expo-marker"></div>
                    </div>
                </div>
                <div class="canon-row" style="background: #0a0f16;">
                    <div class="canon-cell" id="hud-meter-mode" style="cursor: pointer;"><span class="c-lbl">METER</span><span class="c-val" id="icon-meter-mode" style="font-size:16px; color: var(--canon-orange);">[ ]</span></div>
                    <div class="canon-cell" id="hud-torch" style="cursor: pointer;"><span class="c-lbl">TORCH</span><span class="c-val" id="icon-torch" style="font-size:16px; color:#555;">🔦 OFF</span></div>
                </div>
            </div>

            <div class="slider-row"><span class="slider-lbl">SS</span><input type="range" id="slide-shutter" min="0" max="52" value="33"></div>
            <div class="slider-row"><span class="slider-lbl">F/</span><input type="range" id="slide-aperture" min="0" max="22" value="10"></div>
            <div class="slider-row"><span class="slider-lbl">ISO</span><input type="range" id="slide-iso" min="0" max="23" value="7"></div>

            <button id="capture-btn" class="btn solid" style="width:100%; padding:16px; font-size:18px; margin-top:10px;">CAPTURE FRAME</button>
        </div>

        <div id="page-tools" class="page">
            <div class="ctrl-panel"><h4 style="color:var(--gold);">App Architecture Note</h4><p style="color:var(--muted); font-size:11px;">Phase 1 Focus: Metering Interface Overhaul. Other tabs preserved in background.</p></div>
        </div>

    </div>

    <div id="result-overlay">
        <h3 style="color:#fff; margin-bottom:15px; font-family:'DM Mono', sans-serif;">Export Ready</h3>
        <img id="result-img">
        <div style="display:flex; gap:10px; margin-top:10px; width:100%; max-width:300px;">
            <button class="btn solid" id="btn-share-result" style="flex:1;">SAVE / SHARE</button>
            <button class="btn" id="btn-close-result" style="flex:1; border-color:#fff; color:#fff;">CLOSE</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" data-target="page-meter">Meter</div>
        <div class="nav-item" data-target="page-tools">Tools</div>
    </div>

    <canvas id="proc-canvas" width="150" height="200"></canvas>
    <canvas id="fc-internal-canvas" width="150" height="200"></canvas>
    <canvas id="composite-canvas" width="1000" height="1500"></canvas>

<script>
    const video = document.getElementById('video');
    const canvases = ['fc-layer','grid-layer','ui-layer'].map(id => document.getElementById(id).getContext('2d'));
    const [fcCtx, gridCtx, uiCtx] = canvases;
    const procCtx = document.getElementById('proc-canvas').getContext('2d', { willReadFrequently: true });
    const fcInternalCtx = document.getElementById('fc-internal-canvas').getContext('2d', { willReadFrequently: true });
    const histCtx = document.getElementById('histogram-canvas').getContext('2d', { willReadFrequently: true });
    
    // Bracket Contexts
    const bMinusCtx = document.getElementById('b-minus').getContext('2d');
    const bZeroCtx = document.getElementById('b-zero').getContext('2d');
    const bPlusCtx = document.getElementById('b-plus').getContext('2d');

    let stream = null; let currentFacingMode = 'environment';
    let measuredEV = 0; let evBias = 0; let liveTempK = 5500; 
    let currentTab = 'page-meter';
    let fcState = 0; let bracketActive = false;
    let currentGridIdx = 0; const gridOptions = ['off', 'thirds', 'cross'];
    let isCapturing = false;

    // CANON EXPOSURE ARRAYS
    const arrShutter = ['30"','25"','20"','15"','13"','10"','8"','6"','5"','4"','3.2"','2.5"','2"','1.6"','1.3"','1"','0.8"','0.6"','0.5"','0.4"','0.3"','1/4','1/5','1/6','1/8','1/10','1/13','1/15','1/20','1/25','1/30','1/40','1/50','1/60','1/80','1/100','1/125','1/160','1/200','1/250','1/320','1/400','1/500','1/640','1/800','1/1000','1/1250','1/1600','1/2000','1/2500','1/3200','1/4000'];
    const arrAperture = [1.2, 1.4, 1.8, 2.0, 2.8, 3.2, 3.5, 4.0, 4.5, 5.0, 5.6, 6.3, 7.1, 8.0, 9.0, 10, 11, 13, 14, 16, 18, 20, 22];
    const arrIso = [50, 100, 125, 160, 200, 250, 320, 400, 500, 640, 800, 1000, 1250, 1600, 2000, 2500, 3200, 4000, 5000, 6400, 8000, 10000, 12800, 25600];
    
    let currentMeterMode = 0; let torchActive = false;

    function parseShutter(s) { if(s.includes('"')) return parseFloat(s.replace('"','')); if(s.includes('/')) { let pts = s.split('/'); return parseInt(pts[0]) / parseInt(pts[1]); } return parseFloat(s); }
    function bindSafe(id, event, callback) { const el = document.getElementById(id); if (el) el.addEventListener(event, callback); }

    function updateHudData() {
        document.getElementById('hud-shutter').innerText = arrShutter[document.getElementById('slide-shutter').value];
        document.getElementById('hud-aperture').innerText = 'F' + arrAperture[document.getElementById('slide-aperture').value];
        document.getElementById('hud-iso').innerText = arrIso[document.getElementById('slide-iso').value];
    }
    ['slide-shutter', 'slide-aperture', 'slide-iso'].forEach(id => bindSafe(id, 'input', updateHudData));

    bindSafe('hud-meter-mode', 'click', () => { currentMeterMode = (currentMeterMode + 1) % 3; const icon = document.getElementById('icon-meter-mode'); if(currentMeterMode === 0) icon.innerText = "[ ]"; else if(currentMeterMode === 1) icon.innerText = "( )"; else icon.innerText = "[•]"; });
    bindSafe('hud-torch', 'click', async () => { if (!stream) return; const track = stream.getVideoTracks()[0]; try { torchActive = !torchActive; await track.applyConstraints({ advanced: [{ torch: torchActive }] }); const icon = document.getElementById('icon-torch'); icon.innerText = torchActive ? "🔦 ON" : "🔦 OFF"; icon.style.color = torchActive ? "var(--canon-orange)" : "#555"; } catch (err) { alert('Torch API not supported on this browser/lens.'); torchActive = false; } });

    // VOLUME KEY HIJACK FOR EV BIAS
    window.addEventListener('keydown', function(e) { 
        if (currentTab === 'page-meter') {
            if (e.key === 'VolumeUp' || e.key === 'AudioVolumeUp') { e.preventDefault(); evBias += 0.33; updateBiasDisplay(); }
            if (e.key === 'VolumeDown' || e.key === 'AudioVolumeDown') { e.preventDefault(); evBias -= 0.33; updateBiasDisplay(); }
        }
    });

    function updateBiasDisplay() {
        const badge = document.getElementById('display-bias');
        if(Math.abs(evBias) < 0.1) { badge.style.display = 'none'; evBias = 0; }
        else { badge.style.display = 'block'; badge.innerText = (evBias > 0 ? '+' : '') + evBias.toFixed(1) + ' EV'; }
    }

    async function startCamera() {
        if(stream) { stream.getTracks().forEach(t => t.stop()); video.srcObject = null; await new Promise(r => setTimeout(r, 200)); }
        try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: currentFacingMode } } }); } catch(e) { console.error("Cam fail"); }
        video.srcObject = stream; video.play();
        video.onloadedmetadata = () => { resizeCanvases(); requestAnimationFrame(liveLoop); }; 
    }
    
    // SIMULATED INCIDENT DOME
    bindSafe('cam-flip-btn', 'click', (e)=>{ 
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment'; 
        torchActive = false; document.getElementById('icon-torch').style.color='#555'; document.getElementById('icon-torch').innerText='🔦 OFF';
        if(currentFacingMode === 'user') {
            video.style.filter = 'blur(15px) grayscale(20%)';
            e.currentTarget.innerText = "INCIDENT SIM";
            e.currentTarget.style.background = "var(--magenta)";
        } else {
            video.style.filter = 'none';
            e.currentTarget.innerText = "REFLECTED";
            e.currentTarget.style.background = "rgba(0,0,0,0.6)";
        }
        startCamera(); 
    });

    function resizeCanvases() {
        const rect = video.getBoundingClientRect(); if(rect.width===0) return;
        ['grid-layer', 'ui-layer', 'fc-layer'].forEach(id => { const c = document.getElementById(id); if(c) {c.width = rect.width; c.height = rect.height;} });
        const fcInt = document.getElementById('fc-internal-canvas'); if(fcInt) {fcInt.width = rect.width; fcInt.height = rect.height;}
        
        const hC = document.getElementById('histogram-canvas'); if(hC) { const hRect = hC.getBoundingClientRect(); hC.width = hRect.width; hC.height = hRect.height; }
        
        const bRect = document.getElementById('b-zero').getBoundingClientRect();
        if(bRect.width > 0) {
            ['b-minus', 'b-zero', 'b-plus'].forEach(id => { const c = document.getElementById(id); c.width = bRect.width; c.height = bRect.height; });
        }
        drawGrid();
    }
    window.addEventListener('resize', resizeCanvases);

    document.querySelectorAll('.nav-item').forEach(n => {
        n.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active')); document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            n.classList.add('active'); currentTab = n.dataset.target; 
            const tgt = document.getElementById(currentTab); if(tgt) tgt.classList.add('active');
            resizeCanvases();
        });
    });

    bindSafe('grid-toggle-btn', 'click', (e) => { currentGridIdx = (currentGridIdx + 1) % gridOptions.length; e.currentTarget.classList.toggle('active-toggle', currentGridIdx !== 0); drawGrid(); });
    function drawGrid() { const type = gridOptions[currentGridIdx]; const w = gridCtx.canvas.width; const h = gridCtx.canvas.height; gridCtx.clearRect(0,0,w,h); if(type === 'off') return; gridCtx.strokeStyle = `rgba(212, 194, 161, 0.5)`; gridCtx.lineWidth = 1; gridCtx.beginPath(); if(type === 'thirds') { gridCtx.moveTo(w/3, 0); gridCtx.lineTo(w/3, h); gridCtx.moveTo(w*2/3, 0); gridCtx.lineTo(w*2/3, h); gridCtx.moveTo(0, h/3); gridCtx.lineTo(w, h/3); gridCtx.moveTo(0, h*2/3); gridCtx.lineTo(w, h*2/3); } else if (type === 'cross') { gridCtx.moveTo(w/2, 0); gridCtx.lineTo(w/2, h); gridCtx.moveTo(0, h/2); gridCtx.lineTo(w, h/2); } gridCtx.stroke(); }
    
    bindSafe('fc-toggle-btn', 'click', (e) => { fcState = (fcState + 1) % 3; const btn = e.currentTarget; if(fcState === 0) { btn.innerText = "FALSE COL"; btn.classList.remove('active-toggle'); document.getElementById('fc-layer').style.display='none'; } if(fcState === 1) { btn.innerText = "F-COL: PRO"; btn.classList.add('active-toggle'); document.getElementById('fc-layer').style.display='block'; } if(fcState === 2) { btn.innerText = "F-COL: CLIP"; btn.classList.add('active-toggle'); document.getElementById('fc-layer').style.display='block'; } });
    
    bindSafe('bracket-toggle-btn', 'click', (e) => { 
        bracketActive = !bracketActive; 
        document.getElementById('bracket-container').style.display = bracketActive ? 'flex' : 'none'; 
        document.getElementById('main-viewfinder').style.display = bracketActive ? 'none' : 'flex'; 
        e.currentTarget.classList.toggle('active-toggle', bracketActive); 
        resizeCanvases(); 
    });

    function updateExpoBar() {
        if(measuredEV === null || measuredEV === undefined) return;
        let useEV = measuredEV + evBias;
        
        const N = arrAperture[document.getElementById('slide-aperture').value]; const ISO = arrIso[document.getElementById('slide-iso').value]; const sStr = arrShutter[document.getElementById('slide-shutter').value]; const t = parseShutter(sStr);
        let diff = useEV - (Math.log2((N*N)/t) - Math.log2(ISO/100));
        
        let percent = Math.max(0, Math.min(100, 50 + (diff * (50/3))));
        const marker = document.getElementById('expo-marker'); if(marker) { marker.style.left = `${percent}%`; marker.style.background = (percent < 10 || percent > 90) ? 'var(--red)' : 'var(--canon-orange)'; }
    }

    // --- LIVE FEED ENGINE ---
    function liveLoop() {
        if(video.readyState === 4 && video.videoWidth > 0) {
            const vRatio = video.videoWidth / video.videoHeight; const tRatio = 3/4; let sx, sy, sw, sh;
            if (vRatio > tRatio) { sh = video.videoHeight; sw = video.videoHeight * tRatio; sx = (video.videoWidth - sw)/2; sy = 0; } else { sw = video.videoWidth; sh = video.videoWidth / tRatio; sx = 0; sy = (video.videoHeight - sh)/2; }
            
            // BRACKET SIMULATION
            if(bracketActive) {
                bMinusCtx.filter = 'brightness(50%) contrast(110%)'; bMinusCtx.drawImage(video, sx, sy, sw, sh, 0, 0, bMinusCtx.canvas.width, bMinusCtx.canvas.height);
                bZeroCtx.filter = 'none'; bZeroCtx.drawImage(video, sx, sy, sw, sh, 0, 0, bZeroCtx.canvas.width, bZeroCtx.canvas.height);
                bPlusCtx.filter = 'brightness(180%) contrast(90%)'; bPlusCtx.drawImage(video, sx, sy, sw, sh, 0, 0, bPlusCtx.canvas.width, bPlusCtx.canvas.height);
            }

            procCtx.drawImage(video, sx, sy, sw, sh, 0, 0, 150, 200); const viewData = procCtx.getImageData(0,0,150,200).data;
            
            let rT=0, gT=0, bT=0, lumT=0, c=0; 
            for(let y=0; y<200; y++) {
                for(let x=0; x<150; x++) {
                    let i = (y * 150 + x) * 4; let luma = 0.299*viewData[i] + 0.587*viewData[i+1] + 0.114*viewData[i+2]; let weight = 1;
                    if(currentMeterMode === 1) { let dist = Math.sqrt(Math.pow(x-75, 2) + Math.pow(y-100, 2)); weight = dist < 50 ? 1 : (dist < 80 ? 0.5 : 0.1); } else if(currentMeterMode === 2) { let dist = Math.sqrt(Math.pow(x-75, 2) + Math.pow(y-100, 2)); weight = dist < 15 ? 1 : 0; }
                    if(weight > 0) { rT += viewData[i] * weight; gT += viewData[i+1] * weight; bT += viewData[i+2] * weight; lumT += luma * weight; c += weight; }
                }
            }
            
            measuredEV = Math.log2((Math.max(1, lumT / c) / 255) * 100 / 12.5); 
            
            // HUGE EV DISPLAY
            let finalEV = measuredEV + evBias;
            const evDisplay = document.getElementById('display-ev');
            if(evDisplay) {
                let evStr = finalEV.toFixed(1);
                evDisplay.innerHTML = `${evStr}<span>EV</span>`;
            }
            
            // LUX ESTIMATION (Rough approximation from EV)
            const luxEst = Math.round(2.5 * Math.pow(2, finalEV));
            const luxEl = document.getElementById('tel-lux');
            if(luxEl) luxEl.innerText = luxEst;

            updateExpoBar();
            
            const k = Math.round(5500 * ((bT/c)/(rT/c))); if(!isNaN(k) && k > 0) { liveTempK = Math.round(k); const wSpan = document.getElementById('tel-wb'); if(wSpan) wSpan.innerHTML = `WB <span style="color:var(--gold)">${liveTempK}K</span>`; }
            
            // RGB WAVEFORM
            if(!bracketActive) {
                const hw = histCtx.canvas.width; const hh = histCtx.canvas.height; histCtx.clearRect(0,0,hw,hh); 
                const binsR = new Array(40).fill(0); const binsG = new Array(40).fill(0); const binsB = new Array(40).fill(0); let maxBin = 0;
                for(let i=0; i<viewData.length; i+=4) { 
                    let bR = Math.floor((viewData[i]/255)*39); binsR[bR]++; if(binsR[bR] > maxBin) maxBin = binsR[bR];
                    let bG = Math.floor((viewData[i+1]/255)*39); binsG[bG]++; if(binsG[bG] > maxBin) maxBin = binsG[bG];
                    let bB = Math.floor((viewData[i+2]/255)*39); binsB[bB]++; if(binsB[bB] > maxBin) maxBin = binsB[bB];
                }
                const step = hw / 40;
                histCtx.globalCompositeOperation = "screen";
                // Red
                histCtx.strokeStyle = 'rgba(255,50,50,0.8)'; histCtx.lineWidth = 2; histCtx.beginPath(); histCtx.moveTo(0, hh); for(let i=0; i<40; i++) { histCtx.lineTo(i*step, hh - (maxBin > 0 ? (binsR[i] / maxBin) * (hh * 0.9) : 0)); } histCtx.stroke();
                // Green
                histCtx.strokeStyle = 'rgba(50,255,50,0.8)'; histCtx.lineWidth = 2; histCtx.beginPath(); histCtx.moveTo(0, hh); for(let i=0; i<40; i++) { histCtx.lineTo(i*step, hh - (maxBin > 0 ? (binsG[i] / maxBin) * (hh * 0.9) : 0)); } histCtx.stroke();
                // Blue
                histCtx.strokeStyle = 'rgba(50,100,255,0.8)'; histCtx.lineWidth = 2; histCtx.beginPath(); histCtx.moveTo(0, hh); for(let i=0; i<40; i++) { histCtx.lineTo(i*step, hh - (maxBin > 0 ? (binsB[i] / maxBin) * (hh * 0.9) : 0)); } histCtx.stroke();
                histCtx.globalCompositeOperation = "source-over";
            }
            
            const cw = uiCtx.canvas.width; const ch = uiCtx.canvas.height; uiCtx.clearRect(0,0,cw,ch); 
            
            if(currentTab === 'page-meter' && !bracketActive) { uiCtx.strokeStyle = 'rgba(255,255,255,0.4)'; uiCtx.lineWidth = 1; if(currentMeterMode === 1) { uiCtx.beginPath(); uiCtx.arc(cw/2, ch/2, cw*0.25, 0, Math.PI*2); uiCtx.stroke(); } else if(currentMeterMode === 2) { uiCtx.beginPath(); uiCtx.arc(cw/2, ch/2, 10, 0, Math.PI*2); uiCtx.stroke(); } }

            if(fcState > 0 && !bracketActive) {
                fcInternalCtx.drawImage(video, sx, sy, sw, sh, 0, 0, fcCtx.canvas.width, fcCtx.canvas.height); const px = fcInternalCtx.getImageData(0, 0, fcCtx.canvas.width, fcCtx.canvas.height).data;
                for(let i=0; i<px.length; i+=4) {
                    let ire = ((0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2]) / 255) * 100;
                    if (fcState === 1) { 
                        if (ire >= 95) { px[i]=255; px[i+1]=50; px[i+2]=50; px[i+3]=200; } else if (ire >= 85) { px[i]=255; px[i+1]=200; px[i+2]=0; px[i+3]=200; } else if (ire >= 68 && ire <= 72) { px[i]=255; px[i+1]=105; px[i+2]=180; px[i+3]=200; } else if (ire >= 48 && ire <= 52) { px[i]=0; px[i+1]=255; px[i+2]=0; px[i+3]=200; } else if (ire >= 5 && ire <= 10) { px[i]=128; px[i+1]=0; px[i+2]=128; px[i+3]=200; } else if (ire < 5) { px[i]=50; px[i+1]=50; px[i+2]=255; px[i+3]=200; } else { px[i]=0; px[i+1]=0; px[i+2]=0; px[i+3]=0; }
                    } else if (fcState === 2) { 
                        if (ire >= 95) { px[i]=255; px[i+1]=0; px[i+2]=0; px[i+3]=200; } else if (ire < 5) { px[i]=0; px[i+1]=0; px[i+2]=255; px[i+3]=200; } else { px[i+3]=0; } 
                    }
                }
                fcCtx.clearRect(0,0,fcCtx.canvas.width,fcCtx.canvas.height); const tmp = new ImageData(px, fcCtx.canvas.width, fcCtx.canvas.height); fcInternalCtx.putImageData(tmp, 0, 0); fcCtx.drawImage(document.getElementById('fc-internal-canvas'), 0, 0);
            }
        }
        
        requestAnimationFrame(liveLoop);
    }

    // --- CAPTURE ENGINE ---
    bindSafe('capture-btn', 'click', async () => {
        if(isCapturing) return; isCapturing = true;
        try {
            const hrCan = document.getElementById('composite-canvas'); hrCan.width = 1000; hrCan.height = 1500;
            const cCtx = hrCan.getContext('2d');
            cCtx.fillStyle = '#f8f8f8'; cCtx.fillRect(0,0,1000,1500); 
            
            if(video.videoWidth > 0 && video.videoHeight > 0) {
                const vRatio = video.videoWidth / video.videoHeight; const tRatio = 3/4; let sx, sy, sw, sh;
                if (vRatio > tRatio) { sh = video.videoHeight; sw = video.videoHeight * tRatio; sx = (video.videoWidth - sw)/2; sy = 0; } else { sw = video.videoWidth; sh = video.videoWidth / tRatio; sx = 0; sy = (video.videoHeight - sh)/2; }
                cCtx.drawImage(video, sx, sy, sw, sh, 50, 50, 900, 1200);
            }
            
            cCtx.fillStyle = '#1a1a1a'; cCtx.font = '40px "Permanent Marker", cursive, sans-serif';
            let finalEV = measuredEV + evBias;
            const sStr = arrShutter[document.getElementById('slide-shutter').value]; const fVal = arrAperture[document.getElementById('slide-aperture').value]; const iVal = arrIso[document.getElementById('slide-iso').value];
            cCtx.fillText(`EV: ${finalEV.toFixed(1)} | ISO ${iVal} | f/${fVal} | ${sStr}s`, 70, 1330);
            cCtx.font = '30px "Permanent Marker", cursive, sans-serif'; cCtx.fillStyle = '#444'; cCtx.fillText(`WB: ${liveTempK}K | ${new Date().toLocaleDateString()}`, 70, 1390);
            
            hrCan.toBlob(blob => {
                if(!blob) { alert("Export failed."); isCapturing = false; return; }
                const url = URL.createObjectURL(blob);
                const resImg = document.getElementById('result-img'); if(resImg) resImg.src = url;
                const resOvl = document.getElementById('result-overlay'); if(resOvl) resOvl.style.display = 'flex';
                
                bindSafe('btn-share-result', 'click', async () => {
                    const file = new File([blob], `PREye_Capture_${Date.now()}.jpg`, { type: 'image/jpeg' });
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        try { await navigator.share({ files: [file], title: 'PR Eye Capture' }); } catch(err) { console.log(err); }
                    } else { const a = document.createElement('a'); a.href = url; a.download = file.name; a.click(); }
                });
                bindSafe('btn-close-result', 'click', () => { const resOvl = document.getElementById('result-overlay'); if(resOvl) resOvl.style.display = 'none'; URL.revokeObjectURL(url); });
                isCapturing = false;
            }, 'image/jpeg', 0.95);
        } catch (e) { alert("Capture system error."); console.error(e); isCapturing = false; }
    });

    // --- STARTUP ---
    startCamera(); updateHudData();
</script>
