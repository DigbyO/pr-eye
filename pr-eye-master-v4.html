<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR EYE v6.0 PLATINUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Mono:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
    <style>
        :root { --gold: #d4c2a1; --bg: #050a10; --red: #ff3b30; --muted: #8b9bb4; --canon-blue: #0d141e; --magenta: #ff2d55; --cyan: #5ac8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER & PERSISTENT TELEMETRY */
        .hdr { padding: 10px 15px; background: #000; border-bottom: 1px solid #222; z-index: 10; flex-shrink: 0; }
        .hdr-top { display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Cormorant Garamond'; font-size: 18px; color: var(--gold); letter-spacing: 2px; }
        .tel-bar { display: flex; gap: 12px; font-size: 10px; color: var(--muted); margin-top: 5px; }
        .val { color: var(--gold); }

        /* CAMERA VIEWFINDER */
        #cam-section { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; flex-shrink: 0; border-bottom: 1px solid #333; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas.overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        /* TAB NAVIGATION */
        .nav { background: #000; border-top: 1px solid #222; display: flex; position: fixed; bottom: 0; width: 100%; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; color: #555; font-size: 9px; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--gold); border-top: 2px solid var(--gold); }

        /* CONTENT PANELS */
        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        .page { display: none; } .page.active { display: block; }
        .panel { border-radius: 12px; padding: 15px; margin-bottom: 12px; background: rgba(20, 36, 56, 0.4); border: 1px solid rgba(255,255,255,0.1); }
        
        /* CANON HUD */
        .canon-hud { background: var(--canon-blue); border: 2px solid #555; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .hud-row { display: flex; border-bottom: 1px solid #2a3a4a; }
        .hud-cell { flex: 1; padding: 10px; border-right: 1px solid #2a3a4a; text-align: center; }
        .hud-label { font-size: 8px; color: #888; text-transform: uppercase; display: block; }
        .hud-val { font-size: 16px; font-weight: bold; color: #fff; }

        /* INPUTS & BUTTONS */
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #444; color: var(--gold); border-radius: 8px; text-transform: uppercase; font-size: 10px; margin-bottom: 8px; cursor: pointer; }
        .btn.solid { background: var(--gold); color: #000; font-weight: bold; border: none; }
        .btn.danger { background: var(--red); color: #fff; border: none; }
        input[type="range"] { width: 100%; height: 35px; accent-color: var(--gold); }
        input[type="text"], textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 10px; font-family: inherit; }

        /* POLAROID EXPORT */
        #export-ovl { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .pol-frame { background: #fff; padding: 10px 10px 70px 10px; box-shadow: 0 10px 50px #000; width: 100%; max-width: 340px; }
        #pol-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid #eee; }
        #pol-meta { color: #111; font-family: 'Permanent Marker', cursive; padding-top: 15px; font-size: 13px; line-height: 1.3; }

        /* RADAR & LEVEL */
        #radar-canvas { background: #000; width: 100%; height: 160px; border-radius: 8px; border: 1px solid #333; margin-top: 10px; }
        #flash-ovl { display: none; position: fixed; inset: 0; z-index: 999; pointer-events: none; }
        .police-strobe { animation: p-strobe 0.1s infinite; }
        @keyframes p-strobe { 0% { background: #f00; } 50% { background: #00f; } }
    </style>
</head>
<body>

    <div class="hdr">
        <div class="hdr-top">
            <div class="brand">PR EYE v6.0</div>
            <div id="tel-ev" style="font-size:14px; font-weight:bold; color:var(--gold);">EV 0.0</div>
        </div>
        <div class="tel-bar">
            <span>GPS: <span class="val" id="tel-gps">--</span></span>
            <span>WB: <span class="val" id="tel-wb">5500K</span></span>
            <span>TILT: <span class="val" id="tel-tilt">0°</span></span>
        </div>
    </div>

    <div id="cam-section">
        <video id="video" autoplay playsinline></video>
        <canvas id="lvl-canvas" class="overlay"></canvas>
        <canvas id="grid-layer" class="overlay"></canvas>
        <div id="flash-ovl"></div>
    </div>

    <div class="main-content">
        <div id="page-meter" class="page active">
            <div class="canon-hud">
                <div class="hud-row">
                    <div class="hud-cell"><span class="hud-label">Shutter</span><span class="hud-val" id="h-ss">1/50</span></div>
                    <div class="hud-cell"><span class="hud-label">Aperture</span><span class="hud-val" id="h-f">F4.0</span></div>
                    <div class="hud-cell"><span class="hud-label">ISO</span><span class="hud-val" id="h-iso">400</span></div>
                </div>
            </div>
            <input type="range" id="sl-ss" min="0" max="51" value="32">
            <input type="range" id="sl-f" min="0" max="22" value="10">
            <input type="range" id="sl-iso" min="0" max="23" value="7">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <button class="btn" onclick="flipCam()">FLIP CAM</button>
                <button class="btn" onclick="toggleLvl()">LEVEL</button>
            </div>
            <button class="btn solid" style="margin-top:10px; padding:18px;" onclick="doCapture('pol')">CAPTURE POLAROID</button>
        </div>

        <div id="page-color" class="page">
            <div class="panel">
                <h4 style="color:var(--gold); font-size:10px;">LIVE PALETTE</h4>
                <div style="display:flex; height:50px; border-radius:6px; overflow:hidden; margin:10px 0;">
                    <div id="sw60" style="flex:6; background:#333;"></div>
                    <div id="sw30" style="flex:3; background:#666;"></div>
                    <div id="sw10" style="flex:1; background:#999;"></div>
                </div>
                <div id="mj-p" style="font-size:11px; color:var(--muted); font-style:italic; margin-bottom:10px;">/imagine prompt: seamless pattern...</div>
                <button class="btn solid" onclick="doCapture('swatch')">EXPORT SWATCHES ONLY</button>
            </div>
        </div>

        <div id="page-scout" class="page">
            <div class="panel">
                <h4>Ephemeris Scout</h4>
                <canvas id="radar-canvas" width="800" height="280"></canvas>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div><span class="hud-label">Sunrise</span><span id="sun-r">--:--</span></div>
                    <div style="text-align:right;"><span class="hud-label">Sunset</span><span id="sun-s">--:--</span></div>
                </div>
            </div>
            <button class="btn solid" onclick="getGPS()">REFRESH INTEL</button>
        </div>

        <div id="page-tools" class="page">
            <div class="panel" style="border-color:var(--red);">
                <h4 style="color:var(--red)">Field Rave & Siren</h4>
                <button class="btn" id="rave-btn" onclick="toggleRave()">START RAVE</button>
                <button class="btn danger" id="siren-btn" onclick="toggleSiren()">EMERGENCY SIREN</button>
            </div>
            <div class="panel">
                <h4>Notes</h4>
                <textarea id="notes" rows="3" placeholder="Shoot notes..."></textarea>
                <button class="btn" onclick="window.location.href='mailto:?body='+document.getElementById('notes').value">Email Notes</button>
            </div>
        </div>

        <div id="page-legal" class="page">
            <div class="panel">
                <h4>Model Release</h4>
                <input type="text" id="m-name" placeholder="Model Name">
                <canvas id="sig-pad" style="background:#fff; width:100%; height:100px; border:1px solid #000;"></canvas>
                <button class="btn solid" style="margin-top:10px;" onclick="genPDF()">GENERATE SIGNED PDF</button>
            </div>
        </div>
    </div>

    <div id="export-ovl">
        <div class="pol-frame">
            <img id="pol-img">
            <div id="pol-meta"></div>
        </div>
        <button class="btn solid" style="margin-top:20px; width:340px;" id="share-btn">SHARE / SAVE</button>
        <button class="btn" style="width:340px;" onclick="document.getElementById('export-ovl').style.display='none'">CLOSE</button>
    </div>

    <div class="nav">
        <div class="nav-item active" data-t="page-meter">Meter</div>
        <div class="nav-item" data-t="page-color">Color</div>
        <div class="nav-item" data-t="page-scout">Scout</div>
        <div class="nav-item" data-t="page-tools">Tools</div>
        <div class="nav-item" data-t="page-legal">Legal</div>
    </div>

    <script>
        let stream, currentFacing = 'environment', lvlOn = false, raveOn = false, sirenOn = false;
        let lat = 0, lon = 0, ev = 0, lastHex = ["#333","#666","#999"];
        let audioCtx, osc, sirenInt, radarAngle = 0;

        const video = document.getElementById('video');
        const lcan = document.getElementById('lvl-canvas');
        const lctx = lcan.getContext('2d');
        const rcan = document.getElementById('radar-canvas');
        const rctx = rcan.getContext('2d');

        const arrSS = ['30"','25"','20"','15"','13"','10"','8"','6"','5"','4"','3.2"','2.5"','2"','1.6"','1.3"','1"','0.8"','0.6"','0.5"','0.4"','0.3"','1/4','1/5','1/6','1/8','1/10','1/13','1/15','1/20','1/25','1/30','1/40','1/50','1/60','1/80','1/100','1/125','1/160','1/200','1/250','1/320','1/400','1/500','1/640','1/800','1/1000','1/1250','1/1600','1/2000','1/2500','1/3200','1/4000'];
        const arrF = [1.2, 1.4, 1.8, 2.0, 2.8, 3.2, 3.5, 4.0, 4.5, 5.0, 5.6, 6.3, 7.1, 8.0, 9.0, 10, 11, 13, 14, 16, 18, 20, 22];
        const arrIso = [50, 100, 125, 160, 200, 250, 320, 400, 500, 640, 800, 1000, 1250, 1600, 2000, 2500, 3200, 4000, 5000, 6400, 8000, 10000, 12800, 25600];

        async function init() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacing } });
            video.srcObject = stream;
            resize(); loop();
        }

        function resize() { lcan.width = video.clientWidth; lcan.height = video.clientHeight; }
        function flipCam() { currentFacing = currentFacing === 'user' ? 'environment' : 'user'; init(); }
        function toggleLvl() { lvlOn = !lvlOn; if(!lvlOn) lctx.clearRect(0,0,2000,2000); }

        function loop() {
            if(video.readyState === 4) {
                // EV Logic
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                ctx.drawImage(video, 0, 0, 1, 1);
                const p = ctx.getImageData(0,0,1,1).data;
                ev = Math.log2(((p[0]+p[1]+p[2])/3)/255 * 100/12.5).toFixed(1);
                document.getElementById('tel-ev').innerText = `EV ${ev}`;
                
                // Color Logic
                const cc = document.createElement('canvas'); const cctx = cc.getContext('2d');
                cctx.drawImage(video, 0, 0, 5, 5);
                const pp = cctx.getImageData(0,0,5,5).data;
                const h1 = "#" + ((1<<24)+(pp[0]<<16)+(pp[1]<<8)+pp[2]).toString(16).slice(1);
                const h2 = "#" + ((1<<24)+(pp[20]<<16)+(pp[21]<<8)+pp[22]).toString(16).slice(1);
                const h3 = "#" + ((1<<24)+(pp[40]<<16)+(pp[41]<<8)+pp[42]).toString(16).slice(1);
                lastHex = [h1, h2, h3];
                document.getElementById('sw60').style.background = h1;
                document.getElementById('sw30').style.background = h2;
                document.getElementById('sw10').style.background = h3;
                document.getElementById('mj-p').innerText = `/imagine prompt: seamless pattern, colors ${h1}, ${h2}, ${h3} --tile`;

                if(lvlOn) drawLvl();
                drawRadar();
            }
            requestAnimationFrame(loop);
        }

        function drawLvl() {
            lctx.clearRect(0,0,lcan.width, lcan.height);
            lctx.strokeStyle = '#4cd964'; lctx.lineWidth = 2;
            lctx.beginPath(); lctx.moveTo(lcan.width*0.3, lcan.height/2); lctx.lineTo(lcan.width*0.7, lcan.height/2); lctx.stroke();
        }

        function drawRadar() {
            rctx.fillStyle = '#051105'; rctx.fillRect(0,0,800,280);
            rctx.strokeStyle = 'rgba(0,255,0,0.3)'; rctx.beginPath(); rctx.arc(400,140,110,0,Math.PI*2); rctx.stroke();
            radarAngle += 0.05;
            rctx.save(); rctx.translate(400,140); rctx.rotate(radarAngle);
            rctx.fillStyle='rgba(0,255,0,0.1)'; rctx.beginPath(); rctx.moveTo(0,0); rctx.arc(0,0,110,0,0.4); rctx.fill();
            rctx.restore();
        }

        async function doCapture(m) {
            const can = document.createElement('canvas'); can.width=1000; can.height=1000;
            const ctx = can.getContext('2d');
            if(m === 'pol') {
                const s = Math.min(video.videoWidth, video.videoHeight);
                ctx.drawImage(video, (video.videoWidth-s)/2, (video.videoHeight-s)/2, s, s, 0, 0, 1000, 1000);
            } else {
                ctx.fillStyle = lastHex[0]; ctx.fillRect(0,0,1000,600);
                ctx.fillStyle = lastHex[1]; ctx.fillRect(0,600,1000,300);
                ctx.fillStyle = lastHex[2]; ctx.fillRect(0,900,1000,100);
            }
            const data = can.toDataURL('image/jpeg', 0.9);
            document.getElementById('pol-img').src = data;
            document.getElementById('pol-meta').innerText = `GPS: ${lat.toFixed(4)}, ${lon.toFixed(4)} | EV: ${ev}\nPALETTE: ${lastHex.join(', ')}`;
            document.getElementById('export-ovl').style.display = 'flex';
            document.getElementById('share-btn').onclick = async () => {
                const b = await (await fetch(data)).blob();
                const f = new File([b], `PREYE_${Date.now()}.jpg`, {type:'image/jpeg'});
                if(navigator.share) await navigator.share({files:[f]});
            };
        }

        function toggleRave() { raveOn = !raveOn; document.getElementById('flash-ovl').style.display = raveOn?'block':'none'; document.getElementById('flash-ovl').className = 'police-strobe'; }
        
        function toggleSiren() {
            if(sirenOn) { if(osc) osc.stop(); clearInterval(sirenInt); sirenOn = false; }
            else {
                audioCtx = new AudioContext(); osc = audioCtx.createOscillator(); osc.type = 'square'; osc.connect(audioCtx.destination); osc.start();
                sirenOn = true; sirenInt = setInterval(() => { osc.frequency.setValueAtTime(toggle?435:580, audioCtx.currentTime); toggle=!toggle; }, 400);
                let toggle = true;
            }
        }

        document.querySelectorAll('.nav-item').forEach(i => {
            i.onclick = () => {
                document.querySelectorAll('.nav-item, .page').forEach(x => x.classList.remove('active'));
                i.classList.add('active'); document.getElementById(i.dataset.t).classList.add('active');
            }
        });

        const updateHUD = () => {
            document.getElementById('h-ss').innerText = arrSS[document.getElementById('sl-ss').value];
            document.getElementById('h-f').innerText = 'F' + arrF[document.getElementById('sl-f').value];
            document.getElementById('h-iso').innerText = arrIso[document.getElementById('sl-iso').value];
        }
        ['sl-ss','sl-f','sl-iso'].forEach(id => document.getElementById(id).oninput = updateHUD);

        function getGPS() { navigator.geolocation.getCurrentPosition(p => { lat = p.coords.latitude; lon = p.coords.longitude; document.getElementById('tel-gps').innerText = `${lat.toFixed(2)},${lon.toFixed(2)}`; }); }
        
        init(); getGPS(); updateHUD();
    </script>
</body>
</html>
