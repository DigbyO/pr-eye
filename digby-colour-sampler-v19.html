<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PR-EYE Color Sampler</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2d2d2d; --accent: #007aff; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Camera Container */
        .cap-cam { position: relative; flex-grow: 1; background: black; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #freeze-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; object-fit: cover; }

        /* Crosshair/Reticle */
        .reticle { position: absolute; width: 40px; height: 40px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none; z-index: 10; }
        .reticle::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }

        /* Bottom Controls */
        .cap-btm { background: var(--panel); padding: 20px; border-top-left-radius: 20px; border-top-right-radius: 20px; }
        .cap-btns { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .cap-main-btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #444; color: white; font-size: 12px; cursor: pointer; }
        .cap-main-btn.capture { background: white; border: 4px solid #888; }
        .cap-main-btn.active { background: var(--accent); }

        /* Color Info */
        .cap-info { display: flex; align-items: center; gap: 15px; }
        .color-preview { width: 50px; height: 50px; border-radius: 10px; border: 2px solid #555; background: #000; }
        .color-vals { font-size: 18px; font-weight: bold; letter-spacing: 1px; }

        .hide { display: none !important; }
    </style>
</head>
<body>

    <div class="cap-cam">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <div class="reticle"></div>
    </div>

    <div class="cap-btm">
        <div class="cap-btns">
            <button class="cap-main-btn" id="btn-freeze">FREEZE</button>
            <button class="cap-main-btn capture" id="btn-capture"></button>
            <button class="cap-main-btn" onclick="location.reload()">RESET</button>
        </div>

        <div class="cap-info">
            <div id="preview" class="color-preview"></div>
            <div class="color-vals">
                <span id="hex-label">#000000</span>
            </div>
        </div>
    </div>

    <canvas id="sampler-canvas" class="hide"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const freezeCanvas = document.getElementById('freeze-layer');
        const samplerCanvas = document.getElementById('sampler-canvas');
        const hexLabel = document.getElementById('hex-label');
        const preview = document.getElementById('preview');
        const btnFreeze = document.getElementById('btn-freeze');
        
        let isFrozen = false;
        let stream = null;

        // 1. Start Camera
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied or not available.");
            }
        }

        // 2. Freeze Logic
        btnFreeze.addEventListener('click', () => {
            if (!isFrozen) {
                const ctx = freezeCanvas.getContext('2d');
                freezeCanvas.width = video.videoWidth;
                freezeCanvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                freezeCanvas.style.display = 'block';
                video.style.display = 'none';
                btnFreeze.textContent = "LIVE";
                btnFreeze.classList.add('active');
            } else {
                freezeCanvas.style.display = 'none';
                video.style.display = 'block';
                btnFreeze.textContent = "FREEZE";
                btnFreeze.classList.remove('active');
            }
            isFrozen = !isFrozen;
        });

        // 3. Color Sampling Loop
        function updateColor() {
            const ctx = samplerCanvas.getContext('2d', { willReadFrequently: true });
            
            // Draw a tiny portion of the center to the hidden canvas
            samplerCanvas.width = 1;
            samplerCanvas.height = 1;
            
            const source = isFrozen ? freezeCanvas : video;
            
            // Sample middle pixel
            ctx.drawImage(source, source.videoWidth / 2, source.videoHeight / 2, 1, 1, 0, 0, 1, 1);
            
            const pixel = ctx.getImageData(0, 0, 1, 1).data;
            const r = pixel[0], g = pixel[1], b = pixel[2];
            const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
            
            hexLabel.textContent = hex;
            preview.style.backgroundColor = hex;

            requestAnimationFrame(updateColor);
        }

        // Initialize
        initCamera();
        video.addEventListener('loadedmetadata', () => {
            updateColor();
        });
    </script>
</body>
</html>
