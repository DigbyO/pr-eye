<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Digby's Colour Sampler</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c0c;--surface:#181818;--surface2:#222;--surface3:#2a2a2a;
  --border:#2e2e2e;--text:#f0ede8;--muted:#777;--faint:#444;
  --accent:#c8a96e;--accent2:#8a7048;--danger:#c0392b;--ok:#2ecc71;
  --tab-h:62px;--top-h:48px;
  --sharpie:'Permanent Marker',cursive;--mono:'Space Mono',monospace;
  --r:12px;--rs:6px;--shadow:0 4px 24px rgba(0,0,0,.6);--tr:.18s cubic-bezier(.4,0,.2,1);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--mono);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;touch-action:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
a{color:var(--accent);text-decoration:none}

/* ── SHELL ── */
#app{display:flex;flex-direction:column;height:100dvh;height:-webkit-fill-available;overflow:hidden;position:relative}
#top{height:var(--top-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;z-index:20}
#title{font-family:var(--sharpie);font-size:18px;display:flex;align-items:center;gap:8px}
#last-dot{width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--border);transition:background .4s;flex-shrink:0}
#top-r{display:flex;align-items:center;gap:8px}
#online{width:7px;height:7px;border-radius:50%;background:var(--faint);transition:background .4s}
#online.on{background:var(--ok)}
.icon-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);color:var(--muted);transition:all var(--tr)}
.icon-btn:active{background:var(--surface2);color:var(--text)}

#modules{flex:1;overflow:hidden;position:relative}
.module{position:absolute;inset:0;display:none;overflow:hidden}
.module.active{display:flex;flex-direction:column}
.mod-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + 16px + var(--safe-bottom))}

#tabs{height:var(--tab-h);padding-bottom:var(--safe-bottom);background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:20}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--faint);transition:color var(--tr);font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;position:relative}
.tab.on{color:var(--accent)}
.tab svg{width:20px;height:20px}
.tab::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--accent);transform:scaleX(0);transition:transform var(--tr)}
.tab.on::after{transform:scaleX(1)}

/* ── COMMON ── */
.card{margin:0 12px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.sec{padding:14px 16px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:var(--rs);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.07em;transition:all var(--tr);white-space:nowrap}
.btn-p{background:var(--accent);color:#0c0c0c;font-weight:700}
.btn-p:active{background:#d4b87a}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-s:active{background:var(--surface3)}
.btn-g{color:var(--muted)}
.btn-d{background:var(--danger);color:#fff}
.btn-sm{padding:6px 11px;font-size:10px}
.tog-group{display:flex;background:var(--surface2);border-radius:var(--rs);padding:3px;gap:2px}
.tog-btn{flex:1;padding:6px 8px;border-radius:4px;font-family:var(--mono);font-size:10px;color:var(--muted);transition:all var(--tr)}
.tog-btn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.sw{width:40px;height:22px;background:var(--surface3);border-radius:11px;position:relative;cursor:pointer;transition:background var(--tr);flex-shrink:0}
.sw.on{background:var(--accent)}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left var(--tr);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw.on::after{left:21px}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--tab-h) + 20px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 18px;border-radius:20px;font-size:12px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* ── OVERLAY ── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
#ov.open{display:flex}
#ov-panel{width:100%;max-height:88dvh;background:var(--surface);border-radius:var(--r) var(--r) 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:su .28s cubic-bezier(.4,0,.2,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ov-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 14px}
.ov-title{font-family:var(--sharpie);font-size:22px;padding:0 18px 14px}

/* ══════════════════════════════════════════
  MODULE 1 — SAMPLER (full-screen camera)
══════════════════════════════════════════ */
#sampler-cam-wrap{
  position:relative;flex:1;background:#000;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#cam-video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
#cam-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* Picker crosshair */
#picker-crosshair{
  position:absolute;
  width:70px;height:70px;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:5;
  top:50%;left:50%;
  transition:top .05s, left .05s;
}
#picker-crosshair svg{width:70px;height:70px}

/* Live colour bar */
#live-bar{
  position:absolute;bottom:0;left:0;right:0;z-index:6;
  background:linear-gradient(transparent,rgba(0,0,0,.85) 40%);
  padding:28px 14px 12px;
  display:flex;align-items:center;gap:10px;
}
#live-swatch{width:44px;height:44px;border-radius:var(--rs);border:2px solid rgba(255,255,255,.15);flex-shrink:0;transition:background .1s}
#live-info{flex:1;min-width:0}
#live-hex{font-family:var(--mono);font-size:16px;font-weight:700;color:#fff}
#live-name{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#live-k{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}

/* Mini collection strip */
#cam-collection{
  position:absolute;top:10px;right:10px;z-index:6;
  display:flex;flex-direction:column;gap:5px;
  align-items:center;
}
.cam-swatch-mini{
  width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  cursor:pointer;transition:transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.cam-swatch-mini:active{transform:scale(.9)}
#cam-count-badge{
  background:rgba(0,0,0,.7);color:rgba(255,255,255,.6);
  font-size:9px;padding:2px 5px;border-radius:8px;font-family:var(--mono);
}

/* Capture row */
#capture-row{
  position:absolute;bottom:80px;left:0;right:0;z-index:6;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
#cap-btn{
  width:64px;height:64px;border-radius:50%;
  background:#fff;border:4px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px var(--accent),0 4px 16px rgba(0,0,0,.5);
  transition:transform .1s;
  -webkit-tap-highlight-color:transparent;
}
#cap-btn:active{transform:scale(.93)}
#cap-inner{width:46px;height:46px;border-radius:50%;background:var(--accent)}
#cap-queue-badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--danger);color:#fff;
  font-size:10px;font-weight:700;font-family:var(--mono);
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
#cap-btn{position:relative}

/* ── GALLERY GRID ── */
#gallery-toolbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-shrink:0;
}
#gal-count{font-size:11px;color:var(--muted)}
#gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px}
.polaroid{
  background:#fff;padding:7px 7px 26px;border-radius:2px;
  box-shadow:0 3px 12px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.15);
  cursor:pointer;transition:transform .18s;user-select:none;-webkit-user-select:none;
}
.polaroid:active{transform:scale(.96)}
.pol-block{width:100%;aspect-ratio:1;border-radius:1px;margin-bottom:5px}
.pol-name{font-family:var(--sharpie);font-size:11px;color:#1a1a1a;text-align:center;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.pol-hex{font-family:'Space Mono',monospace;font-size:8px;color:#777;text-align:center;margin-top:2px}
.gal-empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted)}

/* ── PROMPTER ── */
.prom-chips{display:flex;gap:8px;padding:4px 12px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.prom-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.prom-sw{width:44px;height:44px;border-radius:50%;border:3px solid transparent;transition:border-color var(--tr),transform var(--tr)}
.prom-chip.on .prom-sw{border-color:var(--accent);transform:scale(1.1)}
.prom-label{font-size:8px;color:var(--muted);text-align:center;max-width:52px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ── SWATCH EXPORT PANELS ── */
.sw-ratio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sw-ratio-btn{background:var(--surface2);border:2px solid var(--border);border-radius:var(--rs);padding:10px 6px;text-align:center;cursor:pointer;transition:all var(--tr)}
.sw-ratio-btn.on{border-color:var(--accent);background:rgba(200,169,110,.1)}
.sw-ratio-btn .ratio-preview{margin:0 auto 5px;background:var(--accent);border-radius:2px;opacity:.7}
.sw-ratio-btn .ratio-label{font-size:10px;color:var(--muted)}
.sw-layout-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sw-layout-btn{background:var(--surface2);border:2px solid var(--border);border-radius:var(--rs);padding:12px 8px;text-align:center;cursor:pointer;transition:all var(--tr)}
.sw-layout-btn.on{border-color:var(--accent);background:rgba(200,169,110,.1)}
.sw-preview-wrap{background:var(--surface2);border-radius:var(--rs);padding:12px;margin-bottom:14px;text-align:center}
#sw-preview-canvas{max-width:100%;border-radius:4px}
</style>
</head>
<body>
<div id="app">

<div id="top">
  <div id="title"><div id="last-dot"></div>Digby's Colour Sampler</div>
  <div id="top-r">
    <div id="online" title="Network"></div>
    <button class="icon-btn" onclick="App.openSettings()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </div>
</div>

<div id="modules">
  <div class="module active" id="mod-sampler">
    <div id="sampler-cam-wrap">
      <video id="cam-video" autoplay playsinline muted></video>
      <canvas id="cam-canvas"></canvas>
      <div id="picker-crosshair"><svg viewBox="0 0 70 70" fill="none"><circle cx="35" cy="35" r="32" stroke="white" stroke-width="1.5" stroke-dasharray="5 3" opacity=".75"/></svg></div>
      <div id="cam-collection"><div id="cam-count-badge">0</div></div>
      <div id="capture-row">
        <button class="cap-side-btn" id="freeze-btn" onclick="Sampler.toggleFreeze()">Freeze</button>
        <button id="cap-btn" onclick="Sampler.capture()"><div id="cap-inner"></div></button>
        <button class="cap-side-btn" id="flip-btn" onclick="Sampler.flipCamera()">Flip</button>
      </div>
      <div id="live-bar">
        <div id="live-swatch"></div>
        <div id="live-info">
          <div id="live-hex">#------</div>
          <div id="live-name">Tap to move picker</div>
        </div>
      </div>
    </div>
  </div>

  <div class="module" id="mod-gallery">
    <div id="gallery-toolbar"><span id="gal-count">0 colours</span><button class="btn btn-p btn-sm" onclick="SwatchExport.open()">Export PNG</button></div>
    <div class="mod-scroll"><div id="gallery-grid"></div></div>
  </div>
</div>

<div id="tabs">
  <button class="tab on" id="tab-sampler" onclick="App.setTab('sampler')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>Sampler</button>
  <button class="tab" id="tab-gallery" onclick="App.setTab('gallery')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/></svg>Gallery</button>
</div>

<div id="ov" onclick="App.closeOv(event)"><div id="ov-panel"><div class="ov-handle"></div><div id="ov-content"></div></div></div>
<div id="toast"></div>
<canvas id="export-canvas" style="display:none"></canvas>
</div>

<script>
/* ── COLOUR SCIENCE ── */
const CS = {
  hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}},
  rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('')},
  autoName(hex){ return "Colour " + hex.toUpperCase(); },
  rgbToLab(r,g,b){return{l:50,a:0,b:0}}, // Placeholder for simplicity
  lrv(lab){return 50}
};

/* ── DATA STORE ── */
const DS = {
  KEY:'digby_colours',
  all(){try{return JSON.parse(localStorage.getItem(this.KEY)||'[]')}catch{return[]}},
  save(a){localStorage.setItem(this.KEY, JSON.stringify(a))},
  makeEntry(hex,source='camera'){
    return{id:'c'+Date.now(),hex,name:CS.autoName(hex),lrv:50,timestamp:new Date()};
  }
};

/* ── APP CONTROLLER ── */
const App = {
  tab:'sampler',
  init(){ Sampler.init(); Gallery.render(); },
  setTab(t){
    document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.getElementById('mod-'+t).classList.add('active');
    document.getElementById('tab-'+t).classList.add('on');
    this.tab=t;
    // FIX: Render gallery when tab is selected
    if(t==='gallery') Gallery.render();
  },
  refresh(){ Gallery.render(); Sampler.updateCamCollection(); },
  openOv(html){ document.getElementById('ov-content').innerHTML=html; document.getElementById('ov').classList.add('open'); },
  closeOv(e){ if(e.target===document.getElementById('ov')) document.getElementById('ov').classList.remove('open'); },
  toast(msg){ const e=document.getElementById('toast'); e.textContent=msg; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2000); }
};

/* ── SAMPLER MODULE ── */
const Sampler = {
  stream:null, frozen:false, camFront:false, currentHex:'#888888',
  init(){ this.startCamera(); },
  startCamera(){
    const v=document.getElementById('cam-video');
    navigator.mediaDevices.getUserMedia({video:{facingMode:this.camFront?'user':'environment'}}).then(s=>{
      this.stream=s; v.srcObject=s;
    });
  },
  flipCamera(){
    // FIX: Stop existing tracks to toggle camera
    if(this.stream) this.stream.getTracks().forEach(t=>t.stop());
    this.camFront=!this.camFront;
    this.startCamera();
    App.toast(this.camFront?'Front Camera':'Rear Camera');
  },
  toggleFreeze(){
    this.frozen=!this.frozen;
    const v=document.getElementById('cam-video');
    const b=document.getElementById('freeze-btn');
    // FIX: Use pause/play for freezing
    if(this.frozen) v.pause(); else v.play();
    b.textContent=this.frozen?'Unfreeze':'Freeze';
  },
  capture(){
    // FIX: Implement 9-item FIFO Limit
    let all = DS.all();
    if(all.length >= 9) all.pop();
    const entry = DS.makeEntry(this.currentHex);
    all.unshift(entry);
    DS.save(all);
    App.refresh();
    App.toast("Captured!");
  },
  updateCamCollection(){
    const all=DS.all().slice(0,3);
    const badge=document.getElementById('cam-count-badge');
    badge.textContent=DS.all().length;
  }
};

/* ── GALLERY MODULE ── */
const Gallery = {
  render(){
    const all=DS.all();
    document.getElementById('gal-count').textContent=all.length+" colours";
    const grid=document.getElementById('gallery-grid');
    if(!all.length){ grid.innerHTML='<div class="gal-empty">Empty</div>'; return; }
    grid.innerHTML=all.map(c=>`<div class="polaroid"><div class="pol-block" style="background:${c.hex}"></div><div class="pol-name">${c.name}</div></div>`).join('');
  }
};

/* ── EXPORT MODULE ── */
const SwatchExport = {
  open(){
    const canvas = document.getElementById('export-canvas');
    canvas.width=600; canvas.height=400;
    const ctx = canvas.getContext('2d');
    const all = DS.all();
    if(!all.length){ App.toast("No colours to export"); return; }
    
    // Draw Simple Grid
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,600,400);
    all.forEach((c,i)=>{
      ctx.fillStyle=c.hex; ctx.fillRect(i*60, 50, 50, 200);
    });

    // FIX: Correct download trigger
    const link = document.createElement('a');
    link.download = 'palette.png';
    link.href = canvas.toDataURL();
    link.click();
    App.toast("Exported!");
  }
};

document.addEventListener('DOMContentLoaded', ()=>App.init());
</script>
</body>
</html>
